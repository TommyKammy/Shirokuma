apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods, pods/ephemeralcontainers]
  validationActions: [Deny]
  variables:
    - name: allContainers
      expression: >-
        object.spec.containers + object.spec.?initContainers.orValue([]) +
        object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: >-
        variables.allContainers.all(container,
        container.?securityContext.?privileged.orValue(false) == false)
      message: Privileged containers are forbidden.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validationActions: [Deny]
  validations:
    - expression: >-
        !object.spec.?hostNetwork.orValue(false) &&
        !object.spec.?hostIPC.orValue(false) &&
        !object.spec.?hostPID.orValue(false)
      message: Host network, IPC, and PID namespaces are forbidden.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-path
  annotations:
    policies.kyverno.io/title: Disallow hostPath Volumes
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validationActions: [Deny]
  validations:
    - expression: >-
        !has(object.spec.volumes) ||
        object.spec.volumes.all(volume, !has(volume.hostPath))
      message: hostPath volumes are forbidden.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-pod-resources
  annotations:
    policies.kyverno.io/title: Require Pod Requests and Limits
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: medium
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validationActions: [Deny]
  variables:
    - name: workloadContainers
      expression: >-
        object.spec.containers + object.spec.?initContainers.orValue([])
  validations:
    - expression: >-
        variables.workloadContainers.all(container,
        has(container.resources) &&
        has(container.resources.requests) &&
        has(container.resources.requests.cpu) &&
        container.resources.requests.cpu != '' &&
        has(container.resources.requests.memory) &&
        container.resources.requests.memory != '' &&
        has(container.resources.limits) &&
        has(container.resources.limits.cpu) &&
        container.resources.limits.cpu != '' &&
        has(container.resources.limits.memory) &&
        container.resources.limits.memory != '')
      message: Every container requires CPU and memory requests and limits.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-ports
  annotations:
    policies.kyverno.io/title: Disallow Host Ports
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validationActions: [Deny]
  variables:
    - name: allContainers
      expression: >-
        object.spec.containers + object.spec.?initContainers.orValue([]) +
        object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: >-
        variables.allContainers.all(container,
        !has(container.ports) ||
        container.ports.all(port, !has(port.hostPort) || port.hostPort == 0))
      message: hostPort access is forbidden.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-image-digest
  annotations:
    policies.kyverno.io/title: Require Immutable Image Digests
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  autogen:
    podControllers:
      controllers: [deployments, daemonsets, statefulsets, jobs, cronjobs]
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods, pods/ephemeralcontainers]
  validationActions: [Deny]
  variables:
    - name: allContainers
      expression: >-
        object.spec.containers + object.spec.?initContainers.orValue([]) +
        object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: >-
        variables.allContainers.all(container,
        container.image.matches('^[a-zA-Z0-9._-]+(:[0-9]+)?(/[a-zA-Z0-9._-]+)+@sha256:[0-9a-f]{64}$'))
      message: Images must use an exact untagged repository@sha256 digest.
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: deny-public-service
  annotations:
    policies.kyverno.io/title: Deny Public Services and Ingresses
    policies.kyverno.io/category: Shirokuma L0 Baseline
    policies.kyverno.io/severity: high
spec:
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [services]
      - apiGroups: [networking.k8s.io]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [ingresses]
  validationActions: [Deny]
  validations:
    - expression: >-
        object.kind == 'Service' ?
        !['NodePort', 'LoadBalancer'].exists(type,
        object.spec.?type.orValue('ClusterIP') == type) &&
        object.spec.?externalIPs.orValue([]).size() == 0 :
        object.kind != 'Ingress'
      message: NodePort, LoadBalancer, externalIPs, and Ingress exposure is forbidden by default.
