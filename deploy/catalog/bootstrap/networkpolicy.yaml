apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: polaris-bootstrap
  namespace: shirokuma-dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: polaris
      app.kubernetes.io/component: catalog-bootstrap
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: polaris-postgresql
              app.kubernetes.io/component: catalog-metadata
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
