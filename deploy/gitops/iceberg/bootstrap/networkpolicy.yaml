apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iceberg-table-bootstrap
  namespace: shirokuma-dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: iceberg-table-bootstrap
      app.kubernetes.io/component: lakehouse-bootstrap
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: polaris
              app.kubernetes.io/component: catalog-server
      ports:
        - port: 8181
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shirokuma-storage
          podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
              app.kubernetes.io/component: object-storage
      ports:
        - port: 8333
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
