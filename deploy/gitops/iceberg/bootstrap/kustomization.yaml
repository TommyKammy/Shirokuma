apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - job.yaml
  - networkpolicy.yaml
configMapGenerator:
  - name: iceberg-table-bootstrap-source
    namespace: shirokuma-dev
    files:
      - IcebergBootstrap.java
generatorOptions:
  labels:
    app.kubernetes.io/name: iceberg-table-bootstrap
    app.kubernetes.io/component: lakehouse-bootstrap
    app.kubernetes.io/part-of: shirokuma
