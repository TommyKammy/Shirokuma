apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-s3
  namespace: shirokuma-dev
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: shirokuma
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: object-storage
  ports:
    - name: s3
      port: 8333
      protocol: TCP
      targetPort: s3
