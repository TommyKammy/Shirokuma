apiVersion: v1
kind: ConfigMap
metadata:
  name: object-storage-contract
  namespace: shirokuma-storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: shirokuma
data:
  S3_ENDPOINT: http://seaweedfs-s3.shirokuma-storage.svc.cluster.local:8333
  S3_BUCKET: shirokuma-lakehouse
  S3_REGION: us-east-1
  S3_PATH_STYLE: "true"
  S3_LIFECYCLE_POLICY: none-local-lite-placeholder
  S3_DELETE_BUCKET_NOT_EMPTY: "false"
