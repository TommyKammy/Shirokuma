apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polaris-postgresql
  namespace: shirokuma-dev
  labels:
    app.kubernetes.io/name: polaris-postgresql
    app.kubernetes.io/component: catalog-metadata
    app.kubernetes.io/part-of: shirokuma
spec:
  replicas: 1
  serviceName: polaris-postgresql
  podManagementPolicy: OrderedReady
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: polaris-postgresql
      app.kubernetes.io/component: catalog-metadata
  template:
    metadata:
      annotations:
        shirokuma.dev/polaris-credential-generation: "1"
      labels:
        app.kubernetes.io/name: polaris-postgresql
        app.kubernetes.io/component: catalog-metadata
        app.kubernetes.io/part-of: shirokuma
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: cgr.dev/chainguard/postgres@sha256:c455ec159d05d99ee031d471b8692668562fed8e8c9c37be5e0dbdbee8e5f7b8
          imagePullPolicy: IfNotPresent
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: polaris-postgresql-credentials
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: polaris-postgresql-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polaris-postgresql-credentials
                  key: password
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: postgresql
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: postgresql
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: postgresql
            initialDelaySeconds: 30
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: run
          emptyDir:
            sizeLimit: 16Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: polaris-postgresql
          app.kubernetes.io/component: catalog-metadata
          app.kubernetes.io/part-of: shirokuma
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
