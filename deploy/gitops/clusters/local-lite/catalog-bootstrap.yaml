apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shirokuma-catalog-bootstrap
  namespace: flux-system
spec:
  dependsOn:
    - name: shirokuma-catalog-database
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./deploy/catalog/bootstrap
  prune: true
  force: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      POLARIS_CREDENTIAL_GENERATION: __REPLACED_BY_ROOT_KUSTOMIZATION__
  wait: true
  healthChecks:
    - apiVersion: batch/v1
      kind: Job
      name: polaris-bootstrap
      namespace: shirokuma-dev
