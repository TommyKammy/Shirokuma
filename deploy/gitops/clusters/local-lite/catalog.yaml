apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shirokuma-catalog
  namespace: flux-system
spec:
  dependsOn:
    - name: shirokuma-catalog-bootstrap
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./deploy/gitops/catalog/server
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      POLARIS_CREDENTIAL_GENERATION: __REPLACED_BY_ROOT_KUSTOMIZATION__
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: polaris
      namespace: shirokuma-dev
