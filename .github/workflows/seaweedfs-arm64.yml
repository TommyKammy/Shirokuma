name: SeaweedFS 4.39 trusted arm64 build

on:
  push:
    branches:
      - codex/issue-41
    paths:
      - .github/workflows/seaweedfs-arm64.yml
      - bootstrap/seaweedfs/v4.39/Containerfile
      - bootstrap/seaweedfs/v4.39/source.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seaweedfs-4.39-arm64
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.repository == 'TommyKammy/Shirokuma' &&
      (github.ref == 'refs/heads/codex/issue-41' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE: ghcr.io/tommykammy/shirokuma-seaweedfs
      SOURCE_COMMIT: db42bb49757b459551607939807017d7a9d5a94a
      SOURCE_TREE: da91641fdd520e465c68fa48af3b3ad07ad86822
      SOURCE_ARCHIVE_SHA256: 95b3ba34d191e2cc96063434f407087000a9ffcf22f95682ecd5ce40b5a3fab9
      CRANE_VERSION: v0.21.7
      CRANE_ARCHIVE_SHA256: b6ee979d9411dfb05ce35ab9e156fe5de7def11a230764a7856ffa2eb971fa88

    steps:
      - name: Check out Shirokuma policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Check out the adopted SeaweedFS source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: seaweedfs/seaweedfs
          ref: db42bb49757b459551607939807017d7a9d5a94a
          path: seaweedfs-src
          fetch-depth: 1
          persist-credentials: false

      - name: Fail closed unless immutable source evidence matches
        shell: bash
        run: |
          set -euo pipefail
          actual_commit=$(git -C seaweedfs-src rev-parse HEAD)
          actual_tree=$(git -C seaweedfs-src rev-parse HEAD^{tree})
          actual_archive=$(git -C seaweedfs-src archive --format=tar HEAD | sha256sum | cut -d' ' -f1)
          test "${actual_commit}" = "${SOURCE_COMMIT}"
          test "${actual_tree}" = "${SOURCE_TREE}"
          test "${actual_archive}" = "${SOURCE_ARCHIVE_SHA256}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = json.loads(
              Path("bootstrap/seaweedfs/v4.39/source.json").read_text(encoding="utf-8")
          )
          containerfile = Path(
              "bootstrap/seaweedfs/v4.39/Containerfile"
          ).read_text(encoding="utf-8")

          def arg_value(name: str) -> str:
              prefix = f"ARG {name}="
              matches = [
                  line.removeprefix(prefix)
                  for line in containerfile.splitlines()
                  if line.startswith(prefix)
              ]
              if len(matches) != 1:
                  raise SystemExit(f"Containerfile must define exactly one {name}")
              return matches[0]

          expected = {
              "commit": os.environ["SOURCE_COMMIT"],
              "tree": os.environ["SOURCE_TREE"],
              "git_archive_sha256": os.environ["SOURCE_ARCHIVE_SHA256"],
          }
          for field, value in expected.items():
              if evidence.get(field) != value:
                  raise SystemExit(f"source evidence mismatch for {field}")
          syntax_prefix = "# syntax="
          syntax_line = containerfile.splitlines()[0]
          if not syntax_line.startswith(syntax_prefix):
              raise SystemExit("Containerfile must pin its syntax frontend")
          actual_inputs = {
              "dockerfile_frontend": syntax_line.removeprefix(syntax_prefix),
              "go": arg_value("GO_IMAGE"),
              "certificates": arg_value("RUNTIME_IMAGE"),
          }
          if evidence.get("build_inputs") != actual_inputs:
              raise SystemExit("source evidence build_inputs do not match Containerfile")
          PY
          rm -rf seaweedfs-src/.git

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish only linux/arm64
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: seaweedfs-src
          file: bootstrap/seaweedfs/v4.39/Containerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=seaweedfs-4.39-arm64
          cache-to: type=gha,mode=max,scope=seaweedfs-4.39-arm64
          tags: ${{ env.IMAGE }}:quarantine-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            SOURCE_COMMIT=${{ env.SOURCE_COMMIT }}

      - name: Verify the published platform
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${IMAGE}@${DIGEST}"
          platform=$(docker image inspect "${IMAGE}@${DIGEST}" --format '{{.Os}}/{{.Architecture}}')
          test "${platform}" = 'linux/arm64'

      - name: Smoke-test non-root weed mini on the exact digest
        timeout-minutes: 2
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          container_name="seaweedfs-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker logs "${container_name}" > runtime-smoke.log 2>&1 || true
            docker rm --force "${container_name}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          runtime_user=$(docker image inspect "${IMAGE}@${DIGEST}" --format '{{.Config.User}}')
          test "${runtime_user}" = '65532:65532'
          docker run --detach \
            --name "${container_name}" \
            --user 65532:65532 \
            --read-only \
            --tmpfs /tmp:rw,nosuid,nodev,size=16m,uid=65532,gid=65532,mode=1777 \
            --tmpfs /data:rw,nosuid,nodev,size=64m,uid=65532,gid=65532,mode=0755 \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 256 \
            --memory 512m \
            "${IMAGE}@${DIGEST}" >/dev/null

          for attempt in {1..10}; do
            test "$(docker inspect "${container_name}" --format '{{.State.Running}}')" = 'true'
            sleep 1
          done

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "reference": f"{os.environ['IMAGE']}@{os.environ['DIGEST']}",
              "user": "65532:65532",
              "command": ["/usr/bin/weed", "mini", "-dir=/data"],
              "read_only_rootfs": True,
              "tmpfs": ["/tmp", "/data"],
              "capabilities_dropped": "ALL",
              "no_new_privileges": True,
              "sustained_running_seconds": 10,
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("runtime-smoke.json").write_text(
              json.dumps(record, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Generate CycloneDX SBOM for the exact digest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: seaweedfs-4.39-arm64.cdx.json
          upload-artifact: false
          upload-release-assets: false
          syft-version: v1.46.0

      - name: Scan the exact digest and block High or Critical findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy.json
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1

      - name: Record Trivy scanner and vulnerability DB freshness
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
        shell: bash
        run: |
          set -euo pipefail
          trivy version --format json > trivy-version.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path("trivy-version.json").read_text(encoding="utf-8"))
          if metadata.get("Version") != "0.72.0":
              raise SystemExit("unexpected Trivy version")
          database = metadata.get("VulnerabilityDB", {})
          if not database.get("UpdatedAt") or not database.get("DownloadedAt"):
              raise SystemExit("missing Trivy vulnerability DB freshness metadata")
          PY

      - name: Install Cosign after the vulnerability gate passes
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign the scanned immutable image and retain transparency evidence
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/TommyKammy/Shirokuma/.github/workflows/seaweedfs-arm64.yml@${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_SHA}" \
            --output json \
            "${IMAGE}@${DIGEST}" > cosign-verify.json

      - name: Publish SLSA provenance for the scanned exact digest
        id: provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify SLSA provenance against the immutable workflow revision
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" --format json > slsa-verify.json
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          records = json.loads(Path("slsa-verify.json").read_text(encoding="utf-8"))
          expected_digest = os.environ["DIGEST"].removeprefix("sha256:")
          expected_sha = os.environ["GITHUB_SHA"]
          matches = []
          for record in records:
              certificate = record["verificationResult"]["signature"]["certificate"]
              payload = record["attestation"]["bundle"]["dsseEnvelope"]["payload"]
              statement = json.loads(base64.b64decode(payload))
              subjects = statement.get("subject", [])
              if (
                  statement.get("predicateType") == "https://slsa.dev/provenance/v1"
                  and certificate.get("githubWorkflowSHA") == expected_sha
                  and certificate.get("buildConfigDigest") == expected_sha
                  and any(
                      subject.get("digest", {}).get("sha256") == expected_digest
                      for subject in subjects
                  )
              ):
                  matches.append(record)
          if not matches:
              raise SystemExit("SLSA provenance is not bound to the exact workflow SHA and digest")
          PY

      - name: Keyless-attest the retained SBOM and scan
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          cosign attest --yes --type cyclonedx \
            --predicate seaweedfs-4.39-arm64.cdx.json "${IMAGE}@${DIGEST}"
          cosign attest --yes --type https://shirokuma.dev/attestations/trivy/v1 \
            --predicate trivy.json "${IMAGE}@${DIGEST}"

      - name: Record exact release evidence
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          digest = os.environ["DIGEST"]
          image = os.environ["IMAGE"]
          trivy_metadata = json.loads(
              Path("trivy-version.json").read_text(encoding="utf-8")
          )
          vulnerability_db = trivy_metadata["VulnerabilityDB"]
          record = {
              "schema_version": 1,
              "component": "seaweedfs",
              "version": "4.39",
              "platform": "linux/arm64",
              "reference": f"{image}@{digest}",
              "source": {
                  "repository": "https://github.com/seaweedfs/seaweedfs",
                  "commit": os.environ["SOURCE_COMMIT"],
                  "tree": os.environ["SOURCE_TREE"],
                  "git_archive_sha256": os.environ["SOURCE_ARCHIVE_SHA256"],
              },
              "builder": {
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "workflow": ".github/workflows/seaweedfs-arm64.yml",
                  "ref": os.environ["GITHUB_REF"],
                  "workflow_sha": os.environ["GITHUB_SHA"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              },
              "issuer": "https://token.actions.githubusercontent.com",
              "identity": (
                  "https://github.com/TommyKammy/Shirokuma/"
                  f".github/workflows/seaweedfs-arm64.yml@{os.environ['GITHUB_REF']}"
              ),
              "transparency_log": "verified by cosign-verify.json",
              "slsa_provenance": os.environ.get("PROVENANCE_URL", ""),
              "vulnerabilities": {"critical": 0, "high": 0},
              "scanner": {
                  "name": "trivy",
                  "version": trivy_metadata["Version"],
                  "vulnerability_db": {
                      "version": vulnerability_db["Version"],
                      "updated_at": vulnerability_db["UpdatedAt"],
                      "downloaded_at": vulnerability_db["DownloadedAt"],
                  },
              },
              "promotion_tool": {
                  "name": "crane",
                  "version": os.environ["CRANE_VERSION"],
                  "archive_sha256": os.environ["CRANE_ARCHIVE_SHA256"],
              },
              "artifacts": {
                  name: {
                      "sha256": hashlib.sha256(Path(name).read_bytes()).hexdigest()
                  }
                  for name in (
                      "cosign-verify.json",
                      "runtime-smoke.json",
                      "runtime-smoke.log",
                      "seaweedfs-4.39-arm64.cdx.json",
                      "slsa-verify.json",
                      "trivy-version.json",
                      "trivy.json",
                  )
              },
          }
          Path("release-evidence.json").write_text(
              json.dumps(record, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Retain independently downloadable evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seaweedfs-4.39-arm64-${{ github.run_id }}
          path: |
            bootstrap/seaweedfs/v4.39/source.json
            cosign-verify.json
            release-evidence.json
            runtime-smoke.json
            runtime-smoke.log
            seaweedfs-4.39-arm64.cdx.json
            slsa-verify.json
            trivy-version.json
            trivy.json
          if-no-files-found: error
          retention-days: 90

      - name: Install Crane for digest-preserving tag promotion
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
        with:
          version: v0.21.7

      - name: Verify the pinned Crane release archive
        shell: bash
        run: |
          set -euo pipefail
          crane_dir=$(dirname "$(command -v crane)")
          archive="${crane_dir}/go-containerregistry_Linux_arm64.tar.gz"
          test -f "${archive}"
          echo "${CRANE_ARCHIVE_SHA256}  ${archive}" | sha256sum --check --strict
          crane version

      - name: Promote the fully verified digest to the trusted tag
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          crane tag "${IMAGE}@${DIGEST}" 4.39-arm64
          promoted_digest=$(crane digest "${IMAGE}:4.39-arm64")
          test "${promoted_digest}" = "${DIGEST}"
