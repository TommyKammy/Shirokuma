name: Polaris 1.6.0 Admin build-input snapshot

on:
  pull_request:
    paths:
      - .github/workflows/polaris-admin-build-inputs.yml
      - bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json
      - bootstrap/polaris/v1.6.0/source.json
      - bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
      - bootstrap/polaris/v1.6.0/evidence/gradle-dependency-inputs.json
      - bootstrap/polaris/v1.6.0/evidence/verification-metadata.xml
      - scripts/package_polaris_gradle_dependencies.py
      - scripts/validate_polaris_source_archive.py
      - scripts/verify_polaris_admin_build_inputs.py
      - tests/test_package_polaris_gradle_dependencies.py
      - tests/test_polaris_admin_build_inputs.py
      - Makefile
  push:
    branches:
      - main
    paths:
      - .github/workflows/polaris-admin-build-inputs.yml
      - bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json
      - bootstrap/polaris/v1.6.0/source.json
      - bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
      - bootstrap/polaris/v1.6.0/evidence/gradle-dependency-inputs.json
      - bootstrap/polaris/v1.6.0/evidence/verification-metadata.xml
      - scripts/package_polaris_gradle_dependencies.py
      - scripts/validate_polaris_source_archive.py
      - scripts/verify_polaris_admin_build_inputs.py
      - tests/test_package_polaris_gradle_dependencies.py
      - tests/test_polaris_admin_build_inputs.py
      - Makefile

permissions:
  contents: read

concurrency:
  group: polaris-1.6.0-admin-build-inputs-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTRACT_PATH: bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json
  SOURCE_ARCHIVE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz
  SOURCE_SIGNATURE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.asc
  SOURCE_CHECKSUM_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.sha512
  SOURCE_ARCHIVE_SHA512: d69b1a91e16e210a78dec327fc4725983b114fbec5d86d078a3827f35fe7dd5df3e4b12d18965e5a72eace65ad224aa007004ed61c66f9abb2efafc44ceac95b
  SOURCE_SIGNATURE_SHA256: 2338e1c2385874e9bf5cf513b4d27732b1cd59e943e1662e62fa995d915e6481
  SOURCE_SIGNING_KEY_FINGERPRINT: F2EEEB06110BEE1397EC74CBB8960FF52D9B1312
  ADMIN_BUILD_PREIMAGE_SHA256: 6e3aabc2090cda72c03608053f41899792a6c62bec382ed18d6b02703574fde9
  BUILDER_IMAGE: docker.io/library/gradle@sha256:cc583fa5245267fe0e1546c9989e8575473a37336ad9894dc0684a99fea1fb03
  EXPECTED_BUILDER_PLATFORM: linux/arm64
  EXPECTED_GRADLE_VERSION: 9.6.0
  EXPECTED_JAVA_MAJOR: "21"
  PARENT_ARTIFACT_REFERENCE: ghcr.io/tommykammy/shirokuma-polaris-gradle-dependencies@sha256:fa889d2c0a6e6dc48816d79680a366e21040be333ab6007b88e4ca4dbf6e59d6
  PARENT_DESCRIPTOR_SHA256: 3bab7b055d29be1bc59f2fe605960f49bbceee2639ad68086822c62ee8533841
  PARENT_ARCHIVE_SHA256: 18933bfb895c267302f1ee1c80cfb9712eac736ffcefade48dac53f79e8e3bc0
  PARENT_VERIFICATION_METADATA_SHA256: b8b1fa91bc9d98eaf676dbab76c5452411fcdf6b11a8c9959c131799c71deaf2
  ARTIFACT_REPOSITORY: ghcr.io/tommykammy/shirokuma-polaris-admin-gradle-dependencies
  ARTIFACT_TYPE: application/vnd.shirokuma.polaris-admin.gradle-dependencies.v1
  DESCRIPTOR_MEDIA_TYPE: application/vnd.shirokuma.gradle-dependency-descriptor.v1+json
  ARCHIVE_MEDIA_TYPE: application/vnd.shirokuma.gradle-cache.v1.tar+gzip
  ORAS_VERSION: 1.3.3
  ORAS_URL: https://github.com/oras-project/oras/releases/download/v1.3.3/oras_1.3.3_linux_arm64.tar.gz
  ORAS_ARCHIVE_SHA256: ac7156f93a21e903f7ad606c792f3560f17e0cd0e36365634701b1e7cc4e4eca
  COSIGN_VERSION: v3.1.1

jobs:
  validate:
    if: >-
      github.repository == 'TommyKammy/Shirokuma' &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      active: ${{ steps.lifecycle.outputs.active }}
      archive_sha256: ${{ steps.candidate.outputs.archive_sha256 }}
      descriptor_sha256: ${{ steps.candidate.outputs.descriptor_sha256 }}
      metadata_sha256: ${{ steps.candidate.outputs.metadata_sha256 }}
      offline_sha256: ${{ steps.candidate.outputs.offline_sha256 }}
      superset_sha256: ${{ steps.candidate.outputs.superset_sha256 }}
      toolchain_sha256: ${{ steps.candidate.outputs.toolchain_sha256 }}
      candidate_artifact_name: ${{ steps.candidate.outputs.candidate_artifact_name }}

    steps:
      - name: Check out the reviewed admin dependency policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate the publication-pending contract
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_admin_build_inputs.py audit --root .
          python3 -m unittest -v tests.test_package_polaris_gradle_dependencies
          python3 -m unittest -v tests.test_polaris_admin_build_inputs

      - name: Check the admin dependency publication lifecycle
        id: lifecycle
        shell: bash
        run: |
          set -euo pipefail
          state=$(
            python3 -c \
              'import json; print(json.load(open("bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json"))["lifecycle"]["state"])'
          )
          case "${state}" in
            admin_dependency_snapshot_publication_pending)
              echo "active=true" >> "${GITHUB_OUTPUT}"
              ;;
            admin_dependency_snapshot_review_pending)
              echo "active=false" >> "${GITHUB_OUTPUT}"
              echo "Polaris Admin build-input publisher is retired for this state"
              ;;
            *)
              echo "unexpected Admin dependency publication lifecycle: ${state}" >&2
              exit 1
              ;;
          esac

      - name: Install checksum-pinned ORAS
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/oras-validate.tar.gz"
          install_dir="${RUNNER_TEMP}/oras-validate-bin"
          mkdir -p "${install_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "${ORAS_URL}" --output "${archive}"
          echo "${ORAS_ARCHIVE_SHA256}  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" \
            --directory "${install_dir}" oras
          chmod 0755 "${install_dir}/oras"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          test "$("${install_dir}/oras" version | awk '/Version:/ {print $2}')" \
            = "${ORAS_VERSION}"

      - name: Pull and verify the reviewed server dependency parent
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          parent_dir="${RUNNER_TEMP}/polaris-parent"
          gradle_home="${RUNNER_TEMP}/gradle-home"
          registry_config="${RUNNER_TEMP}/parent-registry-config.json"
          test ! -e "${parent_dir}"
          test ! -e "${gradle_home}"
          mkdir -m 0700 "${parent_dir}"
          printf '{}\n' > "${registry_config}"
          oras pull \
            --registry-config "${registry_config}" \
            --output "${parent_dir}" \
            "${PARENT_ARTIFACT_REFERENCE}"
          echo "${PARENT_DESCRIPTOR_SHA256}  ${parent_dir}/gradle-dependency-inputs.json" \
            | sha256sum --check --strict
          echo "${PARENT_ARCHIVE_SHA256}  ${parent_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            | sha256sum --check --strict
          cmp \
            bootstrap/polaris/v1.6.0/evidence/gradle-dependency-inputs.json \
            "${parent_dir}/gradle-dependency-inputs.json"
          tar --extract --gzip --to-stdout \
            --file "${parent_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            verification-metadata.xml \
            > "${parent_dir}/verification-metadata.xml"
          echo "${PARENT_VERIFICATION_METADATA_SHA256}  ${parent_dir}/verification-metadata.xml" \
            | sha256sum --check --strict
          cmp \
            bootstrap/polaris/v1.6.0/evidence/verification-metadata.xml \
            "${parent_dir}/verification-metadata.xml"
          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${parent_dir}/gradle-dependency-inputs.json" \
            --verification-metadata "${parent_dir}/verification-metadata.xml" \
            --archive "${parent_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            --extract-root "${gradle_home}"
          cmp \
            "${parent_dir}/verification-metadata.xml" \
            "${gradle_home}/verification-metadata.xml"
          rm "${gradle_home}/verification-metadata.xml"

      - name: Fetch and authenticate the ASF source release
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          source_dir="${RUNNER_TEMP}/polaris-source"
          mkdir -p "${source_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "${SOURCE_ARCHIVE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "${SOURCE_SIGNATURE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.asc"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "${SOURCE_CHECKSUM_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"
          echo "${SOURCE_ARCHIVE_SHA512}  ${source_dir}/apache-polaris-1.6.0.tar.gz" \
            | sha512sum --check --strict
          echo "${SOURCE_SIGNATURE_SHA256}  ${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            | sha256sum --check --strict
          grep --fixed-strings --quiet \
            "${SOURCE_ARCHIVE_SHA512}" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"
          export GNUPGHOME="${RUNNER_TEMP}/polaris-admin-release-keyring"
          mkdir -m 0700 "${GNUPGHOME}"
          gpg --batch --import \
            bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
          actual_fingerprint=$(
            gpg --batch --with-colons --fingerprint \
              | awk -F: '$1 == "fpr" {print $10; exit}'
          )
          test "${actual_fingerprint}" = "${SOURCE_SIGNING_KEY_FINGERPRINT}"
          gpg --batch --verify \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz"
          python3 scripts/validate_polaris_source_archive.py \
            --archive "${source_dir}/apache-polaris-1.6.0.tar.gz"

      - name: Verify the exact builder toolchain
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull --quiet --platform linux/arm64 "${BUILDER_IMAGE}" \
            > /dev/null
          builder_platform=$(
            docker image inspect \
              --format '{{.Os}}/{{.Architecture}}' \
              "${BUILDER_IMAGE}"
          )
          builder_gradle=$(
            docker run --rm --platform linux/arm64 \
              "${BUILDER_IMAGE}" gradle --version \
              | awk '/^Gradle / {print $2; exit}'
          )
          builder_java=$(
            docker run --rm --platform linux/arm64 \
              "${BUILDER_IMAGE}" java -version 2>&1 \
              | awk -F'"' '/version/ {print $2; exit}'
          )
          builder_java_major="${builder_java%%.*}"
          test "${builder_platform}" = "${EXPECTED_BUILDER_PLATFORM}"
          test "${builder_gradle}" = "${EXPECTED_GRADLE_VERSION}"
          test "${builder_java_major}" = "${EXPECTED_JAVA_MAJOR}"
          {
            echo "OBSERVED_BUILDER_PLATFORM=${builder_platform}"
            echo "OBSERVED_BUILDER_GRADLE=${builder_gradle}"
            echo "OBSERVED_BUILDER_JAVA=${builder_java}"
            echo "OBSERVED_BUILDER_JAVA_MAJOR=${builder_java_major}"
          } >> "${GITHUB_ENV}"

      - name: Resolve the admin superset with strict verification metadata
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          source_archive="${RUNNER_TEMP}/polaris-source/apache-polaris-1.6.0.tar.gz"
          parent_dir="${RUNNER_TEMP}/polaris-parent"
          online_source="${RUNNER_TEMP}/polaris-admin-online"
          gradle_home="${RUNNER_TEMP}/gradle-home"
          test ! -e "${online_source}"
          test ! -L "${online_source}"
          install -d -m 0700 "${online_source}"
          tar --extract --gzip --file "${source_archive}" \
            --directory "${online_source}" --strip-components 1 \
            --no-same-owner --no-same-permissions
          echo "${ADMIN_BUILD_PREIMAGE_SHA256}  ${online_source}/runtime/admin/build.gradle.kts" \
            | sha256sum --check --strict
          install -m 0644 \
            "${parent_dir}/verification-metadata.xml" \
            "${online_source}/gradle/verification-metadata.xml"
          docker run --rm \
            --platform linux/arm64 \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/gradle-user \
            --env GRADLE_USER_HOME=/gradle-home \
            --volume "${online_source}:/workspace" \
            --volume "${gradle_home}:/gradle-home" \
            --workdir /workspace \
            "${BUILDER_IMAGE}" \
            gradle \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache \
              --rerun-tasks \
              --write-verification-metadata sha256 \
              :polaris-admin:assemble \
              :polaris-admin:quarkusAppPartsBuild \
              :polaris-server:assemble \
              :polaris-server:quarkusAppPartsBuild
          test -s "${online_source}/gradle/verification-metadata.xml"
          echo "${ADMIN_BUILD_PREIMAGE_SHA256}  ${online_source}/runtime/admin/build.gradle.kts" \
            | sha256sum --check --strict

      - name: Package and prove the exact parent module superset
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          parent_dir="${RUNNER_TEMP}/polaris-parent"
          mkdir -p "${candidate_dir}"
          cp \
            "${RUNNER_TEMP}/polaris-admin-online/gradle/verification-metadata.xml" \
            "${candidate_dir}/verification-metadata.xml"
          python3 scripts/package_polaris_gradle_dependencies.py create \
            --cache-root "${RUNNER_TEMP}/gradle-home" \
            --verification-metadata "${candidate_dir}/verification-metadata.xml" \
            --archive "${candidate_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            --descriptor "${candidate_dir}/gradle-dependency-inputs.json"
          second_archive="${RUNNER_TEMP}/polaris-admin-repeat.tar.gz"
          second_descriptor="${RUNNER_TEMP}/polaris-admin-repeat.json"
          python3 scripts/package_polaris_gradle_dependencies.py create \
            --cache-root "${RUNNER_TEMP}/gradle-home" \
            --verification-metadata "${candidate_dir}/verification-metadata.xml" \
            --archive "${second_archive}" \
            --descriptor "${second_descriptor}"
          cmp \
            "${candidate_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            "${second_archive}"
          cmp "${candidate_dir}/gradle-dependency-inputs.json" \
            "${second_descriptor}"
          CANDIDATE_DIR="${candidate_dir}" \
          PARENT_DIR="${parent_dir}" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          candidate_dir = Path(os.environ["CANDIDATE_DIR"])
          parent_dir = Path(os.environ["PARENT_DIR"])
          parent = json.loads(
              (parent_dir / "gradle-dependency-inputs.json").read_text(
                  encoding="utf-8"
              )
          )
          candidate = json.loads(
              (candidate_dir / "gradle-dependency-inputs.json").read_text(
                  encoding="utf-8"
              )
          )
          match_fields = (
              "path",
              "sha256",
              "size",
              "kind",
              "group",
              "module",
              "version",
              "artifact",
          )
          parent_modules = {
              record["path"]: {key: record[key] for key in match_fields}
              for record in parent["files"]
              if record["kind"] == "module-artifact"
          }
          candidate_modules = {
              record["path"]: {key: record[key] for key in match_fields}
              for record in candidate["files"]
              if record["kind"] == "module-artifact"
          }
          missing = sorted(set(parent_modules) - set(candidate_modules))
          changed = sorted(
              path
              for path in set(parent_modules) & set(candidate_modules)
              if parent_modules[path] != candidate_modules[path]
          )
          if missing or changed:
              raise SystemExit(
                  "candidate is not an exact parent module-artifact superset: "
                  f"missing={missing[:5]!r} changed={changed[:5]!r}"
              )
          proof = {
              "schema_version": 1,
              "result": "passed",
              "relationship": "exact-module-artifact-superset",
              "parent_descriptor_sha256": os.environ[
                  "PARENT_DESCRIPTOR_SHA256"
              ],
              "parent_module_artifact_count": len(parent_modules),
              "candidate_module_artifact_count": len(candidate_modules),
              "match_fields": list(match_fields),
          }
          (candidate_dir / "superset-proof.json").write_text(
              json.dumps(proof, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Prove a fresh network-none offline admin and server build
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          offline_home="${RUNNER_TEMP}/polaris-admin-gradle-home-offline"
          offline_source="${RUNNER_TEMP}/polaris-admin-offline"
          test ! -e "${offline_home}"
          test ! -e "${offline_source}"
          test ! -L "${offline_source}"
          install -d -m 0700 "${offline_source}"
          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${candidate_dir}/gradle-dependency-inputs.json" \
            --verification-metadata "${candidate_dir}/verification-metadata.xml" \
            --archive "${candidate_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            --extract-root "${offline_home}"
          cmp \
            "${candidate_dir}/verification-metadata.xml" \
            "${offline_home}/verification-metadata.xml"
          tar --extract --gzip \
            --file "${RUNNER_TEMP}/polaris-source/apache-polaris-1.6.0.tar.gz" \
            --directory "${offline_source}" --strip-components 1 \
            --no-same-owner --no-same-permissions
          echo "${ADMIN_BUILD_PREIMAGE_SHA256}  ${offline_source}/runtime/admin/build.gradle.kts" \
            | sha256sum --check --strict
          install -m 0644 \
            "${offline_home}/verification-metadata.xml" \
            "${offline_source}/gradle/verification-metadata.xml"
          rm "${offline_home}/verification-metadata.xml"
          docker run --rm \
            --platform linux/arm64 \
            --network none \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/gradle-user \
            --env GRADLE_USER_HOME=/gradle-home \
            --volume "${offline_source}:/workspace" \
            --volume "${offline_home}:/gradle-home" \
            --workdir /workspace \
            "${BUILDER_IMAGE}" \
            gradle \
              --offline \
              --dependency-verification strict \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache \
              --rerun-tasks \
              :polaris-admin:assemble \
              :polaris-admin:quarkusAppPartsBuild \
              :polaris-server:assemble \
              :polaris-server:quarkusAppPartsBuild
          CANDIDATE_DIR="${candidate_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          candidate = Path(os.environ["CANDIDATE_DIR"])
          descriptor_path = candidate / "gradle-dependency-inputs.json"
          descriptor = json.loads(descriptor_path.read_text(encoding="utf-8"))
          evidence = {
              "schema_version": 1,
              "result": "passed",
              "platform": "linux/arm64",
              "fresh_source_tree": True,
              "fresh_gradle_home": True,
              "network": "none",
              "gradle_offline": True,
              "dependency_verification": "strict",
              "build_cache": False,
              "configuration_cache": False,
              "tasks": [
                  ":polaris-admin:assemble",
                  ":polaris-admin:quarkusAppPartsBuild",
                  ":polaris-server:assemble",
                  ":polaris-server:quarkusAppPartsBuild",
              ],
              "descriptor_sha256": hashlib.sha256(
                  descriptor_path.read_bytes()
              ).hexdigest(),
              "archive_sha256": descriptor["archive"]["sha256"],
              "verification_metadata_sha256": descriptor[
                  "verification_metadata"
              ]["sha256"],
          }
          (candidate / "offline-build.json").write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Record the dependency resolver evidence
        id: candidate
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          docker_version=$(docker version --format '{{.Client.Version}}')
          DOCKER_VERSION="${docker_version}" \
          CANDIDATE_DIR="${candidate_dir}" \
          python3 - <<'PY'
          import json
          import os
          import platform
          import subprocess
          from pathlib import Path

          def version(command):
              return subprocess.run(
                  command,
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.splitlines()[0]

          evidence = {
              "schema_version": 1,
              "runner": "ubuntu-24.04-arm",
              "platform": platform.platform(),
              "builder_image": os.environ["BUILDER_IMAGE"],
              "builder_platform": os.environ["OBSERVED_BUILDER_PLATFORM"],
              "gradle": os.environ["OBSERVED_BUILDER_GRADLE"],
              "java": os.environ["OBSERVED_BUILDER_JAVA"],
              "java_major": int(
                  os.environ["OBSERVED_BUILDER_JAVA_MAJOR"]
              ),
              "docker": os.environ["DOCKER_VERSION"],
              "oras": version(["oras", "version"]),
              "python": platform.python_version(),
              "gpg": version(["gpg", "--version"]),
              "curl": version(["curl", "--version"]),
              "tar": version(["tar", "--version"]),
          }
          candidate = Path(os.environ["CANDIDATE_DIR"])
          (candidate / "toolchain.json").write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          (
            cd "${candidate_dir}"
            sha256sum \
              gradle-dependency-inputs.json \
              offline-build.json \
              polaris-gradle-dependencies-1.6.0.tar.gz \
              superset-proof.json \
              toolchain.json \
              verification-metadata.xml \
              > candidate.sha256
          )
          CANDIDATE_DIR="${candidate_dir}" python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          candidate = Path(os.environ["CANDIDATE_DIR"])
          outputs = {
              "candidate_artifact_name": (
                  "polaris-admin-candidate-"
                  f"{os.environ['GITHUB_RUN_ID']}-"
                  f"{os.environ['GITHUB_RUN_ATTEMPT']}"
              ),
              "archive_sha256": hashlib.sha256(
                  (
                      candidate
                      / "polaris-gradle-dependencies-1.6.0.tar.gz"
                  ).read_bytes()
              ).hexdigest(),
              "descriptor_sha256": hashlib.sha256(
                  (candidate / "gradle-dependency-inputs.json").read_bytes()
              ).hexdigest(),
              "metadata_sha256": hashlib.sha256(
                  (candidate / "verification-metadata.xml").read_bytes()
              ).hexdigest(),
              "offline_sha256": hashlib.sha256(
                  (candidate / "offline-build.json").read_bytes()
              ).hexdigest(),
              "superset_sha256": hashlib.sha256(
                  (candidate / "superset-proof.json").read_bytes()
              ).hexdigest(),
              "toolchain_sha256": hashlib.sha256(
                  (candidate / "toolchain.json").read_bytes()
              ).hexdigest(),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in outputs.items():
                  output.write(f"{key}={value}\n")
          PY

      - name: Retain the read-only-verified candidate
        if: steps.lifecycle.outputs.active == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.candidate.outputs.candidate_artifact_name }}
          path: |
            ${{ runner.temp }}/polaris-admin-candidate/candidate.sha256
            ${{ runner.temp }}/polaris-admin-candidate/gradle-dependency-inputs.json
            ${{ runner.temp }}/polaris-admin-candidate/offline-build.json
            ${{ runner.temp }}/polaris-admin-candidate/polaris-gradle-dependencies-1.6.0.tar.gz
            ${{ runner.temp }}/polaris-admin-candidate/superset-proof.json
            ${{ runner.temp }}/polaris-admin-candidate/toolchain.json
            ${{ runner.temp }}/polaris-admin-candidate/verification-metadata.xml
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    needs: validate
    if: >-
      github.repository == 'TommyKammy/Shirokuma' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.sha == github.workflow_sha &&
      needs.validate.result == 'success' &&
      needs.validate.outputs.active == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Enforce the main-source trust boundary
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_EVENT_NAME}" = "push"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          case "${GITHUB_SHA}" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f])
              ;;
            *)
              echo "source SHA is not a lowercase 40-character Git object ID" >&2
              exit 1
              ;;
          esac

      - name: Check out the reviewed publication policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Revalidate the write-capable publication boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          python3 scripts/verify_polaris_admin_build_inputs.py audit --root .
          state=$(
            python3 -c \
              'import json; print(json.load(open("bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json"))["lifecycle"]["state"])'
          )
          test "${state}" = "admin_dependency_snapshot_publication_pending"

      - name: Download the exact read-only-verified candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.validate.outputs.candidate_artifact_name }}
          path: ${{ runner.temp }}/polaris-admin-candidate

      - name: Bind candidate bytes to the read-only verification
        id: candidate
        env:
          EXPECTED_ARCHIVE_SHA256: ${{ needs.validate.outputs.archive_sha256 }}
          EXPECTED_DESCRIPTOR_SHA256: ${{ needs.validate.outputs.descriptor_sha256 }}
          EXPECTED_METADATA_SHA256: ${{ needs.validate.outputs.metadata_sha256 }}
          EXPECTED_OFFLINE_SHA256: ${{ needs.validate.outputs.offline_sha256 }}
          EXPECTED_SUPERSET_SHA256: ${{ needs.validate.outputs.superset_sha256 }}
          EXPECTED_TOOLCHAIN_SHA256: ${{ needs.validate.outputs.toolchain_sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          (
            cd "${candidate_dir}"
            sha256sum --check --strict candidate.sha256
          )
          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${candidate_dir}/gradle-dependency-inputs.json" \
            --verification-metadata "${candidate_dir}/verification-metadata.xml" \
            --archive "${candidate_dir}/polaris-gradle-dependencies-1.6.0.tar.gz"
          CANDIDATE_DIR="${candidate_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          candidate = Path(os.environ["CANDIDATE_DIR"])

          def sha256(name):
              return hashlib.sha256((candidate / name).read_bytes()).hexdigest()

          offline = json.loads(
              (candidate / "offline-build.json").read_text(encoding="utf-8")
          )
          superset = json.loads(
              (candidate / "superset-proof.json").read_text(encoding="utf-8")
          )
          expected_tasks = [
              ":polaris-admin:assemble",
              ":polaris-admin:quarkusAppPartsBuild",
              ":polaris-server:assemble",
              ":polaris-server:quarkusAppPartsBuild",
          ]
          if (
              offline.get("result") != "passed"
              or offline.get("network") != "none"
              or offline.get("gradle_offline") is not True
              or offline.get("dependency_verification") != "strict"
              or offline.get("build_cache") is not False
              or offline.get("configuration_cache") is not False
              or offline.get("fresh_source_tree") is not True
              or offline.get("fresh_gradle_home") is not True
              or offline.get("tasks") != expected_tasks
          ):
              raise SystemExit("offline proof is not the closed-world proof")
          if (
              superset.get("result") != "passed"
              or superset.get("relationship")
              != "exact-module-artifact-superset"
              or superset.get("parent_descriptor_sha256")
              != os.environ["PARENT_DESCRIPTOR_SHA256"]
          ):
              raise SystemExit("parent module superset proof differs")
          outputs = {
              "archive_sha256": sha256(
                  "polaris-gradle-dependencies-1.6.0.tar.gz"
              ),
              "descriptor_sha256": sha256("gradle-dependency-inputs.json"),
              "metadata_sha256": sha256("verification-metadata.xml"),
              "offline_sha256": sha256("offline-build.json"),
              "superset_sha256": sha256("superset-proof.json"),
              "toolchain_sha256": sha256("toolchain.json"),
          }
          expected = {
              "archive_sha256": os.environ["EXPECTED_ARCHIVE_SHA256"],
              "descriptor_sha256": os.environ["EXPECTED_DESCRIPTOR_SHA256"],
              "metadata_sha256": os.environ["EXPECTED_METADATA_SHA256"],
              "offline_sha256": os.environ["EXPECTED_OFFLINE_SHA256"],
              "superset_sha256": os.environ["EXPECTED_SUPERSET_SHA256"],
              "toolchain_sha256": os.environ["EXPECTED_TOOLCHAIN_SHA256"],
          }
          if outputs != expected:
              raise SystemExit(
                  "downloaded candidate bytes differ from read-only job outputs"
              )
          if outputs["archive_sha256"] != offline["archive_sha256"]:
              raise SystemExit("offline proof archive hash differs")
          if outputs["descriptor_sha256"] != offline["descriptor_sha256"]:
              raise SystemExit("offline proof descriptor hash differs")
          if (
              outputs["metadata_sha256"]
              != offline["verification_metadata_sha256"]
          ):
              raise SystemExit("offline proof metadata hash differs")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in outputs.items():
                  output.write(f"{key}={value}\n")
          PY

      - name: Install checksum-pinned ORAS for publication
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/oras-publish.tar.gz"
          install_dir="${RUNNER_TEMP}/oras-publish-bin"
          mkdir -p "${install_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "${ORAS_URL}" --output "${archive}"
          echo "${ORAS_ARCHIVE_SHA256}  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" \
            --directory "${install_dir}" oras
          chmod 0755 "${install_dir}/oras"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          test "$("${install_dir}/oras" version | awk '/Version:/ {print $2}')" \
            = "${ORAS_VERSION}"

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Publish the run-scoped immutable OCI artifact
        id: push
        env:
          GHCR_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          tag="${ARTIFACT_REPOSITORY}:1.6.0-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          created=$(git show -s --no-show-signature --format=%cI "${GITHUB_SHA}")
          if ! [[ "${created}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}([+-][0-9]{2}:[0-9]{2}|Z)$ ]]; then
            echo "git committer date is not strict RFC 3339" >&2
            exit 1
          fi
          echo "${GHCR_TOKEN}" \
            | oras login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          set +e
          resolve_error=$(oras resolve "${tag}" 2>&1)
          resolve_status=$?
          set -e
          if [ "${resolve_status}" -eq 0 ]; then
            echo "run-scoped OCI tag already exists; refusing overwrite" >&2
            exit 1
          fi
          if ! grep --extended-regexp --ignore-case --quiet \
            '(manifest unknown|name unknown|not found|status code: 404)' \
            <<< "${resolve_error}"; then
            echo "cannot prove that the run-scoped OCI tag is absent" >&2
            printf '%s\n' "${resolve_error}" >&2
            exit 1
          fi
          (
            cd "${candidate_dir}"
            oras push \
              --image-spec v1.1 \
              --artifact-type "${ARTIFACT_TYPE}" \
              --annotation \
                "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
              --annotation "org.opencontainers.image.created=${created}" \
              --export-manifest "oci-manifest.json" \
              "${tag}" \
              "gradle-dependency-inputs.json:${DESCRIPTOR_MEDIA_TYPE}" \
              "polaris-gradle-dependencies-1.6.0.tar.gz:${ARCHIVE_MEDIA_TYPE}"
          )
          digest=$(oras resolve "${tag}")
          if ! [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "ORAS returned an invalid manifest digest" >&2
            exit 1
          fi
          echo "PUBLISHED_TAG=${tag}" >> "${GITHUB_ENV}"
          echo "PUBLISHED_CREATED=${created}" >> "${GITHUB_ENV}"
          echo "PUBLISHED_DIGEST=${digest}" >> "${GITHUB_ENV}"
          echo "PUBLISHED_REFERENCE=${ARTIFACT_REPOSITORY}@${digest}" \
            >> "${GITHUB_ENV}"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "reference=${ARTIFACT_REPOSITORY}@${digest}" \
            >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Bind the raw OCI manifest to both artifact layers
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          CANDIDATE_DIR="${candidate_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          candidate = Path(os.environ["CANDIDATE_DIR"])
          manifest_path = candidate / "oci-manifest.json"
          manifest_bytes = manifest_path.read_bytes()
          manifest = json.loads(manifest_bytes)
          digest = "sha256:" + hashlib.sha256(manifest_bytes).hexdigest()
          if digest != os.environ["PUBLISHED_DIGEST"]:
              raise SystemExit("raw OCI manifest digest differs from ORAS")
          if set(manifest) != {
              "schemaVersion",
              "mediaType",
              "artifactType",
              "config",
              "layers",
              "annotations",
          }:
              raise SystemExit("OCI manifest root is not closed-world")
          if (
              manifest["schemaVersion"] != 2
              or manifest["mediaType"]
              != "application/vnd.oci.image.manifest.v1+json"
              or manifest["artifactType"] != os.environ["ARTIFACT_TYPE"]
          ):
              raise SystemExit("OCI manifest identity differs from contract")
          config = manifest["config"]
          if (
              set(config) != {"mediaType", "digest", "size", "data"}
              or manifest["annotations"]
              != {
                  "org.opencontainers.image.created": os.environ[
                      "PUBLISHED_CREATED"
                  ],
                  "org.opencontainers.image.revision": os.environ[
                      "GITHUB_SHA"
                  ],
                  "org.opencontainers.image.source": (
                      "https://github.com/" + os.environ["GITHUB_REPOSITORY"]
                  ),
              }
              or config.get("mediaType")
              != "application/vnd.oci.empty.v1+json"
              or config.get("digest")
              != "sha256:44136fa355b3678a1146ad16f7e8649e94fb4fc21fe77e8310c060f61caaff8a"
              or config.get("size") != 2
              or config.get("data") != "e30="
          ):
              raise SystemExit("OCI empty config differs from contract")
          expected = [
              (
                  candidate / "gradle-dependency-inputs.json",
                  os.environ["DESCRIPTOR_MEDIA_TYPE"],
              ),
              (
                  candidate / "polaris-gradle-dependencies-1.6.0.tar.gz",
                  os.environ["ARCHIVE_MEDIA_TYPE"],
              ),
          ]
          layers = manifest.get("layers")
          if not isinstance(layers, list) or len(layers) != len(expected):
              raise SystemExit("OCI artifact must contain exactly two layers")
          for layer, (path, media_type) in zip(layers, expected):
              if set(layer) != {
                  "mediaType",
                  "digest",
                  "size",
                  "annotations",
              }:
                  raise SystemExit("OCI layer descriptor is not closed-world")
              expected_digest = (
                  "sha256:" + hashlib.sha256(path.read_bytes()).hexdigest()
              )
              if (
                  layer["mediaType"] != media_type
                  or layer["digest"] != expected_digest
                  or layer["size"] != path.stat().st_size
                  or layer["annotations"]
                  != {"org.opencontainers.image.title": path.name}
              ):
                  raise SystemExit(
                      f"OCI layer differs from retained bytes: {path.name}"
                  )
          if not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
              raise SystemExit("OCI manifest digest is invalid")
          PY

      - name: Keyless-sign the exact OCI manifest
        env:
          GHCR_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-build-inputs.yml@${GITHUB_REF}"
          echo "${GHCR_TOKEN}" \
            | oras login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          cosign sign --yes \
            --bundle "${candidate_dir}/cosign-signature-bundle.json" \
            "${PUBLISHED_REFERENCE}"
          cosign verify-blob \
            --bundle "${candidate_dir}/cosign-signature-bundle.json" \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            "${candidate_dir}/oci-manifest.json"
          cosign verify \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            --output json \
            "${PUBLISHED_REFERENCE}" \
            > "${candidate_dir}/cosign-verify.json"

      - name: Publish SLSA provenance for the exact OCI manifest
        id: provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.ARTIFACT_REPOSITORY }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Prove anonymous exact-digest retrieval
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          oras logout ghcr.io
          anonymous_config="${RUNNER_TEMP}/anonymous-admin-registry-config.json"
          anonymous_dir="${RUNNER_TEMP}/anonymous-admin-pull"
          printf '{}\n' > "${anonymous_config}"
          mkdir -p "${anonymous_dir}"
          oras pull \
            --registry-config "${anonymous_config}" \
            --output "${anonymous_dir}" \
            "${PUBLISHED_REFERENCE}"
          cmp \
            "${candidate_dir}/gradle-dependency-inputs.json" \
            "${anonymous_dir}/gradle-dependency-inputs.json"
          cmp \
            "${candidate_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            "${anonymous_dir}/polaris-gradle-dependencies-1.6.0.tar.gz"
          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${anonymous_dir}/gradle-dependency-inputs.json" \
            --verification-metadata "${candidate_dir}/verification-metadata.xml" \
            --archive "${anonymous_dir}/polaris-gradle-dependencies-1.6.0.tar.gz"

      - name: Verify the exact workflow provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          gh attestation verify "oci://${PUBLISHED_REFERENCE}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --signer-workflow \
              "${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-build-inputs.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --format json \
            > "${candidate_dir}/slsa-verify.json"

      - name: Record the review-required publication
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="${RUNNER_TEMP}/polaris-admin-candidate"
          CANDIDATE_DIR="${candidate_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          candidate = Path(os.environ["CANDIDATE_DIR"])

          def file_record(name):
              path = candidate / name
              return {
                  "filename": name,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  "size": path.stat().st_size,
              }

          expected_surface = {
              "review_state": "review_required",
              "relational_only": False,
              "unconditional_project_dependencies": [
                  ":polaris-persistence-nosql-api",
                  ":polaris-persistence-nosql-maintenance-api",
                  ":polaris-persistence-nosql-metastore",
                  ":polaris-persistence-nosql-cdi-quarkus",
                  ":polaris-persistence-nosql-cdi-quarkus-distcache",
                  ":polaris-persistence-nosql-maintenance-impl",
                  ":polaris-persistence-nosql-metastore-maintenance",
              ],
              "unconditional_external_dependencies": [
                  "io.quarkus:quarkus-mongodb-client"
              ],
          }
          gates = {
              "admin_image_publication_enabled": False,
              "admin_image_admitted": False,
              "admin_runtime_enabled": False,
              "gitops_resources_enabled": False,
              "credential_material_permitted": False,
          }
          record = {
              "schema_version": 1,
              "state": "admin_dependency_snapshot_review_pending",
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "event": os.environ["GITHUB_EVENT_NAME"],
              "ref": os.environ["GITHUB_REF"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "artifact_repository": os.environ["ARTIFACT_REPOSITORY"],
              "artifact_reference": os.environ["PUBLISHED_REFERENCE"],
              "artifact_type": os.environ["ARTIFACT_TYPE"],
              "created": os.environ["PUBLISHED_CREATED"],
              "parent_artifact_reference": os.environ[
                  "PARENT_ARTIFACT_REFERENCE"
              ],
              "parent_descriptor_sha256": os.environ[
                  "PARENT_DESCRIPTOR_SHA256"
              ],
              "source_admin_build_preimage_sha256": os.environ[
                  "ADMIN_BUILD_PREIMAGE_SHA256"
              ],
              "tasks": [
                  ":polaris-admin:assemble",
                  ":polaris-admin:quarkusAppPartsBuild",
                  ":polaris-server:assemble",
                  ":polaris-server:quarkusAppPartsBuild",
              ],
              "admin_dependency_surface": expected_surface,
              "downstream_gates": gates,
              "files": [
                  file_record("gradle-dependency-inputs.json"),
                  file_record("polaris-gradle-dependencies-1.6.0.tar.gz"),
                  file_record("verification-metadata.xml"),
                  file_record("offline-build.json"),
                  file_record("superset-proof.json"),
                  file_record("toolchain.json"),
                  file_record("oci-manifest.json"),
                  file_record("cosign-signature-bundle.json"),
                  file_record("cosign-verify.json"),
                  file_record("slsa-verify.json"),
              ],
          }
          if record["source_sha"] != record["workflow_sha"]:
              raise SystemExit("publication source and workflow SHA differ")
          (candidate / "publication.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          evidence_names = [
              "candidate.sha256",
              "cosign-signature-bundle.json",
              "cosign-verify.json",
              "gradle-dependency-inputs.json",
              "offline-build.json",
              "oci-manifest.json",
              "publication.json",
              "slsa-verify.json",
              "superset-proof.json",
              "toolchain.json",
              "verification-metadata.xml",
          ]
          with (candidate / "evidence.sha256").open(
              "w", encoding="utf-8", newline="\n"
          ) as manifest:
              for name in evidence_names:
                  manifest.write(
                      f"{hashlib.sha256((candidate / name).read_bytes()).hexdigest()}  {name}\n"
                  )
          PY
          (
            cd "${candidate_dir}"
            sha256sum --check --strict evidence.sha256
          )

      - name: Retain review-required publication evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-admin-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/polaris-admin-candidate/candidate.sha256
            ${{ runner.temp }}/polaris-admin-candidate/cosign-signature-bundle.json
            ${{ runner.temp }}/polaris-admin-candidate/cosign-verify.json
            ${{ runner.temp }}/polaris-admin-candidate/evidence.sha256
