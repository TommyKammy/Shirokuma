name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: 1.12.3

      - name: Set up verified Helm
        env:
          HELM_VERSION: v4.2.2
          HELM_ARCHIVE_SHA256: 9adafecab4d406853bba163a70e9f104f47dbbf65ce24b7653bae7e36150bcb6
        run: |
          set -euo pipefail
          archive="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          bin_dir="${RUNNER_TEMP}/helm-bin"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://get.helm.sh/${archive}" -o "${archive_path}"
          echo "${HELM_ARCHIVE_SHA256}  ${archive_path}" \
            | sha256sum --check --strict
          mkdir -p "${bin_dir}"
          tar -xzf "${archive_path}" -C "${bin_dir}" \
            --strip-components=1 linux-amd64/helm
          chmod 0755 "${bin_dir}/helm"
          echo "${bin_dir}" >> "${GITHUB_PATH}"

      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Set up verified kubectl
        env:
          KUBECTL_VERSION: v1.36.2
          KUBECTL_SHA256: 1e9045ec32bea85da43de85f0065358529ea7c7a152eca78154fba5b58c27d82
        run: |
          set -euo pipefail
          kubectl_bin="${RUNNER_TEMP}/kubectl"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" \
            -o "${kubectl_bin}.download"
          echo "${KUBECTL_SHA256}  ${kubectl_bin}.download" \
            | sha256sum --check --strict
          install -m 0755 "${kubectl_bin}.download" "${kubectl_bin}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Set up verified Flux CLI
        env:
          FLUX_VERSION: v2.9.2
          FLUX_ARCHIVE_SHA256: 4092b367fd060097976fb7261601f79420ecf7266328417dfd8dfee27de0e6a3
        run: |
          set -euo pipefail
          version="${FLUX_VERSION#v}"
          archive="flux_${version}_linux_amd64.tar.gz"
          release_url="https://github.com/fluxcd/flux2/releases/download/${FLUX_VERSION}"
          checksums="${RUNNER_TEMP}/flux-checksums.txt"
          certificate="${RUNNER_TEMP}/flux-checksums.pem"
          signature="${RUNNER_TEMP}/flux-checksums.sig"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/flux_${version}_checksums.txt" -o "${checksums}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/flux_${version}_checksums.txt.pem" \
            | base64 --decode > "${certificate}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/flux_${version}_checksums.txt.sig" -o "${signature}"
          cosign verify-blob \
            --certificate "${certificate}" \
            --signature "${signature}" \
            --certificate-identity "https://github.com/fluxcd/flux2/.github/workflows/release.yaml@refs/tags/${FLUX_VERSION}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${checksums}"
          grep --fixed-strings --line-regexp --quiet \
            "${FLUX_ARCHIVE_SHA256}  ${archive}" "${checksums}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          echo "${FLUX_ARCHIVE_SHA256}  ${RUNNER_TEMP}/${archive}" \
            | sha256sum --check --strict
          mkdir -p "${RUNNER_TEMP}/flux-bin"
          tar -xzf "${RUNNER_TEMP}/${archive}" \
            -C "${RUNNER_TEMP}/flux-bin" flux
          chmod 0755 "${RUNNER_TEMP}/flux-bin/flux"
          echo "${RUNNER_TEMP}/flux-bin" >> "${GITHUB_PATH}"

      - name: Set up verified Kyverno CLI
        env:
          KYVERNO_VERSION: v1.18.2
        run: |
          set -euo pipefail
          archive="kyverno-cli_${KYVERNO_VERSION}_linux_x86_64.tar.gz"
          release_url="https://github.com/kyverno/kyverno/releases/download/${KYVERNO_VERSION}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "${release_url}/${archive}.sigstore.json" \
            -o "${RUNNER_TEMP}/${archive}.sigstore.json"
          cosign verify-blob \
            --bundle "${RUNNER_TEMP}/${archive}.sigstore.json" \
            --certificate-identity "https://github.com/kyverno/kyverno/.github/workflows/release.yaml@refs/tags/${KYVERNO_VERSION}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${RUNNER_TEMP}/${archive}"
          mkdir -p "${RUNNER_TEMP}/kyverno-bin"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}/kyverno-bin" kyverno
          chmod 0755 "${RUNNER_TEMP}/kyverno-bin/kyverno"
          echo "${RUNNER_TEMP}/kyverno-bin" >> "${GITHUB_PATH}"

      - name: Run repo-owned checks
        run: make verify

      - name: Set up exact Go for vendor provenance regeneration
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: false

      - name: Reproduce retained vendor inputs from authenticated modules
        shell: bash
        run: |
          set -euo pipefail
          source_commit=$(python3 -c \
            'import json; print(json.load(open("bootstrap/seaweedfs/v4.39/source.json"))["commit"])')
          source_root="${RUNNER_TEMP}/seaweedfs-source"
          git init "${source_root}"
          git -C "${source_root}" remote add origin \
            https://github.com/seaweedfs/seaweedfs
          git -C "${source_root}" fetch --depth=1 origin "${source_commit}"
          git -C "${source_root}" checkout --detach FETCH_HEAD
          python3 scripts/package_go_vendor.py reproduce \
            --source-root "${source_root}" \
            --source-record bootstrap/seaweedfs/v4.39/source.json \
            --bundle bootstrap/seaweedfs/v4.39/go-vendor.tar.xz \
            --manifest bootstrap/seaweedfs/v4.39/go-module-inputs.json
