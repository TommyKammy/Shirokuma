name: Polaris 1.6.0 trusted arm64 image publication

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/polaris-arm64.yml
      - bootstrap/polaris/v1.6.0/Containerfile
      - bootstrap/polaris/v1.6.0/source.json
      - bootstrap/polaris/v1.6.0/trusted-build-contract.json
      - bootstrap/polaris/v1.6.0/admission.json
      - bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
      - bootstrap/polaris/v1.6.0/patches/0001-shirokuma-bounded-runtime.patch
      - bootstrap/polaris/v1.6.0/evidence/**
      - scripts/package_polaris_gradle_dependencies.py
      - scripts/validate_polaris_source_archive.py
      - scripts/verify_polaris_trusted_image.py
      - tests/test_package_polaris_gradle_dependencies.py
      - tests/test_polaris_trusted_image_contract.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: polaris-1.6.0-arm64-publication
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/tommykammy/shirokuma-polaris
  TRUSTED_TAG: 1.6.0-arm64
  SOURCE_ARCHIVE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz
  SOURCE_SIGNATURE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.asc
  SOURCE_CHECKSUM_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.sha512
  SOURCE_ARCHIVE_SHA512: d69b1a91e16e210a78dec327fc4725983b114fbec5d86d078a3827f35fe7dd5df3e4b12d18965e5a72eace65ad224aa007004ed61c66f9abb2efafc44ceac95b
  SOURCE_SIGNATURE_SHA256: 2338e1c2385874e9bf5cf513b4d27732b1cd59e943e1662e62fa995d915e6481
  SOURCE_SIGNING_KEY_FINGERPRINT: F2EE EB06 110B EE13 97EC 74CB B896 0FF5 2D9B 1312
  SOURCE_COMMIT: dd306009d81a0e15adafe9dcd7d1c6d04d326f34
  SOURCE_CREATED: "2026-07-04T05:22:21Z"
  SOURCE_DATE_EPOCH: "1783142541"
  DEPENDENCY_REF: ghcr.io/tommykammy/shirokuma-polaris-gradle-dependencies@sha256:fa889d2c0a6e6dc48816d79680a366e21040be333ab6007b88e4ca4dbf6e59d6
  DEPENDENCY_MANIFEST_DIGEST: sha256:fa889d2c0a6e6dc48816d79680a366e21040be333ab6007b88e4ca4dbf6e59d6
  DEPENDENCY_DESCRIPTOR_SHA256: 3bab7b055d29be1bc59f2fe605960f49bbceee2639ad68086822c62ee8533841
  DEPENDENCY_ARCHIVE_SHA256: 18933bfb895c267302f1ee1c80cfb9712eac736ffcefade48dac53f79e8e3bc0
  DEPENDENCY_VERIFICATION_METADATA_SHA256: b8b1fa91bc9d98eaf676dbab76c5452411fcdf6b11a8c9959c131799c71deaf2
  BUILDER_IMAGE: docker.io/library/gradle@sha256:cc583fa5245267fe0e1546c9989e8575473a37336ad9894dc0684a99fea1fb03
  RUNTIME_BASE: docker.io/library/amazoncorretto@sha256:ba1fe4a3fd4c6b70360183fccd1f0a168c3ea6f73709e8f81945cb9087431ff2
  RUNTIME_BASE_DIGEST: sha256:ba1fe4a3fd4c6b70360183fccd1f0a168c3ea6f73709e8f81945cb9087431ff2
  RUNTIME_PATCH_SHA256: c5739a49baac0d08e6cf71a4dabd06141618f9474702e6c24fd1bb7f22571f48
  CONTAINERFILE_SHA256: e2aea29a93ac4369fc558c2161966fa48e3061238cc41ae849788f8e8e4cfea8
  SERVER_BUILD_PREIMAGE_SHA256: 6394f787e0b0a48a7a916824306c3e4fe54556c7f639aeb47330a63111e05f16
  SERVER_BUILD_POSTIMAGE_SHA256: 597b456dec2ac138d40f78fdf27ad84248d83242465ff25c78d3d8a06f37675b
  SERVICE_BUILD_PREIMAGE_SHA256: c5f351b2444d37efcbd99b4ad850456b33894257390ccf5ece595002c33f548b
  SERVICE_BUILD_POSTIMAGE_SHA256: f497e81fdb2d34e4fff2ef1b4f8f97c974afca1080d097e5c40fc149f7a6ec95
  ORAS_VERSION: 1.3.3
  ORAS_URL: https://github.com/oras-project/oras/releases/download/v1.3.3/oras_1.3.3_linux_arm64.tar.gz
  ORAS_ARCHIVE_SHA256: ac7156f93a21e903f7ad606c792f3560f17e0cd0e36365634701b1e7cc4e4eca
  BUILDX_VERSION: v0.35.0
  BUILDX_URL: https://github.com/docker/buildx/releases/download/v0.35.0/buildx-v0.35.0.linux-arm64
  BUILDX_BINARY_SHA256: c4248d6cbc4a619a7e0b4609c11e509ad4ac0b475e1c64817c0ac20c5d90c766
  BUILDKIT_VERSION: v0.31.1
  BUILDKIT_IMAGE: moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
  BUILDKIT_IMAGE_DIGEST: sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
  BUILDKIT_ARM64_MANIFEST_DIGEST: sha256:4eee950fb9d134cbf4e228ea3906eb4c7403323334af013c443302f7b74f2737
  CRANE_VERSION: v0.21.7
  CRANE_URL: https://github.com/google/go-containerregistry/releases/download/v0.21.7/go-containerregistry_Linux_arm64.tar.gz
  CRANE_ARCHIVE_SHA256: b6ee979d9411dfb05ce35ab9e156fe5de7def11a230764a7856ffa2eb971fa88
  SYFT_VERSION: v1.46.0
  TRIVY_VERSION: v0.72.0
  COSIGN_VERSION: v3.1.1
  REKOR_URL: https://rekor.sigstore.dev
  REKOR_MAJOR_API_VERSION: "1"

jobs:
  prepare:
    if: >-
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      active: ${{ steps.lifecycle.outputs.active }}
      context_sha256: ${{ steps.stage.outputs.context_sha256 }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      artifact_name: polaris-1.6.0-arm64-build-input-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out the reviewed Polaris publication policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Bind the run to reviewed main and check publication lifecycle
        id: lifecycle
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          case "${GITHUB_EVENT_NAME}" in
            push|workflow_dispatch) ;;
            *) echo "unsupported workflow event: ${GITHUB_EVENT_NAME}" >&2; exit 1 ;;
          esac

          state=$(
            python3 -c \
              'import json; print(json.load(open("bootstrap/polaris/v1.6.0/trusted-build-contract.json"))["lifecycle"]["state"])'
          )
          case "${state}" in
            image_publication_pending)
              echo "active=true" >> "${GITHUB_OUTPUT}"
              ;;
            image_evidence_review_pending)
              echo "active=false" >> "${GITHUB_OUTPUT}"
              echo "Polaris image publisher is retired for this lifecycle state"
              ;;
            *)
              echo "unexpected Polaris image publication lifecycle: ${state}" >&2
              exit 1
              ;;
          esac

      - name: Validate the static publication bootstrap policy
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_trusted_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign for dependency evidence revalidation
        if: steps.lifecycle.outputs.active == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the cryptographic image-publication-pending audit
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_trusted_image.py audit --root .
          python3 -m unittest -v tests.test_package_polaris_gradle_dependencies

      - name: Install checksum-pinned ORAS without credentials
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "aarch64"
          tool_dir="${RUNNER_TEMP}/oras"
          mkdir -p "${tool_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/oras.tar.gz" "${ORAS_URL}"
          echo "${ORAS_ARCHIVE_SHA256}  ${tool_dir}/oras.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/oras.tar.gz" \
            --directory "${tool_dir}" oras
          install -m 0755 "${tool_dir}/oras" "${tool_dir}/oras.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/oras.bin" version | awk '$1 == "Version:" {print $2; exit}')" = \
            "${ORAS_VERSION}"

      - name: Anonymously fetch and verify the exact reviewed dependency snapshot
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          dependency_dir="${RUNNER_TEMP}/polaris-dependencies"
          gradle_home="${RUNNER_TEMP}/gradle-home"
          anonymous_config="${RUNNER_TEMP}/anonymous-registry-config.json"
          mkdir -p "${dependency_dir}"
          test ! -e "${gradle_home}"
          printf '{}\n' > "${anonymous_config}"

          oras.bin manifest fetch \
            --registry-config "${anonymous_config}" \
            --output "${dependency_dir}/oci-manifest.json" \
            "${DEPENDENCY_REF}"
          echo "${DEPENDENCY_MANIFEST_DIGEST#sha256:}  ${dependency_dir}/oci-manifest.json" \
            | sha256sum --check --strict
          oras.bin pull \
            --registry-config "${anonymous_config}" \
            --output "${dependency_dir}" \
            "${DEPENDENCY_REF}"

          expected_files=$(
            printf '%s\n' \
              gradle-dependency-inputs.json \
              oci-manifest.json \
              polaris-gradle-dependencies-1.6.0.tar.gz \
              | sort
          )
          actual_files=$(
            find "${dependency_dir}" -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"
          echo "${DEPENDENCY_DESCRIPTOR_SHA256}  ${dependency_dir}/gradle-dependency-inputs.json" \
            | sha256sum --check --strict
          echo "${DEPENDENCY_ARCHIVE_SHA256}  ${dependency_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            | sha256sum --check --strict

          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${dependency_dir}/gradle-dependency-inputs.json" \
            --verification-metadata \
              bootstrap/polaris/v1.6.0/evidence/verification-metadata.xml \
            --archive \
              "${dependency_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            --extract-root "${gradle_home}"
          cmp bootstrap/polaris/v1.6.0/evidence/verification-metadata.xml \
            "${gradle_home}/verification-metadata.xml"
          echo "${DEPENDENCY_VERIFICATION_METADATA_SHA256}  ${gradle_home}/verification-metadata.xml" \
            | sha256sum --check --strict

          DEPENDENCY_DIR="${dependency_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["DEPENDENCY_DIR"])
          descriptor = root / "gradle-dependency-inputs.json"
          archive = root / "polaris-gradle-dependencies-1.6.0.tar.gz"
          manifest = root / "oci-manifest.json"
          publication = json.loads(
              Path(
                  "bootstrap/polaris/v1.6.0/evidence/publication.json"
              ).read_text(encoding="utf-8")
          )
          expected_reference = os.environ["DEPENDENCY_REF"]
          if (
              publication.get("admitted") is not False
              or publication.get("anonymous_pull") is not True
              or publication.get("reference") != expected_reference
              or publication.get("state") != "dependency_snapshot_review_pending"
          ):
              raise SystemExit("reviewed dependency publication binding is invalid")
          record = {
              "schema_version": 1,
              "result": "passed",
              "anonymous_pull": True,
              "reference": expected_reference,
              "manifest_sha256": hashlib.sha256(manifest.read_bytes()).hexdigest(),
              "descriptor_sha256": hashlib.sha256(descriptor.read_bytes()).hexdigest(),
              "archive_sha256": hashlib.sha256(archive.read_bytes()).hexdigest(),
              "verification_metadata_sha256": os.environ[
                  "DEPENDENCY_VERIFICATION_METADATA_SHA256"
              ],
          }
          Path(os.environ["RUNNER_TEMP"], "dependency-input.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Fetch and authenticate the signed ASF source release
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_SIGNING_KEY_FINGERPRINT="${SOURCE_SIGNING_KEY_FINGERPRINT// /}"
          source_dir="${RUNNER_TEMP}/polaris-source"
          mkdir -p "${source_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_ARCHIVE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_SIGNATURE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.asc"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_CHECKSUM_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"
          echo "${SOURCE_ARCHIVE_SHA512}  ${source_dir}/apache-polaris-1.6.0.tar.gz" \
            | sha512sum --check --strict
          echo "${SOURCE_SIGNATURE_SHA256}  ${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            | sha256sum --check --strict
          grep --fixed-strings --quiet \
            "${SOURCE_ARCHIVE_SHA512}" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"

          export GNUPGHOME="${RUNNER_TEMP}/polaris-release-keyring"
          mkdir -m 0700 "${GNUPGHOME}"
          gpg --batch --import \
            bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
          actual_fingerprint=$(
            gpg --batch --with-colons --fingerprint \
              | awk -F: '$1 == "fpr" {print $10; exit}'
          )
          test "${actual_fingerprint}" = "${SOURCE_SIGNING_KEY_FINGERPRINT}"
          gpg --batch --verify \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz"
          python3 scripts/validate_polaris_source_archive.py \
            --archive "${source_dir}/apache-polaris-1.6.0.tar.gz"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "result": "passed",
              "archive_url": os.environ["SOURCE_ARCHIVE_URL"],
              "archive_sha512": os.environ["SOURCE_ARCHIVE_SHA512"],
              "signature_url": os.environ["SOURCE_SIGNATURE_URL"],
              "signature_sha256": os.environ["SOURCE_SIGNATURE_SHA256"],
              "signing_key_fingerprint": os.environ[
                  "SOURCE_SIGNING_KEY_FINGERPRINT"
              ],
              "source_commit": os.environ["SOURCE_COMMIT"],
              "source_created": os.environ["SOURCE_CREATED"],
          }
          Path(os.environ["RUNNER_TEMP"], "source-authentication.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build Polaris from retained dependencies with network disabled
        if: steps.lifecycle.outputs.active == 'true'
        timeout-minutes: 55
        shell: bash
        run: |
          set -euo pipefail
          source_archive="${RUNNER_TEMP}/polaris-source/apache-polaris-1.6.0.tar.gz"
          offline_source="${RUNNER_TEMP}/polaris-offline"
          gradle_home="${RUNNER_TEMP}/gradle-home"
          test ! -e "${offline_source}"
          test ! -L "${offline_source}"
          install -d -m 0700 "${offline_source}"
          tar --extract --gzip --file "${source_archive}" \
            --directory "${offline_source}" --strip-components 1 \
            --no-same-owner --no-same-permissions
          patch_path="${GITHUB_WORKSPACE}/bootstrap/polaris/v1.6.0/patches/0001-shirokuma-bounded-runtime.patch"
          test -f "${patch_path}"
          test ! -L "${patch_path}"
          echo "${RUNTIME_PATCH_SHA256}  ${patch_path}" \
            | sha256sum --check --strict
          echo "${SERVER_BUILD_PREIMAGE_SHA256}  ${offline_source}/runtime/server/build.gradle.kts" \
            | sha256sum --check --strict
          echo "${SERVICE_BUILD_PREIMAGE_SHA256}  ${offline_source}/runtime/service/build.gradle.kts" \
            | sha256sum --check --strict
          (
            cd "${offline_source}"
            git apply --check --whitespace=error-all "${patch_path}"
            git apply --whitespace=error-all "${patch_path}"
            git apply --reverse --check "${patch_path}"
          )
          echo "${SERVER_BUILD_POSTIMAGE_SHA256}  ${offline_source}/runtime/server/build.gradle.kts" \
            | sha256sum --check --strict
          echo "${SERVICE_BUILD_POSTIMAGE_SHA256}  ${offline_source}/runtime/service/build.gradle.kts" \
            | sha256sum --check --strict
          test "$(
            grep --fixed-strings --count \
              'runtimeOnly(project(":polaris-extensions-auth-opa"))' \
              "${offline_source}/runtime/server/build.gradle.kts"
          )" = "1"
          for removed_dependency in \
            'polaris-extensions-federation-hadoop' \
            'polaris-extensions-auth-ranger' \
            'implementation(libs.hadoop.client.api)' \
            'implementation(libs.hadoop.client.runtime)'
          do
            if grep --fixed-strings --quiet "${removed_dependency}" \
              "${offline_source}/runtime/server/build.gradle.kts" \
              "${offline_source}/runtime/service/build.gradle.kts"
            then
              echo "bounded runtime patch did not remove ${removed_dependency}" >&2
              exit 1
            fi
          done
          install -m 0644 "${gradle_home}/verification-metadata.xml" \
            "${offline_source}/gradle/verification-metadata.xml"
          rm "${gradle_home}/verification-metadata.xml"
          rm -rf "${offline_source}/runtime/server/build"

          docker pull --platform linux/arm64 "${BUILDER_IMAGE}"
          test "$(
            docker image inspect "${BUILDER_IMAGE}" --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"
          docker run --rm \
            --platform linux/arm64 \
            --network none \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/gradle-user \
            --env GRADLE_USER_HOME=/gradle-home \
            --env SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --tmpfs /tmp:rw,nosuid,nodev,size=1g \
            --volume "${offline_source}:/workspace:rw" \
            --volume "${gradle_home}:/gradle-home:rw" \
            --workdir /workspace \
            "${BUILDER_IMAGE}" \
            gradle \
              --offline \
              --dependency-verification strict \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache \
              --rerun-tasks \
              :polaris-server:assemble \
              :polaris-server:quarkusAppPartsBuild

          test -s "${offline_source}/runtime/server/build/quarkus-app/quarkus-run.jar"
          test -d "${offline_source}/runtime/server/build/quarkus-app/lib"
          test -d "${offline_source}/runtime/server/build/quarkus-app/app"
          test -d "${offline_source}/runtime/server/build/quarkus-app/quarkus"
          test -s "${offline_source}/runtime/server/distribution/LICENSE"
          test -s "${offline_source}/runtime/server/distribution/NOTICE"
          if find "${offline_source}/runtime/server/build/quarkus-app" \
            -type f -iname '*.jar' -print \
            | grep --ignore-case --extended-regexp \
              '(^|/)[^/]*(hadoop|ranger|jetty-http)[^/]*\.jar$'
          then
            echo "bounded Polaris runtime still contains a forbidden jar" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "result": "passed",
              "platform": "linux/arm64",
              "network": "none",
              "builder_image": os.environ["BUILDER_IMAGE"],
              "gradle_offline": True,
              "dependency_verification": "strict",
              "build_cache": False,
              "configuration_cache": False,
              "rerun_tasks": True,
              "tasks": [
                  ":polaris-server:assemble",
                  ":polaris-server:quarkusAppPartsBuild",
              ],
              "dependency_reference": os.environ["DEPENDENCY_REF"],
              "bounded_runtime_patch": {
                  "path": (
                      "bootstrap/polaris/v1.6.0/patches/"
                      "0001-shirokuma-bounded-runtime.patch"
                  ),
                  "sha256": os.environ["RUNTIME_PATCH_SHA256"],
                  "server_build_preimage_sha256": os.environ[
                      "SERVER_BUILD_PREIMAGE_SHA256"
                  ],
                  "server_build_postimage_sha256": os.environ[
                      "SERVER_BUILD_POSTIMAGE_SHA256"
                  ],
                  "service_build_preimage_sha256": os.environ[
                      "SERVICE_BUILD_PREIMAGE_SHA256"
                  ],
                  "service_build_postimage_sha256": os.environ[
                      "SERVICE_BUILD_POSTIMAGE_SHA256"
                  ],
                  "forbidden_runtime_jars": ["hadoop", "ranger", "jetty-http"],
              },
          }
          Path(os.environ["RUNNER_TEMP"], "offline-build.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Stage and retain the closed image build context
        if: steps.lifecycle.outputs.active == 'true'
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          offline_source="${RUNNER_TEMP}/polaris-offline"
          context="${RUNNER_TEMP}/polaris-runtime-context"
          artifact="${RUNNER_TEMP}/polaris-build-input"
          test ! -e "${context}"
          install -d -m 0755 "${context}/build" "${context}/distribution" "${artifact}"
          echo "${CONTAINERFILE_SHA256}  bootstrap/polaris/v1.6.0/Containerfile" \
            | sha256sum --check --strict
          install -m 0644 bootstrap/polaris/v1.6.0/Containerfile \
            "${context}/Containerfile"
          cp -a "${offline_source}/runtime/server/build/quarkus-app" \
            "${context}/build/quarkus-app"
          install -m 0644 "${offline_source}/runtime/server/distribution/LICENSE" \
            "${context}/distribution/LICENSE"
          install -m 0644 "${offline_source}/runtime/server/distribution/NOTICE" \
            "${context}/distribution/NOTICE"

          CONTEXT="${context}" python3 - <<'PY'
          import hashlib
          import os
          import stat
          from pathlib import Path

          root = Path(os.environ["CONTEXT"])
          allowed_roots = {"Containerfile", "build", "distribution"}
          if {path.name for path in root.iterdir()} != allowed_roots:
              raise SystemExit("closed image context has unexpected top-level paths")
          files = []
          for path in sorted(root.rglob("*")):
              mode = path.lstat().st_mode
              if path.is_symlink():
                  raise SystemExit(f"closed image context contains symlink: {path}")
              if not (stat.S_ISDIR(mode) or stat.S_ISREG(mode)):
                  raise SystemExit(f"closed image context contains special file: {path}")
              if mode & stat.S_IWOTH:
                  raise SystemExit(f"closed image context contains world-writable path: {path}")
              if path.is_file():
                  relative = path.relative_to(root).as_posix()
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  files.append((relative, digest))
          required = {
              "Containerfile",
              "build/quarkus-app/quarkus-run.jar",
              "distribution/LICENSE",
              "distribution/NOTICE",
          }
          if not required.issubset({name for name, _ in files}):
              raise SystemExit("closed image context is missing required files")
          Path(os.environ["RUNNER_TEMP"], "build-context.sha256").write_text(
              "".join(f"{digest}  {name}\n" for name, digest in files),
              encoding="utf-8",
          )
          PY

          tar --create --gzip --format=posix --sort=name \
            --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 --numeric-owner \
            --file "${artifact}/polaris-build-context.tar.gz" \
            --directory "${context}" .
          install -m 0644 "${RUNNER_TEMP}/build-context.sha256" \
            "${artifact}/build-context.sha256"
          install -m 0644 "${RUNNER_TEMP}/dependency-input.json" \
            "${artifact}/dependency-input.json"
          install -m 0644 "${RUNNER_TEMP}/source-authentication.json" \
            "${artifact}/source-authentication.json"
          install -m 0644 "${RUNNER_TEMP}/offline-build.json" \
            "${artifact}/offline-build.json"
          context_sha256=$(
            sha256sum "${artifact}/polaris-build-context.tar.gz" | cut -d' ' -f1
          )
          echo "context_sha256=${context_sha256}" >> "${GITHUB_OUTPUT}"
          ARTIFACT="${artifact}" CONTEXT_SHA256="${context_sha256}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifact = Path(os.environ["ARTIFACT"])
          record = {
              "schema_version": 1,
              "state": "image_publication_pending",
              "admitted": False,
              "context_archive_sha256": os.environ["CONTEXT_SHA256"],
              "context_manifest_sha256": hashlib.sha256(
                  (artifact / "build-context.sha256").read_bytes()
              ).hexdigest(),
              "repository": os.environ["GITHUB_REPOSITORY"],
              "ref": os.environ["GITHUB_REF"],
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          (artifact / "build-input.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload the read-only-verified image build input
        if: steps.lifecycle.outputs.active == 'true'
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-1.6.0-arm64-build-input-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/polaris-build-input/
          if-no-files-found: error
          retention-days: 7

  verify:
    needs: prepare
    if: >-
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.active == 'true' &&
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      candidate_artifact: polaris-1.6.0-arm64-candidate-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out the reviewed image publication policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Rebind the write-capable job to the static publication policy
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          python3 scripts/verify_polaris_trusted_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign before write-capable policy revalidation
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the write-capable cryptographic policy audit
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_trusted_image.py audit --root .

      - name: Download the exact read-only-verified image build input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: candidate-input

      - name: Revalidate and safely extract the closed context before credentials exist
        env:
          EXPECTED_CONTEXT_SHA256: ${{ needs.prepare.outputs.context_sha256 }}
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.prepare.outputs.artifact_digest }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          expected_files=$(
            printf '%s\n' \
              build-context.sha256 \
              build-input.json \
              dependency-input.json \
              offline-build.json \
              polaris-build-context.tar.gz \
              source-authentication.json \
              | sort
          )
          actual_files=$(
            find candidate-input -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"
          echo "${EXPECTED_CONTEXT_SHA256}  candidate-input/polaris-build-context.tar.gz" \
            | sha256sum --check --strict
          test "${EXPECTED_ARTIFACT_DIGEST}" != ""

          python3 - <<'PY'
          import json
          import os
          import tarfile
          from pathlib import Path, PurePosixPath

          record = json.loads(
              Path("candidate-input/build-input.json").read_text(encoding="utf-8")
          )
          expected = {
              "schema_version": 1,
              "state": "image_publication_pending",
              "admitted": False,
              "context_archive_sha256": os.environ["EXPECTED_CONTEXT_SHA256"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "ref": os.environ["GITHUB_REF"],
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          for key, value in expected.items():
              if record.get(key) != value:
                  raise SystemExit(f"build input binding mismatch for {key}")

          archive = Path("candidate-input/polaris-build-context.tar.gz")
          destination = Path("polaris-runtime-context")
          destination.mkdir(mode=0o755)
          with tarfile.open(archive, mode="r:gz") as bundle:
              for member in bundle.getmembers():
                  path = PurePosixPath(member.name)
                  if (
                      path.is_absolute()
                      or ".." in path.parts
                      or member.issym()
                      or member.islnk()
                      or not (member.isfile() or member.isdir())
                  ):
                      raise SystemExit(f"unsafe closed-context member: {member.name}")
              bundle.extractall(destination, filter="data")
          PY

          (
            cd polaris-runtime-context
            sha256sum --check --strict ../candidate-input/build-context.sha256
          )
          cmp bootstrap/polaris/v1.6.0/Containerfile \
            polaris-runtime-context/Containerfile
          test -s polaris-runtime-context/build/quarkus-app/quarkus-run.jar
          test -s polaris-runtime-context/distribution/LICENSE
          test -s polaris-runtime-context/distribution/NOTICE
          if find polaris-runtime-context/build/quarkus-app \
            -type f -iname '*.jar' -print \
            | grep --ignore-case --extended-regexp \
              '(^|/)[^/]*(hadoop|ranger|jetty-http)[^/]*\.jar$'
          then
            echo "closed image context contains a forbidden jar" >&2
            exit 1
          fi
          if find polaris-runtime-context -type l -print -quit | grep --quiet .; then
            echo "closed image context contains a symlink after extraction" >&2
            exit 1
          fi

      - name: Install and verify pinned Buildx, BuildKit, Crane, and runtime base
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "aarch64"

          export DOCKER_CONFIG="${RUNNER_TEMP}/docker-config"
          plugin_dir="${DOCKER_CONFIG}/cli-plugins"
          buildx_bin="${plugin_dir}/docker-buildx"
          mkdir -p "${plugin_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${buildx_bin}.download" "${BUILDX_URL}"
          echo "${BUILDX_BINARY_SHA256}  ${buildx_bin}.download" \
            | sha256sum --check --strict
          install -m 0755 "${buildx_bin}.download" "${buildx_bin}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "${GITHUB_ENV}"
          case "$(docker buildx version)" in
            *" ${BUILDX_VERSION} "*) ;;
            *) echo "unexpected Buildx version" >&2; exit 1 ;;
          esac

          tool_dir="${RUNNER_TEMP}/crane"
          mkdir -p "${tool_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/crane.tar.gz" "${CRANE_URL}"
          echo "${CRANE_ARCHIVE_SHA256}  ${tool_dir}/crane.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/crane.tar.gz" \
            --directory "${tool_dir}" crane
          install -m 0755 "${tool_dir}/crane" "${tool_dir}/crane.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/crane.bin" version)" = "${CRANE_VERSION#v}"

          docker buildx imagetools inspect --raw "${RUNTIME_BASE}" \
            > runtime-base-manifest.json
          echo "${RUNTIME_BASE_DIGEST#sha256:}  runtime-base-manifest.json" \
            | sha256sum --check --strict
          docker pull --platform linux/arm64 "${RUNTIME_BASE}"
          docker run --rm --platform linux/arm64 --network none \
            "${RUNTIME_BASE}" java -version > runtime-base-java-version.txt 2>&1
          grep --extended-regexp --quiet \
            'version "21([.][0-9]+)*"' runtime-base-java-version.txt

          docker buildx imagetools inspect --raw "${BUILDKIT_IMAGE}" \
            > "${RUNNER_TEMP}/buildkit-index.json"
          echo "${BUILDKIT_IMAGE_DIGEST#sha256:}  ${RUNNER_TEMP}/buildkit-index.json" \
            | sha256sum --check --strict
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          index = json.loads(
              Path(os.environ["RUNNER_TEMP"], "buildkit-index.json").read_text(
                  encoding="utf-8"
              )
          )
          matches = [
              item["digest"]
              for item in index.get("manifests", [])
              if item.get("platform", {}).get("os") == "linux"
              and item.get("platform", {}).get("architecture") == "arm64"
              and not item.get("platform", {}).get("variant")
          ]
          if matches != [os.environ["BUILDKIT_ARM64_MANIFEST_DIGEST"]]:
              raise SystemExit(f"unexpected BuildKit arm64 manifest: {matches}")
          PY

          builder_name="shirokuma-polaris-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker buildx create \
            --name "${builder_name}" \
            --driver docker-container \
            --driver-opt "image=${BUILDKIT_IMAGE}" \
            --use >/dev/null
          docker buildx inspect --bootstrap > "${RUNNER_TEMP}/buildx-inspect.txt"
          actual_buildkit_version=$(
            awk '$1 == "BuildKit" && $2 == "version:" {print $3; exit}' \
              "${RUNNER_TEMP}/buildx-inspect.txt"
          )
          test "${actual_buildkit_version}" = "${BUILDKIT_VERSION}"
          builder_container=$(
            docker ps --filter "name=buildx_buildkit_${builder_name}" \
              --format '{{.ID}}'
          )
          test -n "${builder_container}"
          test "$(
            docker inspect "${builder_container}" --format '{{.Config.Image}}'
          )" = "${BUILDKIT_IMAGE}"
          echo "BUILDER_NAME=${builder_name}" >> "${GITHUB_ENV}"

          ACTUAL_BUILDKIT_VERSION="${actual_buildkit_version}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "buildx": {
                  "version": os.environ["BUILDX_VERSION"],
                  "binary_sha256": os.environ["BUILDX_BINARY_SHA256"],
              },
              "buildkit": {
                  "version": os.environ["ACTUAL_BUILDKIT_VERSION"],
                  "image": os.environ["BUILDKIT_IMAGE"],
                  "linux_arm64_manifest_digest": os.environ[
                      "BUILDKIT_ARM64_MANIFEST_DIGEST"
                  ],
              },
              "runtime_base": os.environ["RUNTIME_BASE"],
          }
          Path("builder-metadata.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Log in to GHCR for the run-scoped quarantine push
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish only the closed linux/arm64 context
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ env.BUILDER_NAME }}
          context: polaris-runtime-context
          file: polaris-runtime-context/Containerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          no-cache: true
          network: none
          tags: ${{ env.IMAGE }}:1.6.0-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            SOURCE_COMMIT=${{ env.SOURCE_COMMIT }}
            SOURCE_CREATED=${{ env.SOURCE_CREATED }}

      - name: Verify exact image platform, config, and manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          crane.bin manifest "${IMAGE}@${DIGEST}" > image-manifest.json
          echo "${DIGEST#sha256:}  image-manifest.json" \
            | sha256sum --check --strict
          crane.bin config "${IMAGE}@${DIGEST}" > image-config.json
          docker pull --platform linux/arm64 "${IMAGE}@${DIGEST}"
          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" \
              --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path("image-config.json").read_text(encoding="utf-8"))
          runtime = config.get("config", {})
          expected_labels = {
              "org.opencontainers.image.source": "https://github.com/apache/polaris",
              "org.opencontainers.image.revision": os.environ["SOURCE_COMMIT"],
              "org.opencontainers.image.version": "1.6.0",
              "org.opencontainers.image.created": os.environ["SOURCE_CREATED"],
              "org.opencontainers.image.description": (
                  "Apache Polaris 1.6.0 built from the ASF-signed source release"
              ),
              "org.opencontainers.image.licenses": "Apache-2.0",
              "org.opencontainers.image.base.name": (
                  "docker.io/library/amazoncorretto"
              ),
              "dev.shirokuma.runtime-base.arm64-digest": os.environ[
                  "RUNTIME_BASE_DIGEST"
              ],
          }
          conditions = (
              config.get("os") == "linux",
              config.get("architecture") == "arm64",
              runtime.get("User") == "10000:10001",
              runtime.get("WorkingDir") == "/deployments",
              runtime.get("Entrypoint") == ["/usr/bin/java"],
              runtime.get("Cmd") == ["-jar", "/deployments/quarkus-run.jar"],
              set(runtime.get("ExposedPorts", {})) == {"8181/tcp", "8182/tcp"},
              all(
                  runtime.get("Labels", {}).get(key) == value
                  for key, value in expected_labels.items()
              ),
          )
          if not all(conditions):
              raise SystemExit("published Polaris image config differs from policy")
          PY

      - name: Smoke-test the exact digest with hardened non-root controls
        timeout-minutes: 4
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          container_name="polaris-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker logs "${container_name}" > runtime-smoke.log 2>&1 || true
            docker rm --force "${container_name}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" --format '{{.Config.User}}'
          )" = "10000:10001"
          docker run --detach \
            --name "${container_name}" \
            --user 10000:10001 \
            --read-only \
            --tmpfs /tmp:rw,nosuid,nodev,size=64m,uid=10000,gid=10001,mode=1777 \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 1536m \
            --publish 127.0.0.1::8182 \
            "${IMAGE}@${DIGEST}" >/dev/null

          management_port=$(
            docker port "${container_name}" 8182/tcp | awk -F: 'NR == 1 {print $NF}'
          )
          test -n "${management_port}"
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error \
              "http://127.0.0.1:${management_port}/q/health/ready" \
              --output health-ready.json
            then
              break
            fi
            if [ "$(docker inspect "${container_name}" --format '{{.State.Running}}')" != \
              "true" ]; then
              echo "Polaris exited before becoming ready" >&2
              exit 1
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Polaris did not become ready within the bounded wait" >&2
              exit 1
            fi
            sleep 2
          done
          docker inspect "${container_name}" > runtime-container-inspect.json

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          health = json.loads(Path("health-ready.json").read_text(encoding="utf-8"))
          if health.get("status") != "UP":
              raise SystemExit("Polaris readiness status is not UP")
          inspect_path = Path("runtime-container-inspect.json")
          containers = json.loads(inspect_path.read_text(encoding="utf-8"))
          if len(containers) != 1:
              raise SystemExit("runtime inspect must contain one container")
          container = containers[0]
          config = container.get("Config", {})
          host = container.get("HostConfig", {})
          expected_tmpfs = {
              "rw",
              "nosuid",
              "nodev",
              "size=64m",
              "uid=10000",
              "gid=10001",
              "mode=1777",
          }
          if (
              config.get("User") != "10000:10001"
              or container.get("Path") != "/usr/bin/java"
              or container.get("Args") != ["-jar", "/deployments/quarkus-run.jar"]
              or host.get("ReadonlyRootfs") is not True
              or set(host.get("Tmpfs", {}).get("/tmp", "").split(","))
              != expected_tmpfs
              or host.get("CapDrop") != ["ALL"]
              or host.get("PidsLimit") != 512
              or host.get("Memory") != 1610612736
          ):
              raise SystemExit("effective Polaris smoke controls differ from policy")
          security_options = host.get("SecurityOpt", [])
          if len(security_options) != 1 or not security_options[0].startswith(
              "no-new-privileges"
          ):
              raise SystemExit("no-new-privileges is not effective")
          record = {
              "schema_version": 1,
              "result": "passed",
              "reference": f"{os.environ['IMAGE']}@{os.environ['DIGEST']}",
              "user": "10000:10001",
              "command": ["/usr/bin/java", "-jar", "/deployments/quarkus-run.jar"],
              "read_only_rootfs": True,
              "tmpfs": ["/tmp"],
              "capabilities_dropped": "ALL",
              "no_new_privileges": True,
              "readiness_endpoint": "/q/health/ready",
              "readiness_status": "UP",
              "runtime_inspect_sha256": hashlib.sha256(
                  inspect_path.read_bytes()
              ).hexdigest(),
          }
          Path("runtime-smoke.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Generate CycloneDX SBOM for the exact digest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: polaris-1.6.0-arm64.cdx.json
          upload-artifact: false
          upload-release-assets: false
          syft-version: v1.46.0

      - name: Scan the exact digest and block High or Critical findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy.json
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: 1

      - name: Record scanner freshness and pinned build tools
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
        shell: bash
        run: |
          set -euo pipefail
          trivy version --format json > trivy-version.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          trivy = json.loads(Path("trivy-version.json").read_text(encoding="utf-8"))
          if trivy.get("Version") != os.environ["TRIVY_VERSION"].removeprefix("v"):
              raise SystemExit("unexpected Trivy version")
          database = trivy.get("VulnerabilityDB", {})
          if not database.get("UpdatedAt") or not database.get("DownloadedAt"):
              raise SystemExit("missing vulnerability DB freshness metadata")
          sbom = json.loads(
              Path("polaris-1.6.0-arm64.cdx.json").read_text(encoding="utf-8")
          )
          syft = [
              item
              for item in sbom["metadata"]["tools"]["components"]
              if item.get("name") == "syft"
          ]
          if len(syft) != 1 or (
              "v" + syft[0]["version"].removeprefix("v")
          ) != os.environ["SYFT_VERSION"]:
              raise SystemExit("unexpected Syft version in SBOM")
          builder = json.loads(
              Path("builder-metadata.json").read_text(encoding="utf-8")
          )
          record = {
              "schema_version": 1,
              "runner": {
                  "label": "ubuntu-24.04-arm",
                  "os": os.uname().sysname,
                  "architecture": os.uname().machine,
              },
              "builder": builder,
              "syft_version": os.environ["SYFT_VERSION"],
              "trivy_version": os.environ["TRIVY_VERSION"],
              "trivy_database": database,
          }
          Path("toolchain.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Prove the SBOM excludes Hadoop and Ranger runtime components
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          sbom = json.loads(
              Path("polaris-1.6.0-arm64.cdx.json").read_text(encoding="utf-8")
          )
          forbidden = []
          for component in sbom.get("components", []):
              identity = " ".join(
                  str(component.get(field, ""))
                  for field in ("group", "name", "purl")
              ).lower()
              if any(
                  term in identity
                  for term in ("hadoop", "ranger", "jetty-http")
              ):
                  forbidden.append(
                      {
                          "group": component.get("group"),
                          "name": component.get("name"),
                          "purl": component.get("purl"),
                      }
                  )
          if forbidden:
              raise SystemExit(
                  "bounded runtime SBOM contains Hadoop/Ranger components: "
                  + json.dumps(forbidden, sort_keys=True)
              )
          record = {
              "schema_version": 1,
              "result": "passed",
              "forbidden_component_terms": ["hadoop", "ranger", "jetty-http"],
              "matching_components": [],
          }
          Path("sbom-policy.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Remove registry credentials and prove anonymous exact-digest retrieval
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io
          docker image rm "${IMAGE}@${DIGEST}" >/dev/null 2>&1 || true
          rm -f anonymous-image-manifest.json.tmp
          for registry_attempt in 1 2 3 4 5 6; do
            if crane.bin manifest "${IMAGE}@${DIGEST}" \
              > anonymous-image-manifest.json.tmp \
              && docker pull --platform linux/arm64 "${IMAGE}@${DIGEST}"
            then
              mv anonymous-image-manifest.json.tmp anonymous-image-manifest.json
              break
            fi
            rm -f anonymous-image-manifest.json.tmp
            if [ "${registry_attempt}" -eq 6 ]; then
              echo "public exact-digest retrieval failed; no credential fallback is permitted" >&2
              exit 1
            fi
            sleep "$((registry_attempt * 2))"
          done
          echo "${DIGEST#sha256:}  anonymous-image-manifest.json" \
            | sha256sum --check --strict
          cmp image-manifest.json anonymous-image-manifest.json
          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" \
              --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"

      - name: Restore GHCR credentials for signature and provenance publication
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Keyless-sign and verify the exact scanned image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(
            cosign version | awk '$1 == "GitVersion:" {print $2; exit}'
          )" = "${COSIGN_VERSION}"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml@${GITHUB_REF}"
          cosign sign --yes --bundle cosign-signature-bundle.json \
            "${IMAGE}@${DIGEST}"
          cosign verify-blob \
            --bundle cosign-signature-bundle.json \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-identity "${identity}" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            image-manifest.json

          for registry_attempt in 1 2 3 4 5 6; do
            if cosign verify \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              --certificate-identity "${identity}" \
              --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
              --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
              --certificate-github-workflow-ref "${GITHUB_REF}" \
              --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
              --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
              --output json "${IMAGE}@${DIGEST}" > cosign-payloads.json.tmp \
              && cosign download signature "${IMAGE}@${DIGEST}" \
                > registry-signature-bundles.jsonl.tmp \
              && test -s registry-signature-bundles.jsonl.tmp
            then
              mv cosign-payloads.json.tmp cosign-payloads.json
              mv registry-signature-bundles.jsonl.tmp \
                registry-signature-bundles.jsonl
              break
            fi
            rm -f cosign-payloads.json.tmp registry-signature-bundles.jsonl.tmp
            if [ "${registry_attempt}" -eq 6 ]; then
              echo "registry signature was not visible after bounded retries" >&2
              exit 1
            fi
            sleep "$((registry_attempt * 2))"
          done

          rekor_index=$(python3 - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(
              Path("cosign-signature-bundle.json").read_text(encoding="utf-8")
          )
          entries = bundle["verificationMaterial"]["tlogEntries"]
          if len(entries) != 1:
              raise SystemExit("exactly one Rekor entry is required")
          print(entries[0]["logIndex"])
          PY
          )
          curl --fail --location \
            --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output rekor-entry.json \
            "${REKOR_URL}/api/v1/log/entries?logIndex=${rekor_index}"

          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          bundle = json.loads(
              Path("cosign-signature-bundle.json").read_text(encoding="utf-8")
          )
          payloads = json.loads(
              Path("cosign-payloads.json").read_text(encoding="utf-8")
          )
          registry_bundles = [
              json.loads(line)
              for line in Path("registry-signature-bundles.jsonl")
              .read_text(encoding="utf-8")
              .splitlines()
              if line.strip()
          ]
          rekor = json.loads(Path("rekor-entry.json").read_text(encoding="utf-8"))
          bundle_media_type = "application/vnd.dev.sigstore.bundle.v0.3+json"
          if bundle.get("mediaType") != bundle_media_type:
              raise SystemExit("unexpected Sigstore bundle format")
          for candidate in registry_bundles:
              if "Base64Signature" in candidate or "Payload" in candidate:
                  raise SystemExit(
                      "Cosign v3.1.1 contract rejects legacy signature records"
                  )
              if candidate.get("mediaType") != bundle_media_type:
                  raise SystemExit("registry signature is not a Sigstore v0.3 bundle")
              if "dsseEnvelope" not in candidate or "messageSignature" in candidate:
                  raise SystemExit("registry signature is not the required DSSE bundle")
              candidate_statement = json.loads(
                  base64.b64decode(
                      candidate["dsseEnvelope"]["payload"], validate=True
                  )
              )
              if candidate_statement.get("predicateType") != (
                  "https://sigstore.dev/cosign/sign/v1"
              ):
                  raise SystemExit("registry bundle has an unexpected predicate type")
          material = bundle["verificationMaterial"]
          if not material.get("certificate", {}).get("rawBytes"):
              raise SystemExit("bundle certificate is missing")
          statement = json.loads(
              base64.b64decode(
                  bundle["dsseEnvelope"]["payload"], validate=True
              )
          )
          subjects = statement.get("subject", [])
          expected_digest = os.environ["DIGEST"].removeprefix("sha256:")
          if not (
              statement.get("predicateType") == "https://sigstore.dev/cosign/sign/v1"
              and len(subjects) == 1
              and subjects[0].get("digest") == {"sha256": expected_digest}
              and subjects[0].get("name", "") == ""
              and subjects[0].get("annotations", {}) == {}
          ):
              raise SystemExit("bundle subject is not the exact image digest")
          entries = material.get("tlogEntries", [])
          if len(entries) != 1:
              raise SystemExit("exactly one bundle tlog entry is required")
          entry = entries[0]
          proof = entry.get("inclusionProof", {})
          if not (
              entry.get("canonicalizedBody")
              and entry.get("inclusionPromise", {}).get("signedEntryTimestamp")
              and proof.get("checkpoint")
              and proof.get("rootHash")
              and proof.get("treeSize")
              and isinstance(proof.get("hashes"), list)
          ):
              raise SystemExit("incomplete Rekor inclusion evidence")
          if not isinstance(rekor, dict) or len(rekor) != 1:
              raise SystemExit("expected one Rekor API entry")
          uuid, api_entry = next(iter(rekor.items()))
          log_id_hex = base64.b64decode(
              entry["logId"]["keyId"], validate=True
          ).hex()
          stable_pairs = (
              (str(api_entry.get("logIndex")), str(entry["logIndex"])),
              (str(api_entry.get("integratedTime")), str(entry["integratedTime"])),
              (api_entry.get("logID"), log_id_hex),
              (api_entry.get("body"), entry["canonicalizedBody"]),
          )
          if any(left != right for left, right in stable_pairs):
              raise SystemExit("Rekor API entry does not match the signed bundle")
          if not isinstance(payloads, list) or not payloads:
              raise SystemExit("registry verification returned no payloads")
          expected_reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          for payload in payloads:
              critical = payload.get("critical", payload.get("Critical", {}))
              image = critical.get("image", critical.get("Image", {}))
              identity = critical.get("identity", critical.get("Identity", {}))
              payload_digest = image.get(
                  "docker-manifest-digest",
                  image.get("Docker-manifest-digest"),
              )
              payload_reference = identity.get(
                  "docker-reference",
                  identity.get("Docker-reference"),
              )
              if (
                  payload_digest != os.environ["DIGEST"]
                  or payload_reference != expected_reference
              ):
                  raise SystemExit(
                      "registry verification payload reference or digest mismatch"
                  )
          registry_bundle_matches = sum(
              candidate == bundle for candidate in registry_bundles
          )
          if registry_bundle_matches != 1:
              raise SystemExit("registry does not contain exactly the retained bundle")
          Path("registry-signature-bundles.jsonl").write_text(
              json.dumps(bundle, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          bundle_sha256 = hashlib.sha256(
              Path("cosign-signature-bundle.json").read_bytes()
          ).hexdigest()

          record = {
              "schema_version": 1,
              "reference": expected_reference,
              "certificate_constraints": {
                  "issuer": "https://token.actions.githubusercontent.com",
                  "identity": (
                      f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
                      f"/.github/workflows/polaris-arm64.yml@{os.environ['GITHUB_REF']}"
                  ),
                  "github_workflow_name": os.environ["GITHUB_WORKFLOW"],
                  "github_workflow_repository": os.environ["GITHUB_REPOSITORY"],
                  "github_workflow_ref": os.environ["GITHUB_REF"],
                  "github_workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
                  "github_workflow_trigger": os.environ["GITHUB_EVENT_NAME"],
              },
              "detached_bundle_verified": True,
              "registry_signature_verified": True,
              "registry_bundle": {
                  "file": "registry-signature-bundles.jsonl",
                  "exact_matches": registry_bundle_matches,
                  "bundle_sha256": bundle_sha256,
              },
              "transparency_log": {
                  "base_url": os.environ["REKOR_URL"],
                  "major_api_version": int(os.environ["REKOR_MAJOR_API_VERSION"]),
                  "entry_lookup": (
                      f"/api/v1/log/entries?logIndex={entry['logIndex']}"
                  ),
              },
              "verified_payloads": payloads,
              "rekor_entries": [
                  {
                      "uuid": uuid,
                      "log_index": str(entry["logIndex"]),
                      "integrated_time": str(entry["integratedTime"]),
                      "log_id": entry["logId"]["keyId"],
                      "log_id_hex": log_id_hex,
                  }
              ],
          }
          Path("cosign-verify.json").write_text(
              json.dumps(record, indent=2) + "\n", encoding="utf-8"
          )
          PY
          rm cosign-payloads.json

      - name: Mirror GHCR credentials for provenance publication
        shell: bash
        run: |
          set -euo pipefail
          default_config_dir="${HOME}/.docker"
          default_config="${default_config_dir}/config.json"
          backup="${RUNNER_TEMP}/docker-config-before-provenance.json"
          mkdir -p "${default_config_dir}"
          if [ -e "${default_config}" ]; then
            install -m 0600 "${default_config}" "${backup}"
            echo "PROVENANCE_DOCKER_CONFIG_BACKUP=1" >> "${GITHUB_ENV}"
          else
            echo "PROVENANCE_DOCKER_CONFIG_BACKUP=0" >> "${GITHUB_ENV}"
          fi
          install -m 0600 "${DOCKER_CONFIG}/config.json" "${default_config}"

      - name: Publish SLSA provenance for the exact scanned digest
        id: provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Remove provenance credential mirror
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          default_config="${HOME}/.docker/config.json"
          backup="${RUNNER_TEMP}/docker-config-before-provenance.json"
          rm -f "${default_config}"
          if [ "${PROVENANCE_DOCKER_CONFIG_BACKUP:-0}" = "1" ]; then
            install -m 0600 "${backup}" "${default_config}"
            rm -f "${backup}"
          fi

      - name: Verify SLSA provenance from this exact workflow
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --signer-workflow \
              "${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --format json > slsa-verify.json
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          records = json.loads(
              Path("slsa-verify.json").read_text(encoding="utf-8")
          )
          expected_digest = os.environ["DIGEST"].removeprefix("sha256:")
          repository = os.environ["GITHUB_REPOSITORY"]
          repository_url = f"https://github.com/{repository}"
          workflow_path = ".github/workflows/polaris-arm64.yml"
          identity = f"{repository_url}/{workflow_path}@{os.environ['GITHUB_REF']}"
          invocation = (
              f"{repository_url}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              f"/attempts/{os.environ['GITHUB_RUN_ATTEMPT']}"
          )
          matches = []
          bundles = []
          for record in records:
              certificate = record["verificationResult"]["signature"]["certificate"]
              bundle = record["attestation"]["bundle"]
              statement = json.loads(
                  base64.b64decode(
                      bundle["dsseEnvelope"]["payload"], validate=True
                  )
              )
              predicate = statement.get("predicate", {})
              definition = predicate.get("buildDefinition", {})
              workflow = definition.get("externalParameters", {}).get("workflow", {})
              details = predicate.get("runDetails", {})
              conditions = (
                  statement.get("_type") == "https://in-toto.io/Statement/v1",
                  statement.get("predicateType")
                  == "https://slsa.dev/provenance/v1",
                  definition.get("buildType")
                  == "https://actions.github.io/buildtypes/workflow/v1",
                  certificate.get("issuer")
                  == "https://token.actions.githubusercontent.com",
                  certificate.get("subjectAlternativeName") == identity,
                  certificate.get("githubWorkflowName")
                  == os.environ["GITHUB_WORKFLOW"],
                  certificate.get("githubWorkflowRepository") == repository,
                  certificate.get("githubWorkflowRef")
                  == os.environ["GITHUB_REF"],
                  certificate.get("githubWorkflowSHA")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("githubWorkflowTrigger")
                  == os.environ["GITHUB_EVENT_NAME"],
                  certificate.get("buildTrigger")
                  == os.environ["GITHUB_EVENT_NAME"],
                  certificate.get("runnerEnvironment") == "github-hosted",
                  certificate.get("buildSignerURI") == identity,
                  certificate.get("buildSignerDigest")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("buildConfigURI") == identity,
                  certificate.get("buildConfigDigest")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("sourceRepositoryURI") == repository_url,
                  certificate.get("sourceRepositoryDigest")
                  == os.environ["GITHUB_SHA"],
                  certificate.get("sourceRepositoryRef")
                  == os.environ["GITHUB_REF"],
                  certificate.get("runInvocationURI") == invocation,
                  workflow.get("repository") == repository_url,
                  workflow.get("path") == workflow_path,
                  workflow.get("ref") == os.environ["GITHUB_REF"],
                  details.get("builder", {}).get("id") == identity,
                  details.get("metadata", {}).get("invocationId") == invocation,
                  any(
                      subject.get("name") == os.environ["IMAGE"]
                      and subject.get("digest", {}).get("sha256")
                      == expected_digest
                      for subject in statement.get("subject", [])
                  ),
              )
              if all(conditions):
                  matches.append(record)
                  bundles.append(bundle)
          if not matches:
              raise SystemExit("no SLSA provenance matches the workflow invocation")
          Path("slsa-verify.json").write_text(
              json.dumps(matches, indent=2) + "\n", encoding="utf-8"
          )
          Path("slsa-bundles.jsonl").write_text(
              "".join(
                  json.dumps(bundle, separators=(",", ":")) + "\n"
                  for bundle in bundles
              ),
              encoding="utf-8",
          )
          PY

      - name: Keyless-attest the retained Polaris SBOM and scan
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          verify_attestation_bundle() {
            local bundle="$1"
            local predicate_type="$2"
            cosign verify-blob-attestation \
              --bundle "${bundle}" \
              --type "${predicate_type}" \
              --certificate-identity \
                "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml@${GITHUB_REF}" \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
              --certificate-github-workflow-ref "${GITHUB_REF}" \
              --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
              --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
              --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
              --digest "${DIGEST#sha256:}" \
              --digestAlg sha256
          }

          cosign attest --yes \
            --bundle sbom-attestation-bundle.json \
            --type cyclonedx \
            --predicate polaris-1.6.0-arm64.cdx.json "${IMAGE}@${DIGEST}"
          verify_attestation_bundle \
            sbom-attestation-bundle.json cyclonedx

          cosign attest --yes \
            --bundle trivy-attestation-bundle.json \
            --type https://shirokuma.dev/attestations/trivy/v1 \
            --predicate trivy.json "${IMAGE}@${DIGEST}"
          verify_attestation_bundle \
            trivy-attestation-bundle.json \
            https://shirokuma.dev/attestations/trivy/v1

      - name: Record and retain the non-admitted image candidate
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
          INPUT_ARTIFACT_DIGEST: ${{ needs.prepare.outputs.artifact_digest }}
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/polaris-image-candidate"
          mkdir -p "${evidence_dir}"
          cp \
            anonymous-image-manifest.json \
            builder-metadata.json \
            candidate-input/build-context.sha256 \
            candidate-input/build-input.json \
            candidate-input/dependency-input.json \
            candidate-input/offline-build.json \
            candidate-input/source-authentication.json \
            cosign-signature-bundle.json \
            cosign-verify.json \
            health-ready.json \
            image-config.json \
            image-manifest.json \
            polaris-1.6.0-arm64.cdx.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            runtime-container-inspect.json \
            runtime-base-java-version.txt \
            runtime-base-manifest.json \
            runtime-smoke.json \
            sbom-attestation-bundle.json \
            sbom-policy.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
            toolchain.json \
            trivy-attestation-bundle.json \
            trivy-version.json \
            trivy.json \
            "${evidence_dir}/"
          test -s runtime-smoke.log
          cp runtime-smoke.log "${evidence_dir}/"

          EVIDENCE_DIR="${evidence_dir}" python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ["EVIDENCE_DIR"])
          record = {
              "schema_version": 1,
              "component": "polaris",
              "version": "1.6.0",
              "platform": "linux/arm64",
              "state": "image_evidence_review_pending",
              "admitted": False,
              "promoted": False,
              "reference": f"{os.environ['IMAGE']}@{os.environ['DIGEST']}",
              "candidate_tag": (
                  f"{os.environ['IMAGE']}:1.6.0-{os.environ['GITHUB_RUN_ID']}-"
                  f"{os.environ['GITHUB_RUN_ATTEMPT']}"
              ),
              "trusted_tag": None,
              "trusted_tag_role": "non_authoritative_pointer",
              "anonymous_pull": True,
              "source_commit": os.environ["SOURCE_COMMIT"],
              "source_archive_sha512": os.environ["SOURCE_ARCHIVE_SHA512"],
              "dependency_reference": os.environ["DEPENDENCY_REF"],
              "runtime_base": os.environ["RUNTIME_BASE"],
              "containerfile_sha256": os.environ["CONTAINERFILE_SHA256"],
              "bounded_runtime_patch_sha256": os.environ[
                  "RUNTIME_PATCH_SHA256"
              ],
              "input_artifact_digest": os.environ["INPUT_ARTIFACT_DIGEST"],
              "slsa_provenance": os.environ["PROVENANCE_URL"],
              "created": datetime.now(timezone.utc).isoformat(),
              "workflow": {
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "ref": os.environ["GITHUB_REF"],
                  "event": os.environ["GITHUB_EVENT_NAME"],
                  "source_sha": os.environ["GITHUB_SHA"],
                  "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              },
          }
          (root / "publication.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          (
            cd "${evidence_dir}"
            find . -mindepth 1 -maxdepth 1 -type f ! -name evidence.sha256 \
              -print0 \
              | sort -z \
              | xargs -0 sha256sum > evidence.sha256
          )

      - name: Upload candidate evidence before trusted-tag promotion
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-1.6.0-arm64-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/polaris-image-candidate/
          if-no-files-found: error
          retention-days: 30

      - name: Remove registry credentials and ephemeral builder
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
          if [ -n "${BUILDER_NAME:-}" ]; then
            docker buildx rm "${BUILDER_NAME}" >/dev/null 2>&1 || true
          fi

  promote:
    needs:
      - prepare
      - verify
    if: >-
      needs.prepare.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.prepare.outputs.active == 'true' &&
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the reviewed promotion policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Rebind promotion to the static publication policy
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          python3 scripts/verify_polaris_trusted_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign before promotion policy revalidation
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the promotion cryptographic policy audit
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_trusted_image.py audit --root .

      - name: Download retained candidate evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.candidate_artifact }}
          path: candidate-evidence

      - name: Revalidate candidate evidence before promotion credentials exist
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          (
            cd candidate-evidence
            sha256sum --check --strict evidence.sha256
          )
          for retained in \
            anonymous-image-manifest.json \
            cosign-signature-bundle.json \
            cosign-verify.json \
            image-manifest.json \
            polaris-1.6.0-arm64.cdx.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            sbom-attestation-bundle.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
            trivy-attestation-bundle.json \
            trivy.json
          do
            test -s "candidate-evidence/${retained}"
          done

          test "$(
            cosign version | awk '$1 == "GitVersion:" {print $2; exit}'
          )" = "${COSIGN_VERSION}"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml@${GITHUB_REF}"
          cosign verify-blob \
            --bundle candidate-evidence/cosign-signature-bundle.json \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-identity "${identity}" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            candidate-evidence/image-manifest.json

          verify_attestation_bundle() {
            local bundle="$1"
            local predicate_type="$2"
            cosign verify-blob-attestation \
              --bundle "${bundle}" \
              --type "${predicate_type}" \
              --certificate-identity "${identity}" \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
              --certificate-github-workflow-ref "${GITHUB_REF}" \
              --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
              --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
              --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
              --digest "${DIGEST#sha256:}" \
              --digestAlg sha256
          }
          verify_attestation_bundle \
            candidate-evidence/sbom-attestation-bundle.json cyclonedx
          verify_attestation_bundle \
            candidate-evidence/trivy-attestation-bundle.json \
            https://shirokuma.dev/attestations/trivy/v1

          slsa_bundle_count=0
          while IFS= read -r slsa_bundle; do
            test -n "${slsa_bundle}"
            slsa_bundle_count=$((slsa_bundle_count + 1))
            slsa_bundle_path="${RUNNER_TEMP}/polaris-slsa-${slsa_bundle_count}.json"
            printf '%s\n' "${slsa_bundle}" > "${slsa_bundle_path}"
            verify_attestation_bundle \
              "${slsa_bundle_path}" https://slsa.dev/provenance/v1
            rm -f "${slsa_bundle_path}"
          done < candidate-evidence/slsa-bundles.jsonl
          test "${slsa_bundle_count}" -gt 0

          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          record = json.loads(
              Path("candidate-evidence/publication.json").read_text(encoding="utf-8")
          )
          expected = {
              "schema_version": 1,
              "component": "polaris",
              "version": "1.6.0",
              "platform": "linux/arm64",
              "state": "image_evidence_review_pending",
              "admitted": False,
              "promoted": False,
              "reference": f"{os.environ['IMAGE']}@{os.environ['DIGEST']}",
              "trusted_tag": None,
              "anonymous_pull": True,
              "source_commit": os.environ["SOURCE_COMMIT"],
              "dependency_reference": os.environ["DEPENDENCY_REF"],
              "runtime_base": os.environ["RUNTIME_BASE"],
          }
          for key, value in expected.items():
              if record.get(key) != value:
                  raise SystemExit(f"candidate evidence mismatch for {key}")
          workflow = record.get("workflow", {})
          for key, value in {
              "repository": os.environ["GITHUB_REPOSITORY"],
              "ref": os.environ["GITHUB_REF"],
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }.items():
              if workflow.get(key) != value:
                  raise SystemExit(f"candidate workflow mismatch for {key}")

          bundle_media_type = "application/vnd.dev.sigstore.bundle.v0.3+json"
          signature_bundle = json.loads(
              Path("candidate-evidence/cosign-signature-bundle.json").read_text(
                  encoding="utf-8"
              )
          )
          registry_bundles = [
              json.loads(line)
              for line in Path(
                  "candidate-evidence/registry-signature-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          if signature_bundle.get("mediaType") != bundle_media_type:
              raise SystemExit("retained signature bundle is not Sigstore v0.3")
          if registry_bundles != [signature_bundle]:
              raise SystemExit(
                  "retained registry signatures do not equal the detached bundle"
              )
          signature_record = json.loads(
              Path("candidate-evidence/cosign-verify.json").read_text(
                  encoding="utf-8"
              )
          )
          expected_identity = (
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
              f"/.github/workflows/polaris-arm64.yml@{os.environ['GITHUB_REF']}"
          )
          expected_reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          expected_constraints = {
              "issuer": "https://token.actions.githubusercontent.com",
              "identity": expected_identity,
              "github_workflow_name": os.environ["GITHUB_WORKFLOW"],
              "github_workflow_repository": os.environ["GITHUB_REPOSITORY"],
              "github_workflow_ref": os.environ["GITHUB_REF"],
              "github_workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "github_workflow_trigger": os.environ["GITHUB_EVENT_NAME"],
          }
          expected_bundle_record = {
              "file": "registry-signature-bundles.jsonl",
              "exact_matches": 1,
              "bundle_sha256": hashlib.sha256(
                  Path(
                      "candidate-evidence/cosign-signature-bundle.json"
                  ).read_bytes()
              ).hexdigest(),
          }
          if not (
              signature_record.get("schema_version") == 1
              and signature_record.get("reference") == expected_reference
              and signature_record.get("certificate_constraints")
              == expected_constraints
              and signature_record.get("detached_bundle_verified") is True
              and signature_record.get("registry_signature_verified") is True
              and signature_record.get("registry_bundle")
              == expected_bundle_record
          ):
              raise SystemExit("retained signature verification record mismatch")
          material = signature_bundle.get("verificationMaterial", {})
          entries = material.get("tlogEntries", [])
          if len(entries) != 1:
              raise SystemExit("retained signature must have one Rekor entry")
          entry = entries[0]
          proof = entry.get("inclusionProof", {})
          if not (
              material.get("certificate", {}).get("rawBytes")
              and entry.get("canonicalizedBody")
              and entry.get("inclusionPromise", {}).get("signedEntryTimestamp")
              and proof.get("checkpoint")
              and proof.get("rootHash")
              and proof.get("treeSize")
              and isinstance(proof.get("hashes"), list)
          ):
              raise SystemExit("retained signature has incomplete inclusion evidence")
          rekor = json.loads(
              Path("candidate-evidence/rekor-entry.json").read_text(
                  encoding="utf-8"
              )
          )
          if not isinstance(rekor, dict) or len(rekor) != 1:
              raise SystemExit("retained Rekor response must contain one entry")
          _, api_entry = next(iter(rekor.items()))
          log_id_hex = base64.b64decode(
              entry["logId"]["keyId"], validate=True
          ).hex()
          if any(
              left != right
              for left, right in (
                  (str(api_entry.get("logIndex")), str(entry["logIndex"])),
                  (
                      str(api_entry.get("integratedTime")),
                      str(entry["integratedTime"]),
                  ),
                  (api_entry.get("logID"), log_id_hex),
                  (api_entry.get("body"), entry["canonicalizedBody"]),
              )
          ):
              raise SystemExit("retained Rekor response does not match the bundle")
          expected_transparency = {
              "base_url": os.environ["REKOR_URL"],
              "major_api_version": int(os.environ["REKOR_MAJOR_API_VERSION"]),
              "entry_lookup": (
                  f"/api/v1/log/entries?logIndex={entry['logIndex']}"
              ),
          }
          if signature_record.get("transparency_log") != expected_transparency:
              raise SystemExit("retained transparency-log contract mismatch")

          digest = os.environ["DIGEST"].removeprefix("sha256:")
          repository = os.environ["IMAGE"]
          for bundle_name, predicate_name, predicate_type in (
              (
                  "sbom-attestation-bundle.json",
                  "polaris-1.6.0-arm64.cdx.json",
                  "https://cyclonedx.org/bom",
              ),
              (
                  "trivy-attestation-bundle.json",
                  "trivy.json",
                  "https://shirokuma.dev/attestations/trivy/v1",
              ),
          ):
              bundle = json.loads(
                  Path(f"candidate-evidence/{bundle_name}").read_text(
                      encoding="utf-8"
                  )
              )
              if bundle.get("mediaType") != bundle_media_type:
                  raise SystemExit(f"{bundle_name} is not a Sigstore v0.3 bundle")
              statement = json.loads(
                  base64.b64decode(
                      bundle["dsseEnvelope"]["payload"], validate=True
                  )
              )
              predicate = json.loads(
                  Path(f"candidate-evidence/{predicate_name}").read_text(
                      encoding="utf-8"
                  )
              )
              if not (
                  statement.get("_type") == "https://in-toto.io/Statement/v0.1"
                  and statement.get("predicateType") == predicate_type
                  and statement.get("subject")
                  == [{"name": repository, "digest": {"sha256": digest}}]
                  and statement.get("predicate") == predicate
              ):
                  raise SystemExit(
                      f"{bundle_name} does not bind the exact retained predicate"
                  )

          slsa_records = json.loads(
              Path("candidate-evidence/slsa-verify.json").read_text(
                  encoding="utf-8"
              )
          )
          slsa_bundles = [
              json.loads(line)
              for line in Path(
                  "candidate-evidence/slsa-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          retained_from_records = [
              item["attestation"]["bundle"] for item in slsa_records
          ]
          if not slsa_bundles or slsa_bundles != retained_from_records:
              raise SystemExit(
                  "retained SLSA bundles do not match verified provenance records"
              )
          workflow_path = ".github/workflows/polaris-arm64.yml"
          repository_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
          invocation = (
              f"{repository_url}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              f"/attempts/{os.environ['GITHUB_RUN_ATTEMPT']}"
          )
          for bundle in slsa_bundles:
              if bundle.get("mediaType") != bundle_media_type:
                  raise SystemExit("retained SLSA bundle is not Sigstore v0.3")
              statement = json.loads(
                  base64.b64decode(
                      bundle["dsseEnvelope"]["payload"], validate=True
                  )
              )
              predicate = statement.get("predicate", {})
              definition = predicate.get("buildDefinition", {})
              external_workflow = (
                  definition.get("externalParameters", {}).get("workflow", {})
              )
              details = predicate.get("runDetails", {})
              if not (
                  statement.get("_type") == "https://in-toto.io/Statement/v1"
                  and statement.get("predicateType")
                  == "https://slsa.dev/provenance/v1"
                  and definition.get("buildType")
                  == "https://actions.github.io/buildtypes/workflow/v1"
                  and external_workflow.get("repository") == repository_url
                  and external_workflow.get("path") == workflow_path
                  and external_workflow.get("ref") == os.environ["GITHUB_REF"]
                  and details.get("metadata", {}).get("invocationId")
                  == invocation
                  and any(
                      subject.get("name") == repository
                      and subject.get("digest", {}).get("sha256") == digest
                      for subject in statement.get("subject", [])
                  )
              ):
                  raise SystemExit(
                      "retained SLSA bundle does not match the exact invocation"
                  )
          PY
          echo "${DIGEST#sha256:}  candidate-evidence/image-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json \
            candidate-evidence/anonymous-image-manifest.json

      - name: Install pinned Crane without registry credentials
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="${RUNNER_TEMP}/crane"
          mkdir -p "${tool_dir}"
          export DOCKER_CONFIG="${RUNNER_TEMP}/anonymous-docker-config"
          mkdir -p "${DOCKER_CONFIG}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "${GITHUB_ENV}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/crane.tar.gz" "${CRANE_URL}"
          echo "${CRANE_ARCHIVE_SHA256}  ${tool_dir}/crane.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/crane.tar.gz" \
            --directory "${tool_dir}" crane
          install -m 0755 "${tool_dir}/crane" "${tool_dir}/crane.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/crane.bin" version)" = "${CRANE_VERSION#v}"

      - name: Reverify the public digest, signature, and provenance before promotion
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          crane.bin manifest "${IMAGE}@${DIGEST}" > promotion-manifest.json
          echo "${DIGEST#sha256:}  promotion-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json promotion-manifest.json
          crane.bin config "${IMAGE}@${DIGEST}" > promotion-config.json
          cmp candidate-evidence/image-config.json promotion-config.json

          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml@${GITHUB_REF}"
          cosign verify \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-identity "${identity}" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            --output json "${IMAGE}@${DIGEST}" > promotion-cosign-verify.json
          cosign download signature "${IMAGE}@${DIGEST}" \
            > promotion-registry-signature-bundles.jsonl
          test -s promotion-registry-signature-bundles.jsonl

          rekor_index=$(python3 - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(
              Path("candidate-evidence/cosign-signature-bundle.json").read_text(
                  encoding="utf-8"
              )
          )
          entries = bundle["verificationMaterial"]["tlogEntries"]
          if len(entries) != 1:
              raise SystemExit("exactly one retained Rekor entry is required")
          print(entries[0]["logIndex"])
          PY
          )
          curl --fail --location \
            --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output promotion-rekor-entry.json \
            "${REKOR_URL}/api/v1/log/entries?logIndex=${rekor_index}"

          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --signer-workflow \
              "${GITHUB_REPOSITORY}/.github/workflows/polaris-arm64.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --format json > promotion-slsa-verify.json
          test -s promotion-cosign-verify.json
          test -s promotion-slsa-verify.json
          python3 - <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          retained_bundle = json.loads(
              Path("candidate-evidence/cosign-signature-bundle.json").read_text(
                  encoding="utf-8"
              )
          )
          live_registry_bundles = [
              json.loads(line)
              for line in Path(
                  "promotion-registry-signature-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          if sum(item == retained_bundle for item in live_registry_bundles) != 1:
              raise SystemExit(
                  "live registry does not contain exactly one retained signature bundle"
              )
          retained_rekor = json.loads(
              Path("candidate-evidence/rekor-entry.json").read_text(
                  encoding="utf-8"
              )
          )
          live_rekor = json.loads(
              Path("promotion-rekor-entry.json").read_text(encoding="utf-8")
          )
          if live_rekor != retained_rekor:
              raise SystemExit("live Rekor entry differs from retained evidence")

          payloads = json.loads(
              Path("promotion-cosign-verify.json").read_text(encoding="utf-8")
          )
          if not isinstance(payloads, list) or not payloads:
              raise SystemExit("live registry signature verification is empty")
          reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          for payload in payloads:
              critical = payload.get("critical", payload.get("Critical", {}))
              image = critical.get("image", critical.get("Image", {}))
              identity = critical.get("identity", critical.get("Identity", {}))
              if image.get(
                  "docker-manifest-digest",
                  image.get("Docker-manifest-digest"),
              ) != os.environ["DIGEST"]:
                  raise SystemExit("live signature payload digest mismatch")
              if identity.get(
                  "docker-reference",
                  identity.get("Docker-reference"),
              ) != reference:
                  raise SystemExit("live signature payload reference mismatch")

          retained_slsa = [
              json.loads(line)
              for line in Path(
                  "candidate-evidence/slsa-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          live_records = json.loads(
              Path("promotion-slsa-verify.json").read_text(encoding="utf-8")
          )
          live_slsa = [record["attestation"]["bundle"] for record in live_records]
          canonical = lambda item: json.dumps(
              item, separators=(",", ":"), sort_keys=True
          )
          if Counter(map(canonical, live_slsa)) != Counter(
              map(canonical, retained_slsa)
          ):
              raise SystemExit(
                  "live exact-workflow SLSA bundles differ from retained evidence"
              )
          PY

      - name: Log in to GHCR for trusted-tag promotion
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote the fully verified digest to the non-authoritative trusted tag
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          crane.bin copy "${IMAGE}@${DIGEST}" "${IMAGE}:${TRUSTED_TAG}"
          test "$(crane.bin digest "${IMAGE}:${TRUSTED_TAG}")" = "${DIGEST}"
          docker logout ghcr.io

      - name: Verify final evidence after credentials are removed
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(crane.bin digest "${IMAGE}:${TRUSTED_TAG}")" = "${DIGEST}"
          crane.bin manifest "${IMAGE}:${TRUSTED_TAG}" > trusted-tag-manifest.json
          echo "${DIGEST#sha256:}  trusted-tag-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json trusted-tag-manifest.json
          cp promotion-cosign-verify.json candidate-evidence/
          cp promotion-slsa-verify.json candidate-evidence/
          cp trusted-tag-manifest.json candidate-evidence/

          EVIDENCE_DIR="candidate-evidence" python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ["EVIDENCE_DIR"])
          path = root / "publication.json"
          record = json.loads(path.read_text(encoding="utf-8"))
          record.update(
              {
                  "promoted": True,
                  "trusted_tag": f"{os.environ['IMAGE']}:{os.environ['TRUSTED_TAG']}",
                  "trusted_tag_role": "non_authoritative_pointer",
                  "promotion_anonymous_verification": True,
                  "promotion_completed_at": datetime.now(timezone.utc).isoformat(),
              }
          )
          if record.get("admitted") is not False:
              raise SystemExit("promotion must not admit the Polaris image")
          if record.get("state") != "image_evidence_review_pending":
              raise SystemExit("promotion must remain evidence-review pending")
          path.write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          rm candidate-evidence/evidence.sha256
          (
            cd candidate-evidence
            find . -mindepth 1 -maxdepth 1 -type f ! -name evidence.sha256 \
              -print0 \
              | sort -z \
              | xargs -0 sha256sum > evidence.sha256
            sha256sum --check --strict evidence.sha256
          )

      - name: Retain non-admitted image publication evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-image-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: candidate-evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Remove promotion credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
