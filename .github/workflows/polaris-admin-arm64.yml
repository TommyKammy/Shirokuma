                  "Admin SBOM omitted dependency terms: " + ", ".join(missing_terms)
              )
          record = {
              "schema_version": 1,
              "result": "passed",
              "relational_only": False,
              "review_state": "reviewed_for_image_publication",
              "image_publication_decision": (
