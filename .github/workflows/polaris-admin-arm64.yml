      - name: Remove registry credentials and prove anonymous exact-digest retrieval
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io
          docker image rm "${IMAGE}@${DIGEST}" >/dev/null 2>&1 || true
          rm -f anonymous-image-manifest.json.tmp
          for registry_attempt in 1 2 3 4 5 6; do
            if crane.bin manifest "${IMAGE}@${DIGEST}" \
              > anonymous-image-manifest.json.tmp \
              && docker pull --platform linux/arm64 "${IMAGE}@${DIGEST}"
            then
              mv anonymous-image-manifest.json.tmp anonymous-image-manifest.json
              break
            fi
            rm -f anonymous-image-manifest.json.tmp
            if [ "${registry_attempt}" -eq 6 ]; then
              echo "public exact-digest retrieval failed; no credential fallback is permitted" >&2
              exit 1
            fi
            sleep "$((registry_attempt * 2))"
          done
          echo "${DIGEST#sha256:}  anonymous-image-manifest.json" \
            | sha256sum --check --strict
          cmp image-manifest.json anonymous-image-manifest.json
          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" \
              --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"

      - name: Restore GHCR credentials for signature and provenance publication
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
