      - name: Prove the SBOM retains the disclosed Admin NoSQL and MongoDB surface
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          sbom = json.loads(
              Path("polaris-admin-1.6.0-arm64.cdx.json").read_text(encoding="utf-8")
          )
          required_terms = ["mongodb", "polaris-persistence-nosql"]
          matching_components_by_term = {term: [] for term in required_terms}
          for component in sbom.get("components", []):
