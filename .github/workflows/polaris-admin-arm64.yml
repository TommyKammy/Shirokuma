name: Polaris Admin 1.6.0 trusted arm64 image publication

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/polaris-admin-arm64.yml
      - bootstrap/polaris/v1.6.0/Containerfile.admin
      - bootstrap/polaris/v1.6.0/source.json
      - bootstrap/polaris/v1.6.0/admin-image-contract.json
      - bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json
      - bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
      - bootstrap/polaris/v1.6.0/admin-build-inputs-evidence/**
      - scripts/package_polaris_gradle_dependencies.py
      - scripts/validate_polaris_source_archive.py
      - scripts/verify_polaris_admin_build_inputs.py
      - scripts/verify_polaris_admin_image.py
      - scripts/verify_polaris_trusted_image.py
      - tests/test_package_polaris_gradle_dependencies.py
      - tests/test_polaris_admin_build_inputs.py
      - tests/test_polaris_admin_image_contract.py
      - tests/test_polaris_trusted_image_contract.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: polaris-admin-1.6.0-arm64-publication
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/tommykammy/shirokuma-polaris-admin
  TRUSTED_TAG: 1.6.0-arm64
  SOURCE_ARCHIVE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz
  SOURCE_SIGNATURE_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.asc
  SOURCE_CHECKSUM_URL: https://downloads.apache.org/polaris/1.6.0/apache-polaris-1.6.0.tar.gz.sha512
  SOURCE_ARCHIVE_SHA512: d69b1a91e16e210a78dec327fc4725983b114fbec5d86d078a3827f35fe7dd5df3e4b12d18965e5a72eace65ad224aa007004ed61c66f9abb2efafc44ceac95b
  SOURCE_SIGNATURE_SHA256: 2338e1c2385874e9bf5cf513b4d27732b1cd59e943e1662e62fa995d915e6481
  SOURCE_SIGNING_KEY_FINGERPRINT: F2EE EB06 110B EE13 97EC 74CB B896 0FF5 2D9B 1312
  SOURCE_COMMIT: dd306009d81a0e15adafe9dcd7d1c6d04d326f34
  SOURCE_CREATED: "2026-07-04T05:22:21Z"
  SOURCE_DATE_EPOCH: "1783142541"
  DEPENDENCY_REF: ghcr.io/tommykammy/shirokuma-polaris-admin-gradle-dependencies@sha256:7a505defcd78c7a7b978e88cd4c72e0a5d8b69cbb57ddd311c163b09fe789d18
  DEPENDENCY_MANIFEST_DIGEST: sha256:7a505defcd78c7a7b978e88cd4c72e0a5d8b69cbb57ddd311c163b09fe789d18
  DEPENDENCY_DESCRIPTOR_SHA256: 798802722e730174caa581cbffd4f82e5dd4a43aee92201df26f14db4ab005bc
  DEPENDENCY_ARCHIVE_SHA256: e771fe2ec6b2d0f6940b1247a512eb5cbc78dd0f36e7be247975f2c5fa36fc4d
  DEPENDENCY_VERIFICATION_METADATA_SHA256: 171ccaf781d4ae63375b332205d25653ebcd29471e9e9c0cfba1b978144065b8
  BUILDER_IMAGE: docker.io/library/gradle@sha256:cc583fa5245267fe0e1546c9989e8575473a37336ad9894dc0684a99fea1fb03
  RUNTIME_BASE_INDEX: docker.io/library/amazoncorretto@sha256:30b1b2246cee9a98c9bf8a11537a04f1eaf8c59279b0c70ae02d7e5b934edeaa
  RUNTIME_BASE_INDEX_DIGEST: sha256:30b1b2246cee9a98c9bf8a11537a04f1eaf8c59279b0c70ae02d7e5b934edeaa
  RUNTIME_BASE: docker.io/library/amazoncorretto@sha256:dc43b39c47f1729dc772a9b8af7222757fac6c8cfa8a0802829af665b1c89925
  RUNTIME_BASE_DIGEST: sha256:dc43b39c47f1729dc772a9b8af7222757fac6c8cfa8a0802829af665b1c89925
  RUNTIME_BASE_JAVA_VERSION: 21.0.11
  RUNTIME_BASE_OS: Alpine Linux
  RUNTIME_BASE_OS_VERSION: 3.24.1
  CONTAINERFILE_SHA256: cecd7e40f0bd3b2f5b0de90233677772c0c55c745f4f4cc975eda83b42f40112
  ADMIN_BUILD_PREIMAGE_SHA256: 6e3aabc2090cda72c03608053f41899792a6c62bec382ed18d6b02703574fde9
  ORAS_VERSION: 1.3.3
  ORAS_URL: https://github.com/oras-project/oras/releases/download/v1.3.3/oras_1.3.3_linux_arm64.tar.gz
  ORAS_ARCHIVE_SHA256: ac7156f93a21e903f7ad606c792f3560f17e0cd0e36365634701b1e7cc4e4eca
  BUILDX_VERSION: v0.35.0
  BUILDX_URL: https://github.com/docker/buildx/releases/download/v0.35.0/buildx-v0.35.0.linux-arm64
  BUILDX_BINARY_SHA256: c4248d6cbc4a619a7e0b4609c11e509ad4ac0b475e1c64817c0ac20c5d90c766
  BUILDKIT_VERSION: v0.31.1
  BUILDKIT_IMAGE: moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
  BUILDKIT_IMAGE_DIGEST: sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
  BUILDKIT_ARM64_MANIFEST_DIGEST: sha256:4eee950fb9d134cbf4e228ea3906eb4c7403323334af013c443302f7b74f2737
  CRANE_VERSION: v0.21.7
  CRANE_URL: https://github.com/google/go-containerregistry/releases/download/v0.21.7/go-containerregistry_Linux_arm64.tar.gz
  CRANE_ARCHIVE_SHA256: b6ee979d9411dfb05ce35ab9e156fe5de7def11a230764a7856ffa2eb971fa88
  SYFT_VERSION: v1.46.0
  TRIVY_VERSION: v0.72.0
  COSIGN_VERSION: v3.1.1
  REKOR_URL: https://rekor.sigstore.dev
  REKOR_MAJOR_API_VERSION: "1"

jobs:
  prepare:
    if: >-
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      active: ${{ steps.lifecycle.outputs.active }}
      context_sha256: ${{ steps.stage.outputs.context_sha256 }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      artifact_name: polaris-admin-image-build-input-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out the reviewed Polaris publication policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Bind the run to reviewed main and check publication lifecycle
        id: lifecycle
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-admin-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          case "${GITHUB_EVENT_NAME}" in
            push|workflow_dispatch) ;;
            *) echo "unsupported workflow event: ${GITHUB_EVENT_NAME}" >&2; exit 1 ;;
          esac

          state=$(
            python3 -c \
              'import json; print(json.load(open("bootstrap/polaris/v1.6.0/admin-image-contract.json"))["lifecycle"]["state"])'
          )
          case "${state}" in
            admin_image_publication_pending)
              echo "active=true" >> "${GITHUB_OUTPUT}"
              ;;
            admin_image_evidence_review_pending)
              echo "active=false" >> "${GITHUB_OUTPUT}"
              echo "Polaris Admin image publisher is retired for this lifecycle state"
              ;;
            *)
              echo "unexpected Polaris Admin image publication lifecycle: ${state}" >&2
              exit 1
              ;;
          esac

      - name: Validate the static publication bootstrap policy
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_admin_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign for dependency evidence revalidation
        if: steps.lifecycle.outputs.active == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the cryptographic image-publication-pending audit
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_admin_image.py audit --root .
          python3 scripts/verify_polaris_trusted_image.py audit --root .
          python3 -m unittest -v tests.test_package_polaris_gradle_dependencies
          python3 -m unittest -v tests.test_polaris_admin_build_inputs
          python3 -m unittest -v tests.test_polaris_admin_image_contract

      - name: Install checksum-pinned ORAS without credentials
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "aarch64"
          tool_dir="${RUNNER_TEMP}/oras"
          mkdir -p "${tool_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/oras.tar.gz" "${ORAS_URL}"
          echo "${ORAS_ARCHIVE_SHA256}  ${tool_dir}/oras.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/oras.tar.gz" \
            --directory "${tool_dir}" oras
          install -m 0755 "${tool_dir}/oras" "${tool_dir}/oras.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/oras.bin" version | awk '$1 == "Version:" {print $2; exit}')" = \
            "${ORAS_VERSION}"

      - name: Anonymously fetch and verify the exact reviewed dependency snapshot
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          dependency_dir="${RUNNER_TEMP}/polaris-admin-dependencies"
          gradle_home="${RUNNER_TEMP}/polaris-admin-gradle-home"
          anonymous_config="${RUNNER_TEMP}/anonymous-admin-registry-config.json"
          mkdir -p "${dependency_dir}"
          test ! -e "${gradle_home}"
          printf '{}\n' > "${anonymous_config}"

          oras.bin manifest fetch \
            --registry-config "${anonymous_config}" \
            --output "${dependency_dir}/oci-manifest.json" \
            "${DEPENDENCY_REF}"
          echo "${DEPENDENCY_MANIFEST_DIGEST#sha256:}  ${dependency_dir}/oci-manifest.json" \
            | sha256sum --check --strict
          oras.bin pull \
            --registry-config "${anonymous_config}" \
            --output "${dependency_dir}" \
            "${DEPENDENCY_REF}"

          expected_files=$(
            printf '%s\n' \
              gradle-dependency-inputs.json \
              oci-manifest.json \
              polaris-gradle-dependencies-1.6.0.tar.gz \
              | sort
          )
          actual_files=$(
            find "${dependency_dir}" -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"
          echo "${DEPENDENCY_DESCRIPTOR_SHA256}  ${dependency_dir}/gradle-dependency-inputs.json" \
            | sha256sum --check --strict
          echo "${DEPENDENCY_ARCHIVE_SHA256}  ${dependency_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            | sha256sum --check --strict

          python3 scripts/package_polaris_gradle_dependencies.py verify \
            --descriptor "${dependency_dir}/gradle-dependency-inputs.json" \
            --verification-metadata \
              bootstrap/polaris/v1.6.0/admin-build-inputs-evidence/verification-metadata.xml \
            --archive \
              "${dependency_dir}/polaris-gradle-dependencies-1.6.0.tar.gz" \
            --extract-root "${gradle_home}"
          cmp bootstrap/polaris/v1.6.0/admin-build-inputs-evidence/verification-metadata.xml \
            "${gradle_home}/verification-metadata.xml"
          echo "${DEPENDENCY_VERIFICATION_METADATA_SHA256}  ${gradle_home}/verification-metadata.xml" \
            | sha256sum --check --strict

          DEPENDENCY_DIR="${dependency_dir}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["DEPENDENCY_DIR"])
          descriptor = root / "gradle-dependency-inputs.json"
          archive = root / "polaris-gradle-dependencies-1.6.0.tar.gz"
          manifest = root / "oci-manifest.json"
          publication = json.loads(
              Path(
                  "bootstrap/polaris/v1.6.0/admin-build-inputs-evidence/publication.json"
              ).read_text(encoding="utf-8")
          )
          expected_reference = os.environ["DEPENDENCY_REF"]
          historical_surface = publication.get("admin_dependency_surface", {})
          expected_projects = [
              ":polaris-persistence-nosql-api",
              ":polaris-persistence-nosql-maintenance-api",
              ":polaris-persistence-nosql-metastore",
              ":polaris-persistence-nosql-cdi-quarkus",
              ":polaris-persistence-nosql-cdi-quarkus-distcache",
              ":polaris-persistence-nosql-maintenance-impl",
              ":polaris-persistence-nosql-metastore-maintenance",
          ]
          if (
              publication.get("artifact_reference") != expected_reference
              or publication.get("state")
              != "admin_dependency_snapshot_review_pending"
              or publication.get("downstream_gates", {}).get(
                  "admin_image_admitted"
              ) is not False
              or historical_surface.get("relational_only") is not False
              or historical_surface.get("review_state") != "review_required"
              or historical_surface.get("unconditional_external_dependencies")
              != ["io.quarkus:quarkus-mongodb-client"]
              or historical_surface.get("unconditional_project_dependencies")
              != expected_projects
          ):
              raise SystemExit("reviewed dependency publication binding is invalid")
          record = {
              "schema_version": 1,
              "result": "passed",
              "anonymous_pull": True,
              "reference": expected_reference,
              "admin_dependency_surface": historical_surface,
              "current_review_state": "reviewed_for_image_publication",
              "image_publication_decision": (
                  "accepted_unmodified_for_image_publication_only"
              ),
              "review_checkpoint": {
                  "repository": "TommyKammy/Shirokuma",
                  "pull_request": 87,
                  "reviewed_head_commit": (
                      "178b5ca03a2575a7100cfb47daede795fbd1d30c"
                  ),
                  "merge_commit": (
                      "8e5c6927e95d1027e16fe2ac27ab8322b45359c9"
                  ),
                  "merged_at": "2026-07-20T23:24:12Z",
                  "merged_by": "TommyKammy",
                  "reviewed_contract_sha256": (
                      "26f5259642007aa11a4676ccee918bd5b1e55f8eb5c0025f92a12f1d8ccb37db"
                  ),
                  "reviewed_evidence_manifest_sha256": (
                      "026c4d82e9031532323ccb3c31ea83939010982cfcf373644cdcf064e2613409"
                  ),
                  "reviewed_verifier_sha256": (
                      "ef1fad340179e61f7d1291d9e3fd44c793c4761af4b094a0b232ea663c7f41c9"
                  ),
              },
              "manifest_sha256": hashlib.sha256(manifest.read_bytes()).hexdigest(),
              "descriptor_sha256": hashlib.sha256(descriptor.read_bytes()).hexdigest(),
              "archive_sha256": hashlib.sha256(archive.read_bytes()).hexdigest(),
              "verification_metadata_sha256": os.environ[
                  "DEPENDENCY_VERIFICATION_METADATA_SHA256"
              ],
          }
          Path(os.environ["RUNNER_TEMP"], "dependency-input.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Fetch and authenticate the signed ASF source release
        if: steps.lifecycle.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_SIGNING_KEY_FINGERPRINT="${SOURCE_SIGNING_KEY_FINGERPRINT// /}"
          source_dir="${RUNNER_TEMP}/polaris-source"
          mkdir -p "${source_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_ARCHIVE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_SIGNATURE_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.asc"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            "${SOURCE_CHECKSUM_URL}" \
            --output "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"
          echo "${SOURCE_ARCHIVE_SHA512}  ${source_dir}/apache-polaris-1.6.0.tar.gz" \
            | sha512sum --check --strict
          echo "${SOURCE_SIGNATURE_SHA256}  ${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            | sha256sum --check --strict
          grep --fixed-strings --quiet \
            "${SOURCE_ARCHIVE_SHA512}" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.sha512"

          export GNUPGHOME="${RUNNER_TEMP}/polaris-release-keyring"
          mkdir -m 0700 "${GNUPGHOME}"
          gpg --batch --import \
            bootstrap/polaris/v1.6.0/apache-polaris-release-signing-key.asc
          actual_fingerprint=$(
            gpg --batch --with-colons --fingerprint \
              | awk -F: '$1 == "fpr" {print $10; exit}'
          )
          test "${actual_fingerprint}" = "${SOURCE_SIGNING_KEY_FINGERPRINT}"
          gpg --batch --verify \
            "${source_dir}/apache-polaris-1.6.0.tar.gz.asc" \
            "${source_dir}/apache-polaris-1.6.0.tar.gz"
          python3 scripts/validate_polaris_source_archive.py \
            --archive "${source_dir}/apache-polaris-1.6.0.tar.gz"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "result": "passed",
              "archive_url": os.environ["SOURCE_ARCHIVE_URL"],
              "archive_sha512": os.environ["SOURCE_ARCHIVE_SHA512"],
              "signature_url": os.environ["SOURCE_SIGNATURE_URL"],
              "signature_sha256": os.environ["SOURCE_SIGNATURE_SHA256"],
              "signing_key_fingerprint": os.environ[
                  "SOURCE_SIGNING_KEY_FINGERPRINT"
              ],
              "source_commit": os.environ["SOURCE_COMMIT"],
              "source_created": os.environ["SOURCE_CREATED"],
          }
          Path(os.environ["RUNNER_TEMP"], "source-authentication.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build Polaris Admin and server regressions from retained dependencies
        if: steps.lifecycle.outputs.active == 'true'
        timeout-minutes: 55
        shell: bash
        run: |
          set -euo pipefail
          source_archive="${RUNNER_TEMP}/polaris-source/apache-polaris-1.6.0.tar.gz"
          offline_source="${RUNNER_TEMP}/polaris-admin-offline"
          gradle_home="${RUNNER_TEMP}/polaris-admin-gradle-home"
          test ! -e "${offline_source}"
          test ! -L "${offline_source}"
          install -d -m 0700 "${offline_source}"
          tar --extract --gzip --file "${source_archive}" \
            --directory "${offline_source}" --strip-components 1 \
            --no-same-owner --no-same-permissions
          echo "${ADMIN_BUILD_PREIMAGE_SHA256}  ${offline_source}/runtime/admin/build.gradle.kts" \
            | sha256sum --check --strict
          install -m 0644 "${gradle_home}/verification-metadata.xml" \
            "${offline_source}/gradle/verification-metadata.xml"
          rm "${gradle_home}/verification-metadata.xml"
          rm -rf "${offline_source}/runtime/admin/build"
          rm -rf "${offline_source}/runtime/server/build"

          docker pull --platform linux/arm64 "${BUILDER_IMAGE}"
          test "$(
            docker image inspect "${BUILDER_IMAGE}" --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"
          docker run --rm \
            --platform linux/arm64 \
            --network none \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/gradle-user \
            --env GRADLE_USER_HOME=/gradle-home \
            --env SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --tmpfs /tmp:rw,nosuid,nodev,size=1g \
            --volume "${offline_source}:/workspace:rw" \
            --volume "${gradle_home}:/gradle-home:rw" \
            --workdir /workspace \
            "${BUILDER_IMAGE}" \
            gradle \
              --offline \
              --dependency-verification strict \
              --no-daemon \
              --no-build-cache \
              --no-configuration-cache \
              --rerun-tasks \
              :polaris-admin:assemble \
              :polaris-admin:quarkusAppPartsBuild \
              :polaris-server:assemble \
              :polaris-server:quarkusAppPartsBuild

          test -s "${offline_source}/runtime/admin/build/quarkus-app/quarkus-run.jar"
          test -d "${offline_source}/runtime/admin/build/quarkus-app/lib"
          test -d "${offline_source}/runtime/admin/build/quarkus-app/app"
          test -d "${offline_source}/runtime/admin/build/quarkus-app/quarkus"
          test -s "${offline_source}/runtime/admin/distribution/LICENSE"
          test -s "${offline_source}/runtime/admin/distribution/NOTICE"
          test -s "${offline_source}/runtime/server/build/quarkus-app/quarkus-run.jar"
          test -d "${offline_source}/runtime/server/build/quarkus-app/lib"
          test -d "${offline_source}/runtime/server/build/quarkus-app/app"
          test -d "${offline_source}/runtime/server/build/quarkus-app/quarkus"
          for required_term in mongodb polaris-persistence-nosql; do
            if ! find "${offline_source}/runtime/admin/build/quarkus-app" \
              -type f -iname "*${required_term}*.jar" -print -quit | grep --quiet .
            then
              echo "Admin image build omitted dependency term: ${required_term}" >&2
              exit 1
            fi
          done

          OFFLINE_SOURCE="${offline_source}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          admin_app = (
              Path(os.environ["OFFLINE_SOURCE"])
              / "runtime/admin/build/quarkus-app"
          )
          required_terms = ["mongodb", "polaris-persistence-nosql"]
          matching_dependency_files_by_term = {
              term: sorted(
                  path.relative_to(admin_app).as_posix()
                  for path in admin_app.rglob("*.jar")
                  if term in path.name.lower()
              )
              for term in required_terms
          }
          if any(
              not matching_dependency_files_by_term[term]
              for term in required_terms
          ):
              raise SystemExit("Admin build output dependency disclosure is incomplete")
          record = {
              "schema_version": 1,
              "result": "passed",
              "platform": "linux/arm64",
              "network": "none",
              "builder_image": os.environ["BUILDER_IMAGE"],
              "gradle_offline": True,
              "dependency_verification": "strict",
              "build_cache": False,
              "configuration_cache": False,
              "rerun_tasks": True,
              "tasks": [
                  ":polaris-admin:assemble",
                  ":polaris-admin:quarkusAppPartsBuild",
                  ":polaris-server:assemble",
                  ":polaris-server:quarkusAppPartsBuild",
              ],
              "dependency_reference": os.environ["DEPENDENCY_REF"],
              "admin_build_preimage_sha256": os.environ[
                  "ADMIN_BUILD_PREIMAGE_SHA256"
              ],
              "required_dependency_terms": required_terms,
              "matching_dependency_files_by_term": (
                  matching_dependency_files_by_term
              ),
              "admin_dependency_surface": {
                  "relational_only": False,
                  "review_state": "reviewed_for_image_publication",
                  "image_publication_decision": (
                      "accepted_unmodified_for_image_publication_only"
                  ),
                  "unconditional_external_dependencies": [
                      "io.quarkus:quarkus-mongodb-client"
                  ],
                  "unconditional_project_dependencies": [
                      ":polaris-persistence-nosql-api",
                      ":polaris-persistence-nosql-maintenance-api",
                      ":polaris-persistence-nosql-metastore",
                      ":polaris-persistence-nosql-cdi-quarkus",
                      ":polaris-persistence-nosql-cdi-quarkus-distcache",
                      ":polaris-persistence-nosql-maintenance-impl",
                      ":polaris-persistence-nosql-metastore-maintenance",
                  ],
              },
          }
          Path(os.environ["RUNNER_TEMP"], "offline-build.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Stage and retain the closed image build context
        if: steps.lifecycle.outputs.active == 'true'
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          offline_source="${RUNNER_TEMP}/polaris-admin-offline"
          context="${RUNNER_TEMP}/polaris-admin-image-context"
          artifact="${RUNNER_TEMP}/polaris-admin-image-build-input"
          test ! -e "${context}"
          install -d -m 0755 "${context}/build" "${context}/distribution" "${artifact}"
          echo "${CONTAINERFILE_SHA256}  bootstrap/polaris/v1.6.0/Containerfile.admin" \
            | sha256sum --check --strict
          install -m 0644 bootstrap/polaris/v1.6.0/Containerfile.admin \
            "${context}/Containerfile.admin"
          cp -a "${offline_source}/runtime/admin/build/quarkus-app" \
            "${context}/build/quarkus-app"
          install -m 0644 "${offline_source}/runtime/admin/distribution/LICENSE" \
            "${context}/distribution/LICENSE"
          install -m 0644 "${offline_source}/runtime/admin/distribution/NOTICE" \
            "${context}/distribution/NOTICE"

          CONTEXT="${context}" python3 - <<'PY'
          import hashlib
          import os
          import stat
          from pathlib import Path

          root = Path(os.environ["CONTEXT"])
          allowed_roots = {"Containerfile.admin", "build", "distribution"}
          if {path.name for path in root.iterdir()} != allowed_roots:
              raise SystemExit("closed image context has unexpected top-level paths")
          files = []
          for path in sorted(root.rglob("*")):
              mode = path.lstat().st_mode
              if path.is_symlink():
                  raise SystemExit(f"closed image context contains symlink: {path}")
              if not (stat.S_ISDIR(mode) or stat.S_ISREG(mode)):
                  raise SystemExit(f"closed image context contains special file: {path}")
              if mode & stat.S_IWOTH:
                  raise SystemExit(f"closed image context contains world-writable path: {path}")
              if path.is_file():
                  relative = path.relative_to(root).as_posix()
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  files.append((relative, digest))
          required = {
              "Containerfile.admin",
              "build/quarkus-app/quarkus-run.jar",
              "distribution/LICENSE",
              "distribution/NOTICE",
          }
          file_names = {name for name, _ in files}
          if not required.issubset(file_names):
              raise SystemExit("closed image context is missing required files")
          required_dependency_terms = ["mongodb", "polaris-persistence-nosql"]
          matching_dependency_files_by_term = {
              term: sorted(
                  name
                  for name in file_names
                  if name.startswith("build/quarkus-app/")
                  and name.endswith(".jar")
                  and term in name.lower()
              )
              for term in required_dependency_terms
          }
          if any(
              not matching_dependency_files_by_term[term]
              for term in required_dependency_terms
          ):
              raise SystemExit("closed image context dependency disclosure is incomplete")
          Path(os.environ["RUNNER_TEMP"], "build-context.sha256").write_text(
              "".join(f"{digest}  {name}\n" for name, digest in files),
              encoding="utf-8",
          )
          PY

          tar --create --gzip --format=posix --sort=name \
            --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 --numeric-owner \
            --file "${artifact}/polaris-admin-image-build-context.tar.gz" \
            --directory "${context}" .
          install -m 0644 "${RUNNER_TEMP}/build-context.sha256" \
            "${artifact}/build-context.sha256"
          install -m 0644 "${RUNNER_TEMP}/dependency-input.json" \
            "${artifact}/dependency-input.json"
          install -m 0644 "${RUNNER_TEMP}/source-authentication.json" \
            "${artifact}/source-authentication.json"
          install -m 0644 "${RUNNER_TEMP}/offline-build.json" \
            "${artifact}/offline-build.json"
          context_sha256=$(
            sha256sum "${artifact}/polaris-admin-image-build-context.tar.gz" \
              | cut -d' ' -f1
          )
          echo "context_sha256=${context_sha256}" >> "${GITHUB_OUTPUT}"
          ARTIFACT="${artifact}" CONTEXT_SHA256="${context_sha256}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifact = Path(os.environ["ARTIFACT"])
          context_files = [
              line.split("  ", 1)[1]
              for line in (artifact / "build-context.sha256").read_text(
                  encoding="utf-8"
              ).splitlines()
          ]
          required_dependency_terms = ["mongodb", "polaris-persistence-nosql"]
          context_dependency_files_by_term = {
              term: sorted(
                  name
                  for name in context_files
                  if name.startswith("build/quarkus-app/")
                  and name.endswith(".jar")
                  and term in name.lower()
              )
              for term in required_dependency_terms
          }
          if any(
              not context_dependency_files_by_term[term]
              for term in required_dependency_terms
          ):
              raise SystemExit("retained Admin context dependency disclosure is incomplete")
          record = {
              "schema_version": 1,
              "component": "polaris-admin",
              "state": "admin_image_publication_pending",
              "admitted": False,
              "context_archive_sha256": os.environ["CONTEXT_SHA256"],
              "context_manifest_sha256": hashlib.sha256(
                  (artifact / "build-context.sha256").read_bytes()
              ).hexdigest(),
              "repository": os.environ["GITHUB_REPOSITORY"],
              "ref": os.environ["GITHUB_REF"],
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "required_dependency_terms": required_dependency_terms,
              "context_dependency_files_by_term": (
                  context_dependency_files_by_term
              ),
              "admin_dependency_surface": {
                  "relational_only": False,
                  "review_state": "reviewed_for_image_publication",
                  "image_publication_decision": (
                      "accepted_unmodified_for_image_publication_only"
                  ),
                  "unconditional_external_dependencies": [
                      "io.quarkus:quarkus-mongodb-client"
                  ],
                  "unconditional_project_dependencies": [
                      ":polaris-persistence-nosql-api",
                      ":polaris-persistence-nosql-maintenance-api",
                      ":polaris-persistence-nosql-metastore",
                      ":polaris-persistence-nosql-cdi-quarkus",
                      ":polaris-persistence-nosql-cdi-quarkus-distcache",
                      ":polaris-persistence-nosql-maintenance-impl",
                      ":polaris-persistence-nosql-metastore-maintenance",
                  ],
                  "required_sbom_terms": [
                      "mongodb",
                      "polaris-persistence-nosql",
                  ],
              },
              "review_checkpoint": {
                  "repository": "TommyKammy/Shirokuma",
                  "pull_request": 87,
                  "reviewed_head_commit": (
                      "178b5ca03a2575a7100cfb47daede795fbd1d30c"
                  ),
                  "merge_commit": (
                      "8e5c6927e95d1027e16fe2ac27ab8322b45359c9"
                  ),
                  "merged_at": "2026-07-20T23:24:12Z",
                  "merged_by": "TommyKammy",
                  "reviewed_contract_sha256": (
                      "26f5259642007aa11a4676ccee918bd5b1e55f8eb5c0025f92a12f1d8ccb37db"
                  ),
                  "reviewed_evidence_manifest_sha256": (
                      "026c4d82e9031532323ccb3c31ea83939010982cfcf373644cdcf064e2613409"
                  ),
                  "reviewed_verifier_sha256": (
                      "ef1fad340179e61f7d1291d9e3fd44c793c4761af4b094a0b232ea663c7f41c9"
                  ),
              },
          }
          (artifact / "build-input.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload the read-only-verified image build input
        if: steps.lifecycle.outputs.active == 'true'
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-admin-image-build-input-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/polaris-admin-image-build-input/
          if-no-files-found: error
          retention-days: 7

  verify:
    needs: prepare
    if: >-
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.active == 'true' &&
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      candidate_artifact: polaris-admin-image-candidate-${{ github.run_id }}-${{ github.run_attempt }}
      provenance_url: ${{ steps.provenance.outputs.attestation-url }}

    steps:
      - name: Check out the reviewed image publication policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Rebind the write-capable job to the static publication policy
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-admin-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          python3 scripts/verify_polaris_admin_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign before write-capable policy revalidation
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the write-capable cryptographic policy audit
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_admin_image.py audit --root .
          python3 scripts/verify_polaris_trusted_image.py audit --root .

      - name: Download the exact read-only-verified image build input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: candidate-input

      - name: Revalidate and safely extract the closed context before credentials exist
        env:
          EXPECTED_CONTEXT_SHA256: ${{ needs.prepare.outputs.context_sha256 }}
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.prepare.outputs.artifact_digest }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          expected_files=$(
            printf '%s\n' \
              build-context.sha256 \
              build-input.json \
              dependency-input.json \
              offline-build.json \
              polaris-admin-image-build-context.tar.gz \
              source-authentication.json \
              | sort
          )
          actual_files=$(
            find candidate-input -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"
          echo "${EXPECTED_CONTEXT_SHA256}  candidate-input/polaris-admin-image-build-context.tar.gz" \
            | sha256sum --check --strict
          test "${EXPECTED_ARTIFACT_DIGEST}" != ""

          python3 - <<'PY'
          import json
          import os
          import tarfile
          from pathlib import Path, PurePosixPath

          record = json.loads(
              Path("candidate-input/build-input.json").read_text(encoding="utf-8")
          )
          expected = {
              "schema_version": 1,
              "component": "polaris-admin",
              "state": "admin_image_publication_pending",
              "admitted": False,
              "context_archive_sha256": os.environ["EXPECTED_CONTEXT_SHA256"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "ref": os.environ["GITHUB_REF"],
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          for key, value in expected.items():
              if record.get(key) != value:
                  raise SystemExit(f"build input binding mismatch for {key}")

          archive = Path("candidate-input/polaris-admin-image-build-context.tar.gz")
          destination = Path("polaris-admin-image-context")
          destination.mkdir(mode=0o755)
          with tarfile.open(archive, mode="r:gz") as bundle:
              for member in bundle.getmembers():
                  path = PurePosixPath(member.name)
                  if (
                      path.is_absolute()
                      or ".." in path.parts
                      or member.issym()
                      or member.islnk()
                      or not (member.isfile() or member.isdir())
                  ):
                      raise SystemExit(f"unsafe closed-context member: {member.name}")
              bundle.extractall(destination, filter="data")
          PY

          (
            cd polaris-admin-image-context
            sha256sum --check --strict ../candidate-input/build-context.sha256
          )
          cmp bootstrap/polaris/v1.6.0/Containerfile.admin \
            polaris-admin-image-context/Containerfile.admin
          test -s polaris-admin-image-context/build/quarkus-app/quarkus-run.jar
          test -s polaris-admin-image-context/distribution/LICENSE
          test -s polaris-admin-image-context/distribution/NOTICE
          if ! find polaris-admin-image-context/build/quarkus-app \
            -type f -iname '*mongodb*.jar' -print -quit | grep --quiet .
          then
            echo "closed Admin image context omitted its disclosed MongoDB surface" >&2
            exit 1
          fi
          if find polaris-admin-image-context -type l -print -quit | grep --quiet .; then
            echo "closed image context contains a symlink after extraction" >&2
            exit 1
          fi

      - name: Install and verify pinned Buildx, BuildKit, Crane, and runtime base
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "aarch64"

          export DOCKER_CONFIG="${RUNNER_TEMP}/docker-config"
          plugin_dir="${DOCKER_CONFIG}/cli-plugins"
          buildx_bin="${plugin_dir}/docker-buildx"
          mkdir -p "${plugin_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${buildx_bin}.download" "${BUILDX_URL}"
          echo "${BUILDX_BINARY_SHA256}  ${buildx_bin}.download" \
            | sha256sum --check --strict
          install -m 0755 "${buildx_bin}.download" "${buildx_bin}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "${GITHUB_ENV}"
          case "$(docker buildx version)" in
            *" ${BUILDX_VERSION} "*) ;;
            *) echo "unexpected Buildx version" >&2; exit 1 ;;
          esac

          tool_dir="${RUNNER_TEMP}/crane"
          mkdir -p "${tool_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/crane.tar.gz" "${CRANE_URL}"
          echo "${CRANE_ARCHIVE_SHA256}  ${tool_dir}/crane.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/crane.tar.gz" \
            --directory "${tool_dir}" crane
          install -m 0755 "${tool_dir}/crane" "${tool_dir}/crane.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/crane.bin" version)" = "${CRANE_VERSION#v}"

          docker buildx imagetools inspect --raw "${RUNTIME_BASE_INDEX}" \
            > runtime-base-index.json
          echo "${RUNTIME_BASE_INDEX_DIGEST#sha256:}  runtime-base-index.json" \
            | sha256sum --check --strict
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          index = json.loads(
              Path("runtime-base-index.json").read_text(encoding="utf-8")
          )
          arm64 = [
              descriptor
              for descriptor in index.get("manifests", [])
              if descriptor.get("platform", {}).get("os") == "linux"
              and descriptor.get("platform", {}).get("architecture") == "arm64"
              and descriptor.get("platform", {}).get("variant") in (None, "v8")
          ]
          if (
              len(arm64) != 1
              or arm64[0].get("digest") != os.environ["RUNTIME_BASE_DIGEST"]
          ):
              raise SystemExit("runtime base index does not bind the reviewed arm64 manifest")
          PY

          docker buildx imagetools inspect --raw "${RUNTIME_BASE}" \
            > runtime-base-manifest.json
          echo "${RUNTIME_BASE_DIGEST#sha256:}  runtime-base-manifest.json" \
            | sha256sum --check --strict
          docker pull --platform linux/arm64 "${RUNTIME_BASE}"
          docker run --rm --platform linux/arm64 --network none \
            "${RUNTIME_BASE}" java -version > runtime-base-java-version.txt 2>&1
          grep --fixed-strings --quiet \
            "openjdk version \"${RUNTIME_BASE_JAVA_VERSION}\"" \
            runtime-base-java-version.txt
          docker run --rm --platform linux/arm64 --network none \
            "${RUNTIME_BASE}" cat /etc/alpine-release > runtime-base-os-version.txt
          test "$(tr -d '\r\n' < runtime-base-os-version.txt)" = \
            "${RUNTIME_BASE_OS_VERSION}"

          docker buildx imagetools inspect --raw "${BUILDKIT_IMAGE}" \
            > "${RUNNER_TEMP}/buildkit-index.json"
          echo "${BUILDKIT_IMAGE_DIGEST#sha256:}  ${RUNNER_TEMP}/buildkit-index.json" \
            | sha256sum --check --strict
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          index = json.loads(
              Path(os.environ["RUNNER_TEMP"], "buildkit-index.json").read_text(
                  encoding="utf-8"
              )
          )
          matches = [
              item["digest"]
              for item in index.get("manifests", [])
              if item.get("platform", {}).get("os") == "linux"
              and item.get("platform", {}).get("architecture") == "arm64"
              and not item.get("platform", {}).get("variant")
          ]
          if matches != [os.environ["BUILDKIT_ARM64_MANIFEST_DIGEST"]]:
              raise SystemExit(f"unexpected BuildKit arm64 manifest: {matches}")
          PY

          builder_name="shirokuma-polaris-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker buildx create \
            --name "${builder_name}" \
            --driver docker-container \
            --driver-opt "image=${BUILDKIT_IMAGE}" \
            --use >/dev/null
          docker buildx inspect --bootstrap > "${RUNNER_TEMP}/buildx-inspect.txt"
          actual_buildkit_version=$(
            awk '$1 == "BuildKit" && $2 == "version:" {print $3; exit}' \
              "${RUNNER_TEMP}/buildx-inspect.txt"
          )
          test "${actual_buildkit_version}" = "${BUILDKIT_VERSION}"
          builder_container=$(
            docker ps --filter "name=buildx_buildkit_${builder_name}" \
              --format '{{.ID}}'
          )
          test -n "${builder_container}"
          test "$(
            docker inspect "${builder_container}" --format '{{.Config.Image}}'
          )" = "${BUILDKIT_IMAGE}"
          echo "BUILDER_NAME=${builder_name}" >> "${GITHUB_ENV}"

          ACTUAL_BUILDKIT_VERSION="${actual_buildkit_version}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_version": 1,
              "buildx": {
                  "version": os.environ["BUILDX_VERSION"],
                  "binary_sha256": os.environ["BUILDX_BINARY_SHA256"],
              },
              "buildkit": {
                  "version": os.environ["ACTUAL_BUILDKIT_VERSION"],
                  "image": os.environ["BUILDKIT_IMAGE"],
                  "linux_arm64_manifest_digest": os.environ[
                      "BUILDKIT_ARM64_MANIFEST_DIGEST"
                  ],
              },
              "runtime_base": {
                  "index": os.environ["RUNTIME_BASE_INDEX"],
                  "linux_arm64_manifest": os.environ["RUNTIME_BASE"],
                  "java_version": os.environ["RUNTIME_BASE_JAVA_VERSION"],
                  "os": os.environ["RUNTIME_BASE_OS"],
                  "os_version": os.environ["RUNTIME_BASE_OS_VERSION"],
              },
          }
          Path("builder-metadata.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Log in to GHCR for the run-scoped quarantine push
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish only the closed linux/arm64 context
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          builder: ${{ env.BUILDER_NAME }}
          context: polaris-admin-image-context
          file: polaris-admin-image-context/Containerfile.admin
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          no-cache: true
          network: none
          tags: ${{ env.IMAGE }}:1.6.0-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            SOURCE_COMMIT=${{ env.SOURCE_COMMIT }}
            SOURCE_CREATED=${{ env.SOURCE_CREATED }}

      - name: Verify exact image platform, config, and manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          crane.bin manifest "${IMAGE}@${DIGEST}" > image-manifest.json
          echo "${DIGEST#sha256:}  image-manifest.json" \
            | sha256sum --check --strict
          crane.bin config "${IMAGE}@${DIGEST}" > image-config.json
          docker pull --platform linux/arm64 "${IMAGE}@${DIGEST}"
          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" \
              --format '{{.Os}}/{{.Architecture}}'
          )" = "linux/arm64"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path("image-config.json").read_text(encoding="utf-8"))
          runtime = config.get("config", {})
          expected_labels = {
              "org.opencontainers.image.source": "https://github.com/apache/polaris",
              "org.opencontainers.image.revision": os.environ["SOURCE_COMMIT"],
              "org.opencontainers.image.version": "1.6.0",
              "org.opencontainers.image.created": os.environ["SOURCE_CREATED"],
              "org.opencontainers.image.description": (
                  "Apache Polaris Admin Tool 1.6.0 built from the ASF-signed source release"
              ),
              "org.opencontainers.image.licenses": "Apache-2.0",
              "org.opencontainers.image.base.name": (
                  "docker.io/library/amazoncorretto"
              ),
              "dev.shirokuma.runtime-base.arm64-digest": os.environ[
                  "RUNTIME_BASE_DIGEST"
              ],
          }
          conditions = (
              config.get("os") == "linux",
              config.get("architecture") == "arm64",
              runtime.get("User") == "10000:10001",
              runtime.get("WorkingDir") == "/deployments",
              runtime.get("Entrypoint")
              == ["/usr/bin/java", "-jar", "/deployments/quarkus-run.jar"],
              runtime.get("Cmd") == ["--help"],
              runtime.get("ExposedPorts") in (None, {}),
              "HOME=/tmp" in runtime.get("Env", []),
              not any(
                  any(marker in item.casefold() for marker in (
                      "credential",
                      "password",
                      "secret",
                      "token",
                      "datasource",
                  ))
                  for item in runtime.get("Env", [])
              ),
              all(
                  runtime.get("Labels", {}).get(key) == value
                  for key, value in expected_labels.items()
              ),
          )
          if not all(conditions):
              raise SystemExit("published Polaris Admin image config differs from policy")
          PY

      - name: Smoke-test credential-free Admin help under hardened controls
        timeout-minutes: 4
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          root_container="polaris-admin-help-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          bootstrap_container="polaris-admin-bootstrap-help-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          root_log="${RUNNER_TEMP}/polaris-admin-help.raw.log"
          bootstrap_log="${RUNNER_TEMP}/polaris-admin-bootstrap-help.raw.log"
          root_inspect="${RUNNER_TEMP}/polaris-admin-help.raw-inspect.json"
          bootstrap_inspect="${RUNNER_TEMP}/polaris-admin-bootstrap-help.raw-inspect.json"
          cleanup() {
            rm -f \
              "${root_log}" \
              "${bootstrap_log}" \
              "${root_inspect}" \
              "${bootstrap_inspect}"
            docker rm --force "${root_container}" >/dev/null 2>&1 || true
            docker rm --force "${bootstrap_container}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          test "$(
            docker image inspect "${IMAGE}@${DIGEST}" --format '{{.Config.User}}'
          )" = "10000:10001"

          create_admin_smoke() {
            local name="$1"
            shift
            docker create \
              --name "${name}" \
              --network none \
              --user 10000:10001 \
              --read-only \
              --tmpfs /tmp:rw,nosuid,nodev,size=64m,uid=10000,gid=10001,mode=1777 \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              --pids-limit 512 \
              --memory 1536m \
              "${IMAGE}@${DIGEST}" "$@" >/dev/null
            docker start "${name}" >/dev/null
            test "$(docker wait "${name}")" = "0"
          }

          create_admin_smoke "${root_container}" --help
          create_admin_smoke "${bootstrap_container}" bootstrap --help
          docker logs "${root_container}" > "${root_log}" 2>&1
          docker logs "${bootstrap_container}" > "${bootstrap_log}" 2>&1
          docker inspect "${root_container}" > "${root_inspect}"
          docker inspect "${bootstrap_container}" > "${bootstrap_inspect}"

          ROOT_LOG="${root_log}" \
          BOOTSTRAP_LOG="${bootstrap_log}" \
          ROOT_INSPECT="${root_inspect}" \
          BOOTSTRAP_INSPECT="${bootstrap_inspect}" \
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          root_log = Path(os.environ["ROOT_LOG"]).read_text(encoding="utf-8")
          bootstrap_log = Path(os.environ["BOOTSTRAP_LOG"]).read_text(
              encoding="utf-8"
          )
          required_root_markers = [
              "Usage: polaris-admin-tool.jar [-hV] [COMMAND]",
              "Polaris administration & maintenance tool",
              "bootstrap",
              "purge",
              "nosql",
          ]
          required_bootstrap_markers = [
              "Usage: polaris-admin-tool.jar bootstrap",
              "Bootstraps realms and root principal credentials.",
              "--realm",
              "--credential",
              "--print-credentials",
              "--credentials-file",
          ]
          for label, output, markers in (
              ("root help", root_log, required_root_markers),
              ("bootstrap help", bootstrap_log, required_bootstrap_markers),
          ):
              missing = [marker for marker in markers if marker not in output]
              if missing:
                  raise SystemExit(f"{label} omitted required markers: {missing}")

          forbidden = {
              "generated_root_credential": r"(?i)\b[0-9a-f]{16}:[0-9a-f]{32}\b",
              "root_credential_output": (
                  r"(?im)^realm:\s+\S+\s+root principal credentials:\s+\S+\s*$"
              ),
              "bootstrap_credential_assignment": (
                  r"(?i)\b(?:POLARIS_BOOTSTRAP_CREDENTIALS|"
                  r"polaris\.bootstrap\.credentials)\s*[:=]\s*\S+"
              ),
              "authorization_header": (
                  r"(?i)\bAuthorization\s*:\s*(?:Bearer|Basic)\s+\S+"
              ),
              "secret_assignment": (
                  r"(?i)\b(?:password|access[_-]?token|refresh[_-]?token)"
                  r"\s*[:=]\s*\S+"
              ),
          }
          combined = root_log + "\n" + bootstrap_log
          leaked = [
              name for name, pattern in forbidden.items() if re.search(pattern, combined)
          ]
          if leaked:
              raise SystemExit(f"credential-free Admin help leaked: {leaked}")

          expected_tmpfs = {
              "rw",
              "nosuid",
              "nodev",
              "size=64m",
              "uid=10000",
              "gid=10001",
              "mode=1777",
          }
          expected_args = {
              "root_help": ["-jar", "/deployments/quarkus-run.jar", "--help"],
              "bootstrap_help": [
                  "-jar",
                  "/deployments/quarkus-run.jar",
                  "bootstrap",
                  "--help",
              ],
          }
          retained = []
          for label, env_name in (
              ("root_help", "ROOT_INSPECT"),
              ("bootstrap_help", "BOOTSTRAP_INSPECT"),
          ):
              containers = json.loads(
                  Path(os.environ[env_name]).read_text(encoding="utf-8")
              )
              if len(containers) != 1:
                  raise SystemExit(f"{label} inspect must contain one container")
              container = containers[0]
              config = container.get("Config", {})
              host = container.get("HostConfig", {})
              security_options = host.get("SecurityOpt", [])
              if (
                  config.get("User") != "10000:10001"
                  or container.get("Path") != "/usr/bin/java"
                  or container.get("Args") != expected_args[label]
                  or host.get("NetworkMode") != "none"
                  or host.get("ReadonlyRootfs") is not True
                  or set(host.get("Tmpfs", {}).get("/tmp", "").split(","))
                  != expected_tmpfs
                  or host.get("CapDrop") != ["ALL"]
                  or host.get("PidsLimit") != 512
                  or host.get("Memory") != 1610612736
                  or len(security_options) != 1
                  or not security_options[0].startswith("no-new-privileges")
                  or any(
                      any(marker in value.casefold() for marker in (
                          "credential",
                          "password",
                          "secret",
                          "token",
                          "datasource",
                      ))
                      for value in config.get("Env", [])
                  )
              ):
                  raise SystemExit(
                      f"effective {label} Admin smoke controls differ from policy"
                  )
              retained.append(
                  {
                      "name": label,
                      "user": config["User"],
                      "path": container["Path"],
                      "args": container["Args"],
                      "network_mode": host["NetworkMode"],
                      "read_only_rootfs": host["ReadonlyRootfs"],
                      "tmpfs": {"/tmp": sorted(expected_tmpfs)},
                      "capabilities_dropped": host["CapDrop"],
                      "pids_limit": host["PidsLimit"],
                      "memory_bytes": host["Memory"],
                      "security_options": security_options,
                  }
              )

          inspect_record = {
              "schema_version": 1,
              "result": "passed",
              "reference": reference,
              "containers": retained,
          }
          inspect_path = Path("admin-container-inspect.json")
          inspect_path.write_text(
              json.dumps(inspect_record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          inspect_sha256 = hashlib.sha256(inspect_path.read_bytes()).hexdigest()

          def output_record(command, output, markers):
              encoded = output.encode("utf-8")
              return {
                  "schema_version": 1,
                  "result": "passed",
                  "reference": reference,
                  "command": command,
                  "exit_code": 0,
                  "network": "none",
                  "credentials_supplied": False,
                  "required_output_markers": markers,
                  "output_sha256": hashlib.sha256(encoded).hexdigest(),
                  "output_size": len(encoded),
                  "admin_container_inspect_sha256": inspect_sha256,
              }

          Path("admin-help.json").write_text(
              json.dumps(
                  output_record(["--help"], root_log, required_root_markers),
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          bootstrap_record = output_record(
              ["bootstrap", "--help"],
              bootstrap_log,
              required_bootstrap_markers,
          )
          bootstrap_record.update(
              {
                  "credential_bearing_options": [
                      "--credential",
                      "--credentials-file",
                      "--print-credentials",
                  ],
                  "credential_argument_permitted": False,
                  "credential_file_read": False,
                  "print_credentials_requested": False,
              }
          )
          Path("admin-bootstrap-help.json").write_text(
              json.dumps(bootstrap_record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          policy = {
              "schema_version": 1,
              "result": "passed",
              "sources": ["root --help", "bootstrap --help"],
              "forbidden_pattern_classes": sorted(forbidden),
              "redaction_count": 0,
              "raw_logs_retained": False,
              "credentials_supplied": False,
              "combined_output_sha256": hashlib.sha256(
                  combined.encode("utf-8")
              ).hexdigest(),
              "combined_output_size": len(combined.encode("utf-8")),
          }
          Path("admin-smoke-log-policy.json").write_text(
              json.dumps(policy, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          rm -f \
            "${root_log}" \
            "${bootstrap_log}" \
            "${root_inspect}" \
            "${bootstrap_inspect}"

