            trivy-version.json \
            trivy.json \
            trusted-tag-manifest.json | sort)
          actual_payloads=$(
            find candidate-evidence -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_payloads}" = "${expected_payloads}"
          (
            cd candidate-evidence
            find . -mindepth 1 -maxdepth 1 -type f \
              -print0 \
              | sort -z \
              | xargs -0 sha256sum > evidence.sha256
            sha256sum --check --strict evidence.sha256
            test "$(find . -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')" = \
              "35"
          )

      - name: Retain non-admitted image publication evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-admin-image-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: candidate-evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Remove promotion credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
