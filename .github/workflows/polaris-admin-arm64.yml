            publication.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            runtime-base-index.json \
            runtime-base-java-version.txt \
            runtime-base-manifest.json \
            runtime-base-os-version.txt \
            sbom-attestation-bundle.json \
            sbom-policy.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
