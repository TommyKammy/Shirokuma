      - name: Keyless-sign and verify the exact scanned image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(
            cosign version | awk '$1 == "GitVersion:" {print $2; exit}'
          )" = "${COSIGN_VERSION}"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-arm64.yml@${GITHUB_REF}"
          cosign sign --yes --bundle cosign-signature-bundle.json \
            "${IMAGE}@${DIGEST}"
          cosign verify-blob \
            --bundle cosign-signature-bundle.json \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-identity "${identity}" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            image-manifest.json

          for registry_attempt in 1 2 3 4 5 6; do
            if cosign verify \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              --certificate-identity "${identity}" \
              --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
              --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
              --certificate-github-workflow-ref "${GITHUB_REF}" \
              --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
              --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
              --output json "${IMAGE}@${DIGEST}" > cosign-payloads.json.tmp \
              && cosign download signature "${IMAGE}@${DIGEST}" \
                > registry-signature-bundles.jsonl.tmp \
              && test -s registry-signature-bundles.jsonl.tmp
            then
              mv cosign-payloads.json.tmp cosign-payloads.json
              mv registry-signature-bundles.jsonl.tmp \
                registry-signature-bundles.jsonl
              break
            fi
            rm -f cosign-payloads.json.tmp registry-signature-bundles.jsonl.tmp
            if [ "${registry_attempt}" -eq 6 ]; then
              echo "registry signature was not visible after bounded retries" >&2
              exit 1
            fi
            sleep "$((registry_attempt * 2))"
          done

          rekor_index=$(python3 - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(
              Path("cosign-signature-bundle.json").read_text(encoding="utf-8")
          )
          entries = bundle["verificationMaterial"]["tlogEntries"]
          if len(entries) != 1:
              raise SystemExit("exactly one Rekor entry is required")
          print(entries[0]["logIndex"])
          PY
          )
          curl --fail --location \
            --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output rekor-entry.json \
            "${REKOR_URL}/api/v1/log/entries?logIndex=${rekor_index}"

          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          bundle = json.loads(
              Path("cosign-signature-bundle.json").read_text(encoding="utf-8")
          )
          payloads = json.loads(
              Path("cosign-payloads.json").read_text(encoding="utf-8")
          )
          registry_bundles = [
              json.loads(line)
              for line in Path("registry-signature-bundles.jsonl")
              .read_text(encoding="utf-8")
              .splitlines()
              if line.strip()
          ]
          rekor = json.loads(Path("rekor-entry.json").read_text(encoding="utf-8"))
          bundle_media_type = "application/vnd.dev.sigstore.bundle.v0.3+json"
          if bundle.get("mediaType") != bundle_media_type:
              raise SystemExit("unexpected Sigstore bundle format")
          for candidate in registry_bundles:
              if "Base64Signature" in candidate or "Payload" in candidate:
                  raise SystemExit(
                      "Cosign v3.1.1 contract rejects legacy signature records"
                  )
              if candidate.get("mediaType") != bundle_media_type:
                  raise SystemExit("registry signature is not a Sigstore v0.3 bundle")
              if "dsseEnvelope" not in candidate or "messageSignature" in candidate:
                  raise SystemExit("registry signature is not the required DSSE bundle")
              candidate_statement = json.loads(
                  base64.b64decode(
                      candidate["dsseEnvelope"]["payload"], validate=True
                  )
              )
              if candidate_statement.get("predicateType") != (
                  "https://sigstore.dev/cosign/sign/v1"
              ):
                  raise SystemExit("registry bundle has an unexpected predicate type")
          material = bundle["verificationMaterial"]
          if not material.get("certificate", {}).get("rawBytes"):
              raise SystemExit("bundle certificate is missing")
          statement = json.loads(
              base64.b64decode(
                  bundle["dsseEnvelope"]["payload"], validate=True
              )
          )
          subjects = statement.get("subject", [])
          expected_digest = os.environ["DIGEST"].removeprefix("sha256:")
          if not (
              statement.get("predicateType") == "https://sigstore.dev/cosign/sign/v1"
              and len(subjects) == 1
              and subjects[0].get("digest") == {"sha256": expected_digest}
              and subjects[0].get("name", "") == ""
              and subjects[0].get("annotations", {}) == {}
          ):
              raise SystemExit("bundle subject is not the exact image digest")
          entries = material.get("tlogEntries", [])
          if len(entries) != 1:
              raise SystemExit("exactly one bundle tlog entry is required")
          entry = entries[0]
          proof = entry.get("inclusionProof", {})
          if not (
              entry.get("canonicalizedBody")
              and entry.get("inclusionPromise", {}).get("signedEntryTimestamp")
              and proof.get("checkpoint")
              and proof.get("rootHash")
              and proof.get("treeSize")
              and isinstance(proof.get("hashes"), list)
          ):
              raise SystemExit("incomplete Rekor inclusion evidence")
          if not isinstance(rekor, dict) or len(rekor) != 1:
              raise SystemExit("expected one Rekor API entry")
          uuid, api_entry = next(iter(rekor.items()))
          log_id_hex = base64.b64decode(
              entry["logId"]["keyId"], validate=True
          ).hex()
          stable_pairs = (
              (str(api_entry.get("logIndex")), str(entry["logIndex"])),
              (str(api_entry.get("integratedTime")), str(entry["integratedTime"])),
              (api_entry.get("logID"), log_id_hex),
              (api_entry.get("body"), entry["canonicalizedBody"]),
          )
          if any(left != right for left, right in stable_pairs):
              raise SystemExit("Rekor API entry does not match the signed bundle")
          if not isinstance(payloads, list) or not payloads:
              raise SystemExit("registry verification returned no payloads")
          expected_reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          for payload in payloads:
              critical = payload.get("critical", payload.get("Critical", {}))
              image = critical.get("image", critical.get("Image", {}))
              identity = critical.get("identity", critical.get("Identity", {}))
              payload_digest = image.get(
                  "docker-manifest-digest",
                  image.get("Docker-manifest-digest"),
              )
              payload_reference = identity.get(
                  "docker-reference",
                  identity.get("Docker-reference"),
              )
              if (
                  payload_digest != os.environ["DIGEST"]
                  or payload_reference != expected_reference
              ):
                  raise SystemExit(
                      "registry verification payload reference or digest mismatch"
                  )
          registry_bundle_matches = sum(
              candidate == bundle for candidate in registry_bundles
          )
          if registry_bundle_matches != 1:
              raise SystemExit("registry does not contain exactly the retained bundle")
          Path("registry-signature-bundles.jsonl").write_text(
              json.dumps(bundle, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          bundle_sha256 = hashlib.sha256(
              Path("cosign-signature-bundle.json").read_bytes()
          ).hexdigest()

          record = {
              "schema_version": 1,
              "reference": expected_reference,
              "certificate_constraints": {
                  "issuer": "https://token.actions.githubusercontent.com",
                  "identity": (
                      f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
                      f"/.github/workflows/polaris-admin-arm64.yml@{os.environ['GITHUB_REF']}"
                  ),
                  "github_workflow_name": os.environ["GITHUB_WORKFLOW"],
                  "github_workflow_repository": os.environ["GITHUB_REPOSITORY"],
                  "github_workflow_ref": os.environ["GITHUB_REF"],
                  "github_workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
                  "github_workflow_trigger": os.environ["GITHUB_EVENT_NAME"],
              },
              "detached_bundle_verified": True,
              "registry_signature_verified": True,
              "registry_bundle": {
                  "file": "registry-signature-bundles.jsonl",
                  "exact_matches": registry_bundle_matches,
                  "bundle_sha256": bundle_sha256,
              },
              "transparency_log": {
                  "base_url": os.environ["REKOR_URL"],
                  "major_api_version": int(os.environ["REKOR_MAJOR_API_VERSION"]),
                  "entry_lookup": (
                      f"/api/v1/log/entries?logIndex={entry['logIndex']}"
                  ),
              },
              "verified_payloads": payloads,
              "rekor_entries": [
                  {
                      "uuid": uuid,
                      "log_index": str(entry["logIndex"]),
                      "integrated_time": str(entry["integratedTime"]),
                      "log_id": entry["logId"]["keyId"],
                      "log_id_hex": log_id_hex,
                  }
              ],
          }
          Path("cosign-verify.json").write_text(
              json.dumps(record, indent=2) + "\n", encoding="utf-8"
          )
          PY
          rm cosign-payloads.json

      - name: Mirror GHCR credentials for provenance publication
        shell: bash
        run: |
          set -euo pipefail
          default_config_dir="${HOME}/.docker"
          default_config="${default_config_dir}/config.json"
          backup="${RUNNER_TEMP}/docker-config-before-provenance.json"
          mkdir -p "${default_config_dir}"
          if [ -e "${default_config}" ]; then
            install -m 0600 "${default_config}" "${backup}"
            echo "PROVENANCE_DOCKER_CONFIG_BACKUP=1" >> "${GITHUB_ENV}"
          else
            echo "PROVENANCE_DOCKER_CONFIG_BACKUP=0" >> "${GITHUB_ENV}"
          fi
          install -m 0600 "${DOCKER_CONFIG}/config.json" "${default_config}"

      - name: Publish SLSA provenance for the exact scanned digest
        id: provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Remove provenance credential mirror
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          default_config="${HOME}/.docker/config.json"
          backup="${RUNNER_TEMP}/docker-config-before-provenance.json"
          rm -f "${default_config}"
          if [ "${PROVENANCE_DOCKER_CONFIG_BACKUP:-0}" = "1" ]; then
            install -m 0600 "${backup}" "${default_config}"
            rm -f "${backup}"
          fi

      - name: Verify SLSA provenance from this exact workflow
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --signer-workflow \
              "${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-arm64.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --format json > slsa-verify.json
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          records = json.loads(
              Path("slsa-verify.json").read_text(encoding="utf-8")
          )
          expected_digest = os.environ["DIGEST"].removeprefix("sha256:")
          repository = os.environ["GITHUB_REPOSITORY"]
          repository_url = f"https://github.com/{repository}"
          workflow_path = ".github/workflows/polaris-admin-arm64.yml"
          identity = f"{repository_url}/{workflow_path}@{os.environ['GITHUB_REF']}"
          invocation = (
              f"{repository_url}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              f"/attempts/{os.environ['GITHUB_RUN_ATTEMPT']}"
          )
          matches = []
          bundles = []
          for record in records:
              certificate = record["verificationResult"]["signature"]["certificate"]
              bundle = record["attestation"]["bundle"]
              statement = json.loads(
                  base64.b64decode(
                      bundle["dsseEnvelope"]["payload"], validate=True
                  )
              )
              predicate = statement.get("predicate", {})
              definition = predicate.get("buildDefinition", {})
              workflow = definition.get("externalParameters", {}).get("workflow", {})
              details = predicate.get("runDetails", {})
              conditions = (
                  statement.get("_type") == "https://in-toto.io/Statement/v1",
                  statement.get("predicateType")
                  == "https://slsa.dev/provenance/v1",
                  definition.get("buildType")
                  == "https://actions.github.io/buildtypes/workflow/v1",
                  certificate.get("issuer")
                  == "https://token.actions.githubusercontent.com",
                  certificate.get("subjectAlternativeName") == identity,
                  certificate.get("githubWorkflowName")
                  == os.environ["GITHUB_WORKFLOW"],
                  certificate.get("githubWorkflowRepository") == repository,
                  certificate.get("githubWorkflowRef")
                  == os.environ["GITHUB_REF"],
                  certificate.get("githubWorkflowSHA")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("githubWorkflowTrigger")
                  == os.environ["GITHUB_EVENT_NAME"],
                  certificate.get("buildTrigger")
                  == os.environ["GITHUB_EVENT_NAME"],
                  certificate.get("runnerEnvironment") == "github-hosted",
                  certificate.get("buildSignerURI") == identity,
                  certificate.get("buildSignerDigest")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("buildConfigURI") == identity,
                  certificate.get("buildConfigDigest")
                  == os.environ["GITHUB_WORKFLOW_SHA"],
                  certificate.get("sourceRepositoryURI") == repository_url,
                  certificate.get("sourceRepositoryDigest")
                  == os.environ["GITHUB_SHA"],
                  certificate.get("sourceRepositoryRef")
                  == os.environ["GITHUB_REF"],
                  certificate.get("runInvocationURI") == invocation,
                  workflow.get("repository") == repository_url,
                  workflow.get("path") == workflow_path,
                  workflow.get("ref") == os.environ["GITHUB_REF"],
                  details.get("builder", {}).get("id") == identity,
                  details.get("metadata", {}).get("invocationId") == invocation,
                  any(
                      subject.get("name") == os.environ["IMAGE"]
                      and subject.get("digest", {}).get("sha256")
                      == expected_digest
                      for subject in statement.get("subject", [])
                  ),
              )
              if all(conditions):
                  matches.append(record)
                  bundles.append(bundle)
          if not matches:
              raise SystemExit("no SLSA provenance matches the workflow invocation")
          Path("slsa-verify.json").write_text(
              json.dumps(matches, indent=2) + "\n", encoding="utf-8"
          )
          Path("slsa-bundles.jsonl").write_text(
              "".join(
                  json.dumps(bundle, separators=(",", ":")) + "\n"
                  for bundle in bundles
              ),
              encoding="utf-8",
          )
          PY

      - name: Keyless-attest the retained Polaris SBOM and scan
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          verify_attestation_bundle() {
            local bundle="$1"
            local predicate_type="$2"
            cosign verify-blob-attestation \
              --bundle "${bundle}" \
              --type "${predicate_type}" \
              --certificate-identity \
                "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-arm64.yml@${GITHUB_REF}" \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
              --certificate-github-workflow-ref "${GITHUB_REF}" \
              --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
              --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
              --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
              --digest "${DIGEST#sha256:}" \
              --digestAlg sha256
          }

          cosign attest --yes \
            --bundle sbom-attestation-bundle.json \
            --type cyclonedx \
            --predicate polaris-admin-1.6.0-arm64.cdx.json "${IMAGE}@${DIGEST}"
          verify_attestation_bundle \
            sbom-attestation-bundle.json cyclonedx

          cosign attest --yes \
            --bundle trivy-attestation-bundle.json \
            --type https://shirokuma.dev/attestations/trivy/v1 \
            --predicate trivy.json "${IMAGE}@${DIGEST}"
          verify_attestation_bundle \
            trivy-attestation-bundle.json \
            https://shirokuma.dev/attestations/trivy/v1

      - name: Record and retain the non-admitted image candidate
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/polaris-admin-image-candidate"
          mkdir -p "${evidence_dir}"
          cp \
            anonymous-image-manifest.json \
            builder-metadata.json \
            candidate-input/build-context.sha256 \
            candidate-input/build-input.json \
            candidate-input/dependency-input.json \
            candidate-input/offline-build.json \
            candidate-input/source-authentication.json \
            cosign-signature-bundle.json \
            cosign-verify.json \
            admin-help.json \
            admin-bootstrap-help.json \
            admin-container-inspect.json \
            admin-smoke-log-policy.json \
            image-config.json \
            image-manifest.json \
            polaris-admin-1.6.0-arm64.cdx.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            runtime-base-index.json \
            runtime-base-java-version.txt \
            runtime-base-manifest.json \
            runtime-base-os-version.txt \
            sbom-attestation-bundle.json \
            sbom-policy.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
            toolchain.json \
            trivy-attestation-bundle.json \
            trivy-version.json \
            trivy.json \
            "${evidence_dir}/"

          expected_files=$(printf '%s\n' \
            admin-bootstrap-help.json \
            admin-container-inspect.json \
            admin-help.json \
            admin-smoke-log-policy.json \
            anonymous-image-manifest.json \
            build-context.sha256 \
            build-input.json \
            builder-metadata.json \
            cosign-signature-bundle.json \
            cosign-verify.json \
            dependency-input.json \
            image-config.json \
            image-manifest.json \
            offline-build.json \
            polaris-admin-1.6.0-arm64.cdx.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            runtime-base-index.json \
            runtime-base-java-version.txt \
            runtime-base-manifest.json \
            runtime-base-os-version.txt \
            sbom-attestation-bundle.json \
            sbom-policy.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
            source-authentication.json \
            toolchain.json \
            trivy-attestation-bundle.json \
            trivy-version.json \
            trivy.json | sort)
          actual_files=$(
            find "${evidence_dir}" -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"

      - name: Upload candidate evidence before trusted-tag promotion
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-admin-image-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/polaris-admin-image-candidate/
          if-no-files-found: error
          retention-days: 30

      - name: Remove registry credentials and ephemeral builder
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
          if [ -n "${BUILDER_NAME:-}" ]; then
            docker buildx rm "${BUILDER_NAME}" >/dev/null 2>&1 || true
          fi

  promote:
    needs:
      - prepare
      - verify
    if: >-
      needs.prepare.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.prepare.outputs.active == 'true' &&
      github.repository == 'TommyKammy/Shirokuma' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the reviewed promotion policy
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Rebind promotion to the static publication policy
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "TommyKammy/Shirokuma"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_WORKFLOW_REF}" = \
            "TommyKammy/Shirokuma/.github/workflows/polaris-admin-arm64.yml@refs/heads/main"
          test "${GITHUB_SHA}" = "${GITHUB_WORKFLOW_SHA}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          python3 scripts/verify_polaris_admin_image.py audit-publication-bootstrap --root .

      - name: Install pinned Cosign before promotion policy revalidation
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Complete the promotion cryptographic policy audit
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_polaris_admin_image.py audit --root .
          python3 scripts/verify_polaris_trusted_image.py audit --root .

      - name: Download retained candidate evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.candidate_artifact }}
          path: candidate-evidence

      - name: Revalidate candidate evidence before promotion credentials exist
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          expected_files=$(printf '%s\n' \
            admin-bootstrap-help.json \
            admin-container-inspect.json \
            admin-help.json \
            admin-smoke-log-policy.json \
            anonymous-image-manifest.json \
            build-context.sha256 \
            build-input.json \
            builder-metadata.json \
            cosign-signature-bundle.json \
            cosign-verify.json \
            dependency-input.json \
            image-config.json \
            image-manifest.json \
            offline-build.json \
            polaris-admin-1.6.0-arm64.cdx.json \
            registry-signature-bundles.jsonl \
            rekor-entry.json \
            runtime-base-index.json \
            runtime-base-java-version.txt \
            runtime-base-manifest.json \
            runtime-base-os-version.txt \
            sbom-attestation-bundle.json \
            sbom-policy.json \
            slsa-bundles.jsonl \
            slsa-verify.json \
            source-authentication.json \
            toolchain.json \
            trivy-attestation-bundle.json \
            trivy-version.json \
            trivy.json | sort)
          actual_files=$(
            find candidate-evidence -mindepth 1 -maxdepth 1 -type f \
              -exec basename {} \; | sort
          )
          test "${actual_files}" = "${expected_files}"
          if find candidate-evidence -mindepth 1 -maxdepth 1 \
            \( -type l -o ! -type f \) -print -quit | grep --quiet .
          then
            echo "candidate evidence contains a symlink or special file" >&2
            exit 1
          fi
          echo "${DIGEST#sha256:}  candidate-evidence/image-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json \
            candidate-evidence/anonymous-image-manifest.json
          echo "${RUNTIME_BASE_INDEX_DIGEST#sha256:}  candidate-evidence/runtime-base-index.json" \
            | sha256sum --check --strict
          echo "${RUNTIME_BASE_DIGEST#sha256:}  candidate-evidence/runtime-base-manifest.json" \
            | sha256sum --check --strict
          grep --fixed-strings --quiet \
            "openjdk version \"${RUNTIME_BASE_JAVA_VERSION}\"" \
            candidate-evidence/runtime-base-java-version.txt
          test "$(tr -d '\r\n' < candidate-evidence/runtime-base-os-version.txt)" = \
            "${RUNTIME_BASE_OS_VERSION}"

          DIGEST="${DIGEST}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("candidate-evidence")

          def reject_duplicates(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key}")
                  result[key] = value
              return result

          def load(name, maximum=16 * 1024 * 1024):
              path = root / name
              size = path.stat().st_size
              if size <= 0 or size > maximum:
                  raise SystemExit(f"invalid retained evidence size: {name}={size}")
              try:
                  return json.loads(
                      path.read_text(encoding="utf-8"),
                      object_pairs_hook=reject_duplicates,
                  )
              except (UnicodeDecodeError, ValueError) as error:
                  raise SystemExit(f"invalid retained JSON {name}: {error}") from error

          reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          expected_decision = "accepted_unmodified_for_image_publication_only"
          required_terms = ["mongodb", "polaris-persistence-nosql"]
          expected_projects = [
              ":polaris-persistence-nosql-api",
              ":polaris-persistence-nosql-maintenance-api",
              ":polaris-persistence-nosql-metastore",
              ":polaris-persistence-nosql-cdi-quarkus",
              ":polaris-persistence-nosql-cdi-quarkus-distcache",
              ":polaris-persistence-nosql-maintenance-impl",
              ":polaris-persistence-nosql-metastore-maintenance",
          ]
          expected_review_checkpoint = {
              "repository": "TommyKammy/Shirokuma",
              "pull_request": 87,
              "reviewed_head_commit": (
                  "178b5ca03a2575a7100cfb47daede795fbd1d30c"
              ),
              "merge_commit": "8e5c6927e95d1027e16fe2ac27ab8322b45359c9",
              "merged_at": "2026-07-20T23:24:12Z",
              "merged_by": "TommyKammy",
              "reviewed_contract_sha256": (
                  "26f5259642007aa11a4676ccee918bd5b1e55f8eb5c0025f92a12f1d8ccb37db"
              ),
              "reviewed_evidence_manifest_sha256": (
                  "026c4d82e9031532323ccb3c31ea83939010982cfcf373644cdcf064e2613409"
              ),
              "reviewed_verifier_sha256": (
                  "ef1fad340179e61f7d1291d9e3fd44c793c4761af4b094a0b232ea663c7f41c9"
              ),
          }
          context_files = [
              line.split("  ", 1)[1]
              for line in (root / "build-context.sha256").read_text(
                  encoding="utf-8"
              ).splitlines()
          ]
          expected_context_matches = {
              term: sorted(
                  name
                  for name in context_files
                  if name.startswith("build/quarkus-app/")
                  and name.endswith(".jar")
                  and term in name.lower()
              )
              for term in required_terms
          }
          if any(not expected_context_matches[term] for term in required_terms):
              raise SystemExit("retained Admin context omits a dependency term")

          build_input = load("build-input.json")
          build_surface = build_input.get("admin_dependency_surface", {})
          if (
              build_input.get("component") != "polaris-admin"
              or build_input.get("state") != "admin_image_publication_pending"
              or build_input.get("admitted") is not False
              or build_input.get("source_sha") != os.environ["GITHUB_SHA"]
              or build_input.get("workflow_sha") != os.environ["GITHUB_WORKFLOW_SHA"]
              or build_input.get("required_dependency_terms") != required_terms
              or build_input.get("context_dependency_files_by_term")
              != expected_context_matches
              or build_surface.get("relational_only") is not False
              or build_surface.get("review_state")
              != "reviewed_for_image_publication"
              or build_surface.get("image_publication_decision")
              != expected_decision
              or build_surface.get("unconditional_external_dependencies")
              != ["io.quarkus:quarkus-mongodb-client"]
              or build_surface.get("unconditional_project_dependencies")
              != expected_projects
              or build_surface.get("required_sbom_terms") != required_terms
              or build_input.get("review_checkpoint")
              != expected_review_checkpoint
          ):
              raise SystemExit("Admin build input binding is invalid")

          dependency = load("dependency-input.json")
          historical_surface = dependency.get("admin_dependency_surface", {})
          if (
              dependency.get("result") != "passed"
              or dependency.get("anonymous_pull") is not True
              or dependency.get("reference") != os.environ["DEPENDENCY_REF"]
              or historical_surface.get("relational_only") is not False
              or historical_surface.get("review_state") != "review_required"
              or historical_surface.get("unconditional_external_dependencies")
              != ["io.quarkus:quarkus-mongodb-client"]
              or historical_surface.get("unconditional_project_dependencies")
              != expected_projects
              or dependency.get("current_review_state")
              != "reviewed_for_image_publication"
              or dependency.get("image_publication_decision")
              != expected_decision
              or dependency.get("review_checkpoint")
              != expected_review_checkpoint
          ):
              raise SystemExit("Admin dependency input or NoSQL/Mongo disclosure is invalid")

          offline = load("offline-build.json")
          expected_tasks = [
              ":polaris-admin:assemble",
              ":polaris-admin:quarkusAppPartsBuild",
              ":polaris-server:assemble",
              ":polaris-server:quarkusAppPartsBuild",
          ]
          offline_surface = offline.get("admin_dependency_surface", {})
          expected_offline_matches = {
              term: [
                  name.removeprefix("build/quarkus-app/")
                  for name in expected_context_matches[term]
              ]
              for term in required_terms
          }
          if (
              offline.get("result") != "passed"
              or offline.get("network") != "none"
              or offline.get("gradle_offline") is not True
              or offline.get("dependency_verification") != "strict"
              or offline.get("tasks") != expected_tasks
              or offline.get("required_dependency_terms") != required_terms
              or offline.get("matching_dependency_files_by_term")
              != expected_offline_matches
              or offline_surface.get("relational_only") is not False
              or offline_surface.get("review_state")
              != "reviewed_for_image_publication"
              or offline_surface.get("image_publication_decision")
              != expected_decision
              or offline_surface.get("unconditional_external_dependencies")
              != ["io.quarkus:quarkus-mongodb-client"]
              or offline_surface.get("unconditional_project_dependencies")
              != expected_projects
          ):
              raise SystemExit("Admin offline build evidence is invalid")

          expected_help = {
              "admin-help.json": {
                  "command": ["--help"],
                  "markers": [
                      "Usage: polaris-admin-tool.jar [-hV] [COMMAND]",
                      "Polaris administration & maintenance tool",
                  ],
              },
              "admin-bootstrap-help.json": {
                  "command": ["bootstrap", "--help"],
                  "markers": [
                      "Usage: polaris-admin-tool.jar bootstrap",
                      "--credential",
                      "--credentials-file",
                      "--print-credentials",
                  ],
              },
          }
          for name, expected in expected_help.items():
              record = load(name)
              if (
                  record.get("result") != "passed"
                  or record.get("reference") != reference
                  or record.get("command") != expected["command"]
                  or record.get("exit_code") != 0
                  or record.get("network") != "none"
                  or record.get("credentials_supplied") is not False
                  or not set(expected["markers"]).issubset(
                      set(record.get("required_output_markers", []))
                  )
              ):
                  raise SystemExit(f"credential-free Admin help evidence is invalid: {name}")

          bootstrap = load("admin-bootstrap-help.json")
          if (
              bootstrap.get("credential_argument_permitted") is not False
              or bootstrap.get("credential_file_read") is not False
              or bootstrap.get("print_credentials_requested") is not False
          ):
              raise SystemExit("bootstrap help evidence permits credential material")

          inspect = load("admin-container-inspect.json")
          containers = inspect.get("containers", [])
          if (
              inspect.get("result") != "passed"
              or inspect.get("reference") != reference
              or [item.get("name") for item in containers]
              != ["root_help", "bootstrap_help"]
              or any(
                  item.get("user") != "10000:10001"
                  or item.get("network_mode") != "none"
                  or item.get("read_only_rootfs") is not True
                  or item.get("capabilities_dropped") != ["ALL"]
                  for item in containers
              )
          ):
              raise SystemExit("Admin container control evidence is invalid")

          log_policy = load("admin-smoke-log-policy.json")
          if (
              log_policy.get("result") != "passed"
              or log_policy.get("redaction_count") != 0
              or log_policy.get("raw_logs_retained") is not False
              or log_policy.get("credentials_supplied") is not False
          ):
              raise SystemExit("Admin smoke log policy is invalid")

          builder = load("builder-metadata.json")
          if builder.get("runtime_base") != {
              "index": os.environ["RUNTIME_BASE_INDEX"],
              "linux_arm64_manifest": os.environ["RUNTIME_BASE"],
              "java_version": os.environ["RUNTIME_BASE_JAVA_VERSION"],
              "os": os.environ["RUNTIME_BASE_OS"],
              "os_version": os.environ["RUNTIME_BASE_OS_VERSION"],
          }:
              raise SystemExit("runtime base metadata is not pinned to reviewed bytes")
          runtime_index = load("runtime-base-index.json")
          arm64 = [
              descriptor
              for descriptor in runtime_index.get("manifests", [])
              if descriptor.get("platform", {}).get("os") == "linux"
              and descriptor.get("platform", {}).get("architecture") == "arm64"
              and descriptor.get("platform", {}).get("variant") in (None, "v8")
          ]
          if (
              len(arm64) != 1
              or arm64[0].get("digest") != os.environ["RUNTIME_BASE_DIGEST"]
              or load("runtime-base-manifest.json").get("schemaVersion") != 2
          ):
              raise SystemExit("runtime base index or arm64 manifest evidence is invalid")

          sbom_policy = load("sbom-policy.json")
          matching_components = sbom_policy.get(
              "matching_components_by_term", {}
          )
          if (
              sbom_policy.get("result") != "passed"
              or sbom_policy.get("relational_only") is not False
              or sbom_policy.get("review_state")
              != "reviewed_for_image_publication"
              or sbom_policy.get("image_publication_decision")
              != expected_decision
              or sbom_policy.get("required_component_terms") != required_terms
              or set(matching_components) != set(required_terms)
              or any(not matching_components[term] for term in required_terms)
              or any(
                  term
                  not in " ".join(
                      str(component.get(field, ""))
                      for field in ("group", "name", "purl")
                  ).lower()
                  for term in required_terms
                  for component in matching_components[term]
              )
          ):
              raise SystemExit("Admin SBOM disclosure policy is invalid")

          scan = load("trivy.json", maximum=64 * 1024 * 1024)
          findings = [
              vulnerability
              for result in scan.get("Results") or []
              for vulnerability in result.get("Vulnerabilities") or []
          ]
          if findings:
              raise SystemExit("retained Trivy evidence contains vulnerabilities")

          for name in (
              "source-authentication.json",
              "cosign-verify.json",
              "slsa-verify.json",
              "toolchain.json",
              "trivy-version.json",
          ):
              load(name)
          PY

      - name: Install pinned Crane without registry credentials
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="${RUNNER_TEMP}/crane"
          mkdir -p "${tool_dir}"
          export DOCKER_CONFIG="${RUNNER_TEMP}/anonymous-docker-config"
          mkdir -p "${DOCKER_CONFIG}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "${GITHUB_ENV}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "${tool_dir}/crane.tar.gz" "${CRANE_URL}"
          echo "${CRANE_ARCHIVE_SHA256}  ${tool_dir}/crane.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${tool_dir}/crane.tar.gz" \
            --directory "${tool_dir}" crane
          install -m 0755 "${tool_dir}/crane" "${tool_dir}/crane.bin"
          echo "${tool_dir}" >> "${GITHUB_PATH}"
          test "$("${tool_dir}/crane.bin" version)" = "${CRANE_VERSION#v}"

      - name: Reverify the public digest, signature, and provenance before promotion
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test -z "${DOCKER_AUTH_CONFIG:-}"
          crane.bin manifest "${IMAGE}@${DIGEST}" > promotion-manifest.json
          echo "${DIGEST#sha256:}  promotion-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json promotion-manifest.json
          crane.bin config "${IMAGE}@${DIGEST}" > promotion-config.json
          cmp candidate-evidence/image-config.json promotion-config.json

          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-arm64.yml@${GITHUB_REF}"
          cosign verify \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            --certificate-identity "${identity}" \
            --certificate-github-workflow-name "${GITHUB_WORKFLOW}" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-sha "${GITHUB_WORKFLOW_SHA}" \
            --certificate-github-workflow-trigger "${GITHUB_EVENT_NAME}" \
            --output json "${IMAGE}@${DIGEST}" > promotion-cosign-verify.json
          cosign download signature "${IMAGE}@${DIGEST}" \
            > promotion-registry-signature-bundles.jsonl
          test -s promotion-registry-signature-bundles.jsonl

          rekor_index=$(python3 - <<'PY'
          import json
          from pathlib import Path

          bundle = json.loads(
              Path("candidate-evidence/cosign-signature-bundle.json").read_text(
                  encoding="utf-8"
              )
          )
          entries = bundle["verificationMaterial"]["tlogEntries"]
          if len(entries) != 1:
              raise SystemExit("exactly one retained Rekor entry is required")
          print(entries[0]["logIndex"])
          PY
          )
          curl --fail --location \
            --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output promotion-rekor-entry.json \
            "${REKOR_URL}/api/v1/log/entries?logIndex=${rekor_index}"

          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --signer-workflow \
              "${GITHUB_REPOSITORY}/.github/workflows/polaris-admin-arm64.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --format json > promotion-slsa-verify.json
          test -s promotion-cosign-verify.json
          test -s promotion-slsa-verify.json
          python3 - <<'PY'
          import base64
          import json
          import os
          from collections import Counter
          from pathlib import Path

          retained_bundle = json.loads(
              Path("candidate-evidence/cosign-signature-bundle.json").read_text(
                  encoding="utf-8"
              )
          )
          live_registry_bundles = [
              json.loads(line)
              for line in Path(
                  "promotion-registry-signature-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          if sum(item == retained_bundle for item in live_registry_bundles) != 1:
              raise SystemExit(
                  "live registry does not contain exactly one retained signature bundle"
              )
          retained_rekor = json.loads(
              Path("candidate-evidence/rekor-entry.json").read_text(
                  encoding="utf-8"
              )
          )
          live_rekor = json.loads(
              Path("promotion-rekor-entry.json").read_text(encoding="utf-8")
          )

          def rekor_identity(response, label):
              if not isinstance(response, dict) or len(response) != 1:
                  raise SystemExit(f"{label} Rekor response must contain one entry")
              uuid, entry = next(iter(response.items()))
              if not isinstance(uuid, str) or not uuid or not isinstance(entry, dict):
                  raise SystemExit(f"{label} Rekor entry identity is invalid")
              verification = entry.get("verification", {})
              proof = verification.get("inclusionProof", {})

              def decimal(value, field):
                  if (
                      isinstance(value, bool)
                      or not isinstance(value, (int, str))
                      or not str(value).isdigit()
                  ):
                      raise SystemExit(
                          f"{label} Rekor {field} must be a non-negative integer"
                      )
                  return int(value)

              log_index = decimal(entry.get("logIndex"), "logIndex")
              proof_log_index = decimal(proof.get("logIndex"), "proof logIndex")
              tree_size = decimal(proof.get("treeSize"), "proof treeSize")
              if not (
                  isinstance(entry.get("body"), str)
                  and entry["body"]
                  and isinstance(entry.get("logID"), str)
                  and entry["logID"]
                  and isinstance(
                      verification.get("signedEntryTimestamp"), str
                  )
                  and verification["signedEntryTimestamp"]
                  and isinstance(proof.get("checkpoint"), str)
                  and proof["checkpoint"]
                  and isinstance(proof.get("rootHash"), str)
                  and proof["rootHash"]
                  and isinstance(proof.get("hashes"), list)
                  and all(
                      isinstance(item, str) and item
                      for item in proof["hashes"]
                  )
                  and proof_log_index < tree_size
              ):
                  raise SystemExit(
                      f"{label} Rekor response has incomplete inclusion evidence"
                  )
              return {
                  "uuid": uuid,
                  "body": entry["body"],
                  "integratedTime": decimal(
                      entry.get("integratedTime"), "integratedTime"
                  ),
                  "logID": entry["logID"],
                  "logIndex": log_index,
                  "proofLogIndex": proof_log_index,
              }

          retained_identity = rekor_identity(retained_rekor, "retained")
          live_identity = rekor_identity(live_rekor, "live")
          if live_identity != retained_identity:
              raise SystemExit(
                  "live Rekor immutable identity differs from retained evidence"
              )
          bundle_entry = retained_bundle["verificationMaterial"]["tlogEntries"][0]
          expected_rekor_identity = {
              "body": bundle_entry["canonicalizedBody"],
              "integratedTime": int(bundle_entry["integratedTime"]),
              "logID": base64.b64decode(
                  bundle_entry["logId"]["keyId"], validate=True
                  ).hex(),
                  "logIndex": int(bundle_entry["logIndex"]),
                  "proofLogIndex": int(
                      bundle_entry["inclusionProof"]["logIndex"]
                  ),
              }
          if any(
              retained_identity[field] != value
              for field, value in expected_rekor_identity.items()
          ):
              raise SystemExit(
                  "retained Rekor immutable identity differs from the signed bundle"
              )

          payloads = json.loads(
              Path("promotion-cosign-verify.json").read_text(encoding="utf-8")
          )
          if not isinstance(payloads, list) or not payloads:
              raise SystemExit("live registry signature verification is empty")
          reference = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          for payload in payloads:
              critical = payload.get("critical", payload.get("Critical", {}))
              image = critical.get("image", critical.get("Image", {}))
              identity = critical.get("identity", critical.get("Identity", {}))
              if image.get(
                  "docker-manifest-digest",
                  image.get("Docker-manifest-digest"),
              ) != os.environ["DIGEST"]:
                  raise SystemExit("live signature payload digest mismatch")
              if identity.get(
                  "docker-reference",
                  identity.get("Docker-reference"),
              ) != reference:
                  raise SystemExit("live signature payload reference mismatch")

          retained_slsa = [
              json.loads(line)
              for line in Path(
                  "candidate-evidence/slsa-bundles.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          live_records = json.loads(
              Path("promotion-slsa-verify.json").read_text(encoding="utf-8")
          )
          live_slsa = [record["attestation"]["bundle"] for record in live_records]
          canonical = lambda item: json.dumps(
              item, separators=(",", ":"), sort_keys=True
          )
          if Counter(map(canonical, live_slsa)) != Counter(
              map(canonical, retained_slsa)
          ):
              raise SystemExit(
                  "live exact-workflow SLSA bundles differ from retained evidence"
              )
          PY

      - name: Log in to GHCR for trusted-tag promotion
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote the fully verified digest to the non-authoritative trusted tag
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          crane.bin copy "${IMAGE}@${DIGEST}" "${IMAGE}:${TRUSTED_TAG}"
          test "$(crane.bin digest "${IMAGE}:${TRUSTED_TAG}")" = "${DIGEST}"
          docker logout ghcr.io

      - name: Verify final evidence after credentials are removed
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
          INPUT_ARTIFACT_DIGEST: ${{ needs.prepare.outputs.artifact_digest }}
          PROVENANCE_URL: ${{ needs.verify.outputs.provenance_url }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(crane.bin digest "${IMAGE}:${TRUSTED_TAG}")" = "${DIGEST}"
          crane.bin manifest "${IMAGE}:${TRUSTED_TAG}" > trusted-tag-manifest.json
          echo "${DIGEST#sha256:}  trusted-tag-manifest.json" \
            | sha256sum --check --strict
          cmp candidate-evidence/image-manifest.json trusted-tag-manifest.json
          cp promotion-cosign-verify.json candidate-evidence/
          cp promotion-slsa-verify.json candidate-evidence/
          cp trusted-tag-manifest.json candidate-evidence/

          EVIDENCE_DIR="candidate-evidence" python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ["EVIDENCE_DIR"])
          path = root / "publication.json"
          completed = datetime.now(timezone.utc).isoformat()
          record = {
              "schema_version": 1,
              "component": "polaris-admin",
              "version": "1.6.0",
              "platform": "linux/arm64",
              "state": "admin_image_evidence_review_pending",
              "admitted": False,
              "promoted": True,
              "reference": f"{os.environ['IMAGE']}@{os.environ['DIGEST']}",
              "candidate_tag": (
                  f"{os.environ['IMAGE']}:1.6.0-{os.environ['GITHUB_RUN_ID']}-"
                  f"{os.environ['GITHUB_RUN_ATTEMPT']}"
              ),
              "trusted_tag": f"{os.environ['IMAGE']}:{os.environ['TRUSTED_TAG']}",
              "trusted_tag_role": "non_authoritative_pointer",
              "anonymous_pull": True,
              "promotion_anonymous_verification": True,
              "source_commit": os.environ["SOURCE_COMMIT"],
              "source_archive_sha512": os.environ["SOURCE_ARCHIVE_SHA512"],
              "dependency_reference": os.environ["DEPENDENCY_REF"],
              "admin_dependency_surface": {
                  "relational_only": False,
                  "review_state": "reviewed_for_image_publication",
                  "image_publication_decision": (
                      "accepted_unmodified_for_image_publication_only"
                  ),
                  "source_overlay_permitted": False,
                  "runtime_activation_permitted": False,
                  "unconditional_external_dependencies": [
                      "io.quarkus:quarkus-mongodb-client"
                  ],
                  "unconditional_project_dependencies": [
                      ":polaris-persistence-nosql-api",
                      ":polaris-persistence-nosql-maintenance-api",
                      ":polaris-persistence-nosql-metastore",
                      ":polaris-persistence-nosql-cdi-quarkus",
                      ":polaris-persistence-nosql-cdi-quarkus-distcache",
                      ":polaris-persistence-nosql-maintenance-impl",
                      ":polaris-persistence-nosql-metastore-maintenance",
                  ],
                  "required_sbom_terms": [
                      "mongodb",
                      "polaris-persistence-nosql",
                  ],
                  "exclusion_permitted": False,
              },
              "review_checkpoint": {
                  "repository": "TommyKammy/Shirokuma",
                  "pull_request": 87,
                  "reviewed_head_commit": (
                      "178b5ca03a2575a7100cfb47daede795fbd1d30c"
                  ),
                  "merge_commit": (
                      "8e5c6927e95d1027e16fe2ac27ab8322b45359c9"
                  ),
                  "merged_at": "2026-07-20T23:24:12Z",
                  "merged_by": "TommyKammy",
                  "reviewed_contract_sha256": (
                      "26f5259642007aa11a4676ccee918bd5b1e55f8eb5c0025f92a12f1d8ccb37db"
                  ),
                  "reviewed_evidence_manifest_sha256": (
                      "026c4d82e9031532323ccb3c31ea83939010982cfcf373644cdcf064e2613409"
                  ),
                  "reviewed_verifier_sha256": (
                      "ef1fad340179e61f7d1291d9e3fd44c793c4761af4b094a0b232ea663c7f41c9"
                  ),
              },
              "runtime_base_index": os.environ["RUNTIME_BASE_INDEX"],
              "runtime_base": os.environ["RUNTIME_BASE"],
              "runtime_base_java_version": os.environ[
                  "RUNTIME_BASE_JAVA_VERSION"
              ],
              "runtime_base_os": os.environ["RUNTIME_BASE_OS"],
              "runtime_base_os_version": os.environ[
                  "RUNTIME_BASE_OS_VERSION"
              ],
              "containerfile_sha256": os.environ["CONTAINERFILE_SHA256"],
              "admin_image_contract_sha256": hashlib.sha256(
                  Path(
                      "bootstrap/polaris/v1.6.0/admin-image-contract.json"
                  ).read_bytes()
              ).hexdigest(),
              "admin_build_inputs_contract_sha256": hashlib.sha256(
                  Path(
                      "bootstrap/polaris/v1.6.0/admin-build-inputs-contract.json"
                  ).read_bytes()
              ).hexdigest(),
              "input_artifact_digest": os.environ["INPUT_ARTIFACT_DIGEST"],
              "slsa_provenance": os.environ["PROVENANCE_URL"],
              "created": completed,
              "promotion_completed_at": completed,
              "downstream_gates": {
