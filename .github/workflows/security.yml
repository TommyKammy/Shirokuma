name: Supply chain security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security:
    name: Supply chain security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout complete history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Run deterministic repository policy checks
        run: make verify-security

      - name: Install checksum-pinned Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_ARCHIVE_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        shell: bash
        run: |
          set -euo pipefail

          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          install_dir="${RUNNER_TEMP}/gitleaks-bin"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"

          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --show-error \
            --silent \
            "${url}" \
            --output "${archive_path}"
          echo "${GITLEAKS_ARCHIVE_SHA256}  ${archive_path}" | sha256sum --check --strict -
          mkdir -p "${install_dir}"
          tar -xzf "${archive_path}" -C "${install_dir}" gitleaks
          test -x "${install_dir}/gitleaks"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Scan Git history for secrets
        env:
          SCAN_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          SCAN_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          sha_pattern='^[0-9a-f]{40}$'
          zero_sha='0000000000000000000000000000000000000000'
          if [[ ! "${SCAN_BASE}" =~ ${sha_pattern} ]] ||
             [[ ! "${SCAN_HEAD}" =~ ${sha_pattern} ]] ||
             [[ "${SCAN_HEAD}" == "${zero_sha}" ]]; then
            echo "Invalid Git history scan boundary" >&2
            exit 1
          fi

          git cat-file -e "${SCAN_HEAD}^{commit}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git cat-file -e "${SCAN_BASE}^{commit}"
            range_base="$(git merge-base "${SCAN_BASE}" "${SCAN_HEAD}")"
            log_opts="-m ${range_base}..${SCAN_HEAD}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${SCAN_BASE}" == "${zero_sha}" ]]; then
              log_opts="-m ${SCAN_HEAD}"
            elif git cat-file -e "${SCAN_BASE}^{commit}" 2>/dev/null; then
              log_opts="-m ${SCAN_BASE}..${SCAN_HEAD}"
            else
              echo "::warning::Push base is unavailable; scanning full HEAD history"
              log_opts="-m ${SCAN_HEAD}"
            fi
          else
            echo "Unsupported Gitleaks event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          gitleaks git \
            --config=.gitleaks.toml \
            --exit-code=2 \
            --log-level=info \
            "--log-opts=${log_opts}" \
            --redact \
            --report-format=sarif \
            --report-path=results.sarif \
            --verbose

      - name: Retain Gitleaks SARIF
        if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-results.sarif
          path: results.sarif
          if-no-files-found: error
          retention-days: 30

      - name: Report all dependency and configuration findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0

      - name: Block High or Critical dependency and configuration findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          trivyignores: .trivyignore.yaml
          exit-code: 1

      - name: Generate and retain source SBOM
        if: ${{ !cancelled() }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: shirokuma-source.cdx.json
          upload-artifact: true
          upload-artifact-retention: 30
          upload-release-assets: false
          syft-version: v1.46.0
