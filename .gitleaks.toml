[extend]
useDefault = true

[[allowlists]]
description = "Public SHA-1 package hashes in retained Flux v2.9.2 scanner evidence"
condition = "AND"
regexTarget = "secret"
regexes = ['''^[0-9a-f]{40}$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^security/evidence/flux-v2\.9\.2/source-controller-v1\.9\.3-arm64\.cdx\.json$''',
  '''^security/evidence/flux-v2\.9\.2/source-controller-v1\.9\.3-arm64\.trivy\.json$''',
]

[[allowlists]]
description = "Public SHA-1 package hashes in retained SeaweedFS 4.39 CycloneDX evidence"
condition = "AND"
regexTarget = "secret"
regexes = ['''^[0-9a-f]{40}$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^bootstrap/seaweedfs/v4\.39/evidence/seaweedfs-4\.39-arm64\.cdx\.json$''',
  '''^bootstrap/seaweedfs/v4\.39/evidence/trivy\.json$''',
  '''^security/evidence/seaweedfs-v4\.39/seaweedfs-4\.39-arm64\.cdx\.json$''',
]

[[allowlists]]
description = "Public Sigstore bundle material retained for SeaweedFS 4.39 attestation verification"
condition = "AND"
regexTarget = "secret"
regexes = ['''^(db42bb49757b459551607939807017d7a9d5a94a|311b400a3baa667ba1727949a95ae0d2e70d41d2)$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^bootstrap/seaweedfs/v4\.39/evidence/sbom-attestation-bundle\.json$''',
  '''^bootstrap/seaweedfs/v4\.39/evidence/trivy-attestation-bundle\.json$''',
]

[[allowlists]]
description = "Public source and checksum hashes in the retained SeaweedFS Go module manifest"
condition = "AND"
regexTarget = "secret"
regexes = ['''^db42bb49757b459551607939807017d7a9d5a94a$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^bootstrap/seaweedfs/v4\.39/go-module-inputs\.json$''',
  '''^bootstrap/seaweedfs/v4\.39/evidence/go-module-inputs\.json$''',
]

[[allowlists]]
description = "SeaweedFS S3 secret variable references in OpenTofu and their contract assertions"
condition = "AND"
regexTarget = "secret"
regexes = ['''^(var\.seaweedfs_s3_operator_secret_key|var\.seaweedfs_s3_application_secret_key)$''']
targetRules = ["generic-api-key"]
paths = [
  '''^opentofu/dev/object-storage\.tf$''',
  '''^tests/test_object_storage_profile\.py$''',
]

[[allowlists]]
description = "Public immutable GitHub Action commit pins asserted by supply-chain tests"
condition = "AND"
regexTarget = "secret"
regexes = ['''^(df4cb1c069e1874edd31b4311f1884172cec0e10|e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e|6f9f17788090df1f26f669e9d70d6ae9567deba6)$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^tests/test_supply_chain_security\.py$''',
]

[[allowlists]]
description = "Public Apache Polaris 1.6.0 release-signing key fingerprint"
condition = "AND"
regexTarget = "secret"
regexes = ['''^F2EEEB06110BEE1397EC74CBB8960FF52D9B1312$''']
targetRules = ["generic-api-key"]
paths = [
  '''^bootstrap/polaris/v1\.6\.0/admin-build-inputs-contract\.json$''',
  '''^bootstrap/polaris/v1\.6\.0/image-evidence/source-authentication\.json$''',
  '''^bootstrap/polaris/v1\.6\.0/trusted-build-contract\.json$''',
  '''^scripts/verify_polaris_admin_build_inputs\.py$''',
  '''^scripts/verify_polaris_trusted_image\.py$''',
]

[[allowlists]]
description = "Public 40-hex Gradle SHA-1 package hashes in retained Apache Polaris 1.6.0 descriptor"
condition = "AND"
regexTarget = "secret"
regexes = ['''^[0-9a-f]{40}$''']
targetRules = ["sourcegraph-access-token"]
paths = [
  '''^bootstrap/polaris/v1\.6\.0/evidence/gradle-dependency-inputs\.json$''',
  '''^bootstrap/polaris/v1\.6\.0/admin-build-inputs-evidence/gradle-dependency-inputs\.json$''',
]

[[allowlists]]
description = "Public SeaweedFS 4.39 source commit in retained Trivy evidence"
condition = "AND"
regexTarget = "secret"
regexes = ['''^db42bb49757b459551607939807017d7a9d5a94a$''']
